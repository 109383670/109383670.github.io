<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#1a1530"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <circle cx="120" cy="80" r="180" fill="#6366f1" opacity="0.15"/>
  <circle cx="540" cy="300" r="160" fill="#a855f7" opacity="0.12"/>
  <!-- 卡片标题区 -->
  <rect x="48" y="200" width="180" height="14" rx="7" fill="url(#glow1)" opacity="0.7"/>
  <rect x="48" y="230" width="320" height="10" rx="5" fill="#9aa7bd" opacity="0.4"/>
  <rect x="48" y="250" width="280" height="10" rx="5" fill="#9aa7bd" opacity="0.3"/>
  <!-- 数据卡片 -->
  <rect x="48" y="80" width="120" height="80" rx="10" fill="#111827" opacity="0.7" stroke="#6366f1" stroke-opacity="0.3"/>
  <rect x="64" y="100" width="50" height="14" rx="7" fill="url(#glow1)"/>
  <rect x="64" y="124" width="80" height="8" rx="4" fill="#5d6b85"/>
  <rect x="184" y="80" width="120" height="80" rx="10" fill="#111827" opacity="0.7" stroke="#06b6d4" stroke-opacity="0.3"/>
  <rect x="200" y="100" width="50" height="14" rx="7" fill="url(#glow2)"/>
  <rect x="200" y="124" width="80" height="8" rx="4" fill="#5d6b85"/>
  <!-- 柱状图 -->
  <rect x="400" y="200" width="24" height="80" rx="4" fill="url(#glow1)" opacity="0.8"/>
  <rect x="432" y="170" width="24" height="110" rx="4" fill="url(#glow2)" opacity="0.9"/>
  <rect x="464" y="140" width="24" height="140" rx="4" fill="url(#glow1)"/>
  <rect x="496" y="180" width="24" height="100" rx="4" fill="url(#glow2)" opacity="0.7"/>
  <rect x="528" y="120" width="24" height="160" rx="4" fill="url(#glow1)" opacity="0.85"/>
</svg>
