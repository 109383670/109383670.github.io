<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- mandala rings -->
  <circle cx="200" cy="150" r="110" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.6"/>
  <circle cx="200" cy="150" r="85" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
  <circle cx="200" cy="150" r="55" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.7"/>
  <circle cx="200" cy="150" r="25" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.8"/>
  <circle cx="200" cy="150" r="6" fill="#f59e0b" opacity="0.9"/>
  <!-- cross lines -->
  <line x1="200" y1="40" x2="200" y2="260" stroke="#6366f1" stroke-width="0.5" opacity="0.3"/>
  <line x1="90" y1="150" x2="310" y2="150" stroke="#6366f1" stroke-width="0.5" opacity="0.3"/>
  <line x1="122" y1="72" x2="278" y2="228" stroke="#a855f7" stroke-width="0.3" opacity="0.2"/>
  <line x1="122" y1="228" x2="278" y2="72" stroke="#a855f7" stroke-width="0.3" opacity="0.2"/>
  <!-- title -->
  <text x="200" y="280" text-anchor="middle" fill="#a5b4fc" font-family="serif" font-size="20" font-weight="bold">荣格思想全报告</text>
</svg>