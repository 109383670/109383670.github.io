淤泥而不染，濯清涟而不妖，中通外直，不蔓不枝，香远益清，亭亭净植，可远观而不可亵玩焉。(甚爱 一作：盛爱)", "予谓菊，花之隐逸者也；牡丹，花之富贵者也；莲，花之君子者也。噫！菊之爱，陶后鲜有闻。莲之爱，同予者何人？牡丹之爱，宜乎众矣。"], "img": false}, {"i": 430, "t": "登飞来峰", "d": "", "a": "", "l": ["王安石〔宋代〕", "飞来峰上千寻塔，闻说鸡鸣见日升。", "不畏浮云遮望眼，自缘身在最高层。"], "img": false}, {"i": 431, "t": "游山西村", "d": "", "a": "", "l": ["陆游〔宋代〕", "莫笑农家腊酒浑，丰年留客足鸡豚。", "山重水复疑无路，柳暗花明又一村。", "箫鼓追随春社近，衣冠简朴古风存。", "从今若许闲乘月，拄杖无时夜叩门。"], "img": false}, {"i": 432, "t": "己亥杂诗·浩荡", "d": "", "a": "", "l": ["龚自珍〔清代〕", "浩荡离愁白日斜，吟鞭东指即天涯。", "落红不是无情物，化作春泥更护花。"], "img": false}, {"i": 433, "t": "春夜洛城闻笛", "d": "", "a": "", "l": ["李白〔唐代〕", "谁家玉笛暗飞声，散入春风满洛城。", "此夜曲中闻折柳，何人不起故园情。"], "img": false}, {"i": 434, "t": "晚春", "d": "", "a": "", "l": ["韩愈〔唐代〕", "草树知春不久归，百般红紫斗芳菲。", "杨花榆荚无才思，惟解漫天作雪飞。"], "img": false}, {"i": 435, "t": "过松源晨炊漆公店", "d": "", "a": "", "l": ["杨万里〔宋代〕", "莫言下岭便无难，赚得行人空喜欢。", "正入万山圈子里，一山放出一山拦。"], "img": false}, {"i": 436, "t": "约客", "d": "", "a": "", "l": ["赵师秀〔宋代〕", "黄梅时节家家雨，青草池塘处处蛙。", "有约不来过夜半，闲敲棋子落灯花。"], "img": false}, {"i": 437, "t": "野望", "d": "", "a": "", "l": ["王绩〔唐代〕", "东皋薄暮望，徙倚欲何依。", "树树皆秋色，山山唯落晖。", "牧人驱犊返，猎马带禽归。", "相顾无相识，长歌怀采薇。"], "img": false}, {"i": 438, "t": "使至塞上", "d": "", "a": "", "l": ["王维〔唐代〕", "单车欲问边，属国过居延。", "征蓬出汉塞，归雁入胡天。", "大漠孤烟直，长河落日圆。", "萧关逢候骑，都护在燕然。"], "img": false}, {"i": 439, "t": "得道多助，失道寡助", "d": "", "a": "", "l": ["孟子〔先秦〕", "天时不如地利，地利不如人和。三里之城，七里之郭，环而攻之而不胜。夫环而攻之，必有得天时者矣，然而不胜者，是天时不如地利也。城非不高也，池非不深也，兵革非不坚利也，米粟非不多也，委而去之，是地利不如人和也。", "故曰：域民不以封疆之界，固国不以山溪之险，威天下不以兵革之利。得道者多助，失道者寡助。寡助之至，亲戚畔之；多助之至，天下顺之。以天下之所顺，攻亲戚之所畔，故君子有不战，战必胜矣。"], "img": false}, {"i": 440, "t": "生于忧患，死于安乐", "d": "", "a": "", "l": ["孟子及其弟子〔先秦〕", "舜发于畎亩之中，傅说举于版筑之间，胶鬲举于鱼盐之中，管夷吾举于士，孙叔敖举于海，百里奚举于市。故天将降大任于是人也，必先苦其心志，劳其筋骨，饿其体肤，空乏其身，行拂乱其所为，所以动心忍性，曾益其所不能。(是人 一作：斯人)", "人恒过，然后能改；困于心，衡于虑，而后作；征于色，发于声，而后喻。入则无法家拂士，出则无敌国外患者，国恒亡。然后知生于忧患而死于安乐也。"], "img": false}, {"i": 441, "t": "饮酒·结庐", "d": "", "a": "", "l": ["陶渊明〔魏晋〕", "结庐在人境，而无车马喧。", "问君何能尔？心远地自偏。", "采菊东篱下，悠然见南山。", "山气日夕佳，飞鸟相与还。", "此中有真意，欲辨已忘言。"], "img": false}, {"i": 442, "t": "雁门太守行", "d": "", "a": "", "l": ["李贺〔唐代〕", "黑云压城城欲摧，甲光向日金鳞开。", "角声满天秋色里，塞上燕脂凝夜紫。(塞上 一作：塞土)", "半卷红旗临易水，霜重鼓寒声不起。", "报君黄金台上意，提携玉龙为君死。"], "img": false}, {"i": 443, "t": "渔家傲·天接", "d": "", "a": "", "l": ["李清照〔宋代〕", "天接云涛连晓雾，星河欲转千帆舞。仿佛梦魂归帝所。闻天语，殷勤问我归何处。", "我报路长嗟日暮，学诗谩有惊人句。九万里风鹏正举。风休住，蓬舟吹取三山去！"], "img": false}, {"i": 444, "t": "龟虽寿", "d": "", "a": "", "l": ["曹操〔两汉〕", "神龟虽寿，犹有竟时。", "腾蛇乘雾，终为土灰。(腾 一作：螣)", "老骥伏枥，志在千里。", "烈士暮年，壮心不已。", "盈缩之期，不但在天；", "养怡之福，可得永年。", "幸甚至哉，歌以咏志。", "盈缩：原指岁星的长短变化，这里指人的寿命长短盈，增长。", "缩，亏，引申为短"], "img": false}, {"i": 445, "t": "赠从弟·其二", "d": "", "a": "", "l": ["东汉·刘桢〔两汉〕", "亭亭山上松，瑟瑟谷中风。", "风声一何盛，松枝一何劲。", "冰霜正惨凄，终岁常端正。", "岂不罹凝寒？松柏有本性。罹(lí)：遭受"], "img": false}, {"i": 446, "t": "梁甫行", "d": "", "a": "", "l": ["曹植〔魏晋〕", "八方各异气，千里殊风雨。", "剧哉边海民，寄身于草野。", "妻子象禽兽，行止依林阻。", "柴门何萧条，狐兔翔我宇。"], "img": false}, {"i": 447, "t": "浣溪沙·一曲", "d": "", "a": "", "l": ["晏殊〔宋代〕", "一曲新词酒一杯，去年天气旧亭台。夕阳西下几时回？", "无可奈何花落去，似曾相识燕归来。小园香径独徘徊。"], "img": false}, {"i": 448, "t": "采桑子·轻舟", "d": "", "a": "", "l": ["欧阳修〔宋代〕", "轻舟短棹西湖好，绿水逶迤。芳草长堤，隐隐笙歌处处随。", "无风水面琉璃滑，不觉船移。微动涟漪，惊起沙禽掠岸飞。"], "img": false}, {"i": 449, "t": "相见欢·金陵", "d": "", "a": "", "l": ["朱敦儒〔宋代〕", "金陵城上西楼，倚清秋。万里夕阳垂地大江流。", "中原乱，簪缨散，几时收？试倩悲风吹泪过扬州。"], "img": false}, {"i": 450, "t": "如梦令·常记", "d": "", "a": "", "l": ["李清照〔宋代〕", "常记溪亭日暮，沉醉不知归路。", "兴尽晚回舟，误入藕花深处。", "争渡，争渡，惊起一滩鸥鹭。"], "img": false}, {"i": 451, "t": "关雎", "d": "", "a": "", "l": ["诗经·国风·周南〔先秦〕", "关关雎鸠，在河之洲。窈窕淑女，君子好逑。", "参差荇菜，左右流之。窈窕淑女，寤寐求之。", "求之不得，寤寐思服。悠哉悠哉，辗转反侧。", "参差荇菜，左右采之。窈窕淑女，琴瑟友之。", "参差荇菜，左右芼之。窈窕淑女，钟鼓乐之。"], "img": false}, {"i": 452, "t": "蒹葭", "d": "", "a": "", "l": ["诗经·国风·秦风〔先秦〕", "蒹葭苍苍，白露为霜。所谓伊人，在水一方。", "溯洄从之，道阻且长。溯游从之，宛在水中央。", "蒹葭萋萋，白露未晞。所谓伊人，在水之湄。", "溯洄从之，道阻且跻。溯游从之，宛在水中坻。", "蒹葭采采，白露未已。所谓伊人，在水之涘。", "溯洄从之，道阻且右。溯游从之，宛在水中沚。"], "img": false}, {"i": 453, "t": "北冥有鱼", "d": "", "a": "", "l": ["庄周〔先秦〕", "北冥有鱼，其名为鲲。鲲之大，不知其几千里也；化而为鸟，其名为鹏。鹏之背，不知其几千里也，怒而飞，其翼若垂天之云。是鸟也，海运则将徙于南冥。南冥者，天池也。《齐谐》者，志怪者也。《谐》之言曰：“鹏之徙于南冥也，水击三千里，抟扶摇而上者九万里，去以六月息者也。”野马也，尘埃也，生物之以息相吹也。天之苍苍，其正色邪？其远而无所至极邪？其视下也，亦若是则已矣。且夫水之积也不厚，则其负大舟也无力。覆杯水于坳堂之上，则芥为之舟；置杯焉则胶，水浅而舟大也。风之积也不厚，则其负大翼也无力。故九万里，则风斯在下矣，而后乃今培风；背负青天而莫之夭阏者，而后乃今将图南。蜩与学鸠笑之曰：“我决起而飞，抢榆枋而止，时则不至，而控于地而已矣，奚以之九万里而南为？”适莽苍者，三餐而反，腹犹果然；适百里者，宿舂粮，适千里者，三月聚粮。之二虫又何知？", "小知不及大知，小年不及大年。奚以知其然也？朝菌不知晦朔，蟪蛄不知春秋，此小年也。楚之南有冥灵者，以五百岁为春，五百岁为秋。上古有大椿者，以八千岁为春，八千岁为秋。此大年也。而彭祖乃今以久特闻，众人匹之。不亦悲乎！", "汤之问棘也是已：“穷发之北，有冥海者，天池也。有鱼焉，其广数千里，未有知其修者，其名为鲲。有鸟焉，其名为鹏。背若泰山，翼若垂天之云，抟扶摇羊角而上者九万里，绝云气，负青天，然后图南，且适南冥也。斥鴳笑之曰：‘彼且奚适也？我腾跃而上，不过数仞而下，翱翔蓬蒿之间，此亦飞之至也。而彼且奚适也？’”此小大之辩也。", "故夫知效一官，行比一乡，德合一君，而征一国者，其自视也，亦若此矣。而宋荣子犹然笑之。且举世誉之而不加劝，举世非之而不加沮，定乎内外之分，辩乎荣辱之境，斯已矣。彼其于世，未数数然也。虽然，犹有未树也。夫列子御风而行，泠然善也，旬有五日而后反。彼于致福者，未数数然也。此虽免乎行，犹有所待者也。若夫乘天地之正，而御六气之辩，以游无穷者，彼且恶乎待哉？故曰：至人无己，神人无功，圣人无名。"], "img": false}, {"i": 454, "t": "庄子与惠子游于濠梁之上", "d": "", "a": "", "l": ["庄周〔先秦〕", "庄子与惠子游于濠梁之上。庄子曰：“鲦鱼出游从容，是鱼之乐也。”惠子曰：“子非鱼，安知鱼之乐？”庄子曰：“子非我，安知我不知鱼之乐？”惠子曰：“我非子，固不知子矣；子固非鱼也，子之不知鱼之乐，全矣！”", "庄子曰：“请循其本。子曰‘汝安知鱼乐’云者，既已知吾知之而问我。我知之濠上也。”"], "img": false}, {"i": 455, "t": "虽有嘉肴", "d": "", "a": "", "l": ["《礼记·学记》〔两汉〕", "虽有嘉肴，弗食，不知其旨也；虽有至道，弗学，不知其善也。是故学然后知不足，教然后知困。知不足，然后能自反也；知困，然后能自强也。故曰：教学相长也。《兑命》曰“学学半”，其此之谓乎！"], "img": false}, {"i": 456, "t": "大道之行也", "d": "", "a": "", "l": ["礼记〔两汉〕", "大道之行也，天下为公。选贤与能，讲信修睦。故人不独亲其亲，不独子其子，使老有所终，壮有所用，幼有所长，矜、寡、孤、独、废疾者皆有所养，男有分，女有归。货恶其弃于地也，不必藏于己；力恶其不出于身也，不必为己。是故谋闭而不兴，盗窃乱贼而不作，故外户而不闭。是谓大同。(矜 同：鳏)"], "img": false}, {"i": 457, "t": "马说", "d": "", "a": "", "l": ["韩愈〔唐代〕", "世有伯乐，然后有千里马。千里马常有，而伯乐不常有。故虽有名马，祗辱于奴隶人之手，骈死于槽枥之间，不以千里称也。", "马之千里者，一食或尽粟一石。食马者不知其能千里而食也。是马也，虽有千里之能，食不饱，力不足，才美不外见，且欲与常马等不可得，安求其能千里也？", "策之不以其道，食之不能尽其材，鸣之而不能通其意，执策而临之，曰：“天下无马！”呜呼！其真无马邪？其真不知马也！"], "img": false}, {"i": 458, "t": "石壕吏", "d": "", "a": "", "l": ["杜甫〔唐代〕", "暮投石壕村，有吏夜捉人。", "老翁逾墙走，老妇出门看。", "吏呼一何怒！妇啼一何苦！", "听妇前致词：三男邺城戍。", "一男附书至，二男新战死。", "存者且偷生，死者长已矣！", "室中更无人，惟有乳下孙。", "有孙母未去，出入无完裙。", "老妪力虽衰，请从吏夜归。", "急应河阳役，犹得备晨炊。", "夜久语声绝，如闻泣幽咽。", "天明登前途，独与老翁别。"], "img": false}, {"i": 459, "t": "茅屋为秋风所破歌", "d": "", "a": "", "l": ["杜甫〔唐代〕", "八月秋高风怒号，卷我屋上三重茅。", "茅飞渡江洒江郊，高者挂罥长林梢，下者飘转沉塘坳。", "南村群童欺我老无力，忍能对面为盗贼。", "公然抱茅入竹去，唇焦口燥呼不得，归来倚杖自叹息。", "俄顷风定云墨色，秋天漠漠向昏黑。", "布衾多年冷似铁，娇儿恶卧踏里裂。", "床头屋漏无干处，雨脚如麻未断绝。", "自经丧乱少睡眠，长夜沾湿何由彻！", "安得广厦千万间，大庇天下寒士俱欢颜！风雨不动安如山。呜呼！何时眼前突兀见此屋，吾庐独破受冻死亦足！"], "img": false}, {"i": 460, "t": "卖炭翁", "d": "", "a": "", "l": ["白居易〔唐代〕", "卖炭翁，伐薪烧炭南山中。", "满面尘灰烟火色，两鬓苍苍十指黑。", "卖炭得钱何所营？身上衣裳口中食。", "可怜身上衣正单，心忧炭贱愿天寒。", "夜来城外一尺雪，晓驾炭车辗冰辙。", "牛困人饥日已高，市南门外泥中歇。", "翩翩两骑来是谁？黄衣使者白衫儿。", "手把文书口称敕，回车叱牛牵向北。", "一车炭，千余斤，宫使驱将惜不得。", "半匹红纱一丈绫，系向牛头充炭直。(红纱 一作：红绡)"], "img": false}, {"i": 461, "t": "式微", "d": "", "a": "", "l": ["诗经·国风·邶风〔先秦〕", "式微，式微，胡不归？微君之故，胡为乎中露？", "式微，式微，胡不归？微君之躬，胡为乎泥中？"], "img": false}, {"i": 462, "t": "子衿", "d": "", "a": "", "l": ["诗经·国风·郑风〔先秦〕", "青青子衿，悠悠我心。纵我不往，子宁不嗣音？", "青青子佩，悠悠我思。纵我不往，子宁不来？", "挑兮达兮，在城阙兮。一日不见，如三月兮！"], "img": false}, {"i": 463, "t": "卜算子·黄州定慧院寓居作", "d": "", "a": "", "l": ["苏轼〔宋代〕", "缺月挂疏桐，漏断人初静。谁见幽人独往来，缥缈孤鸿影。(谁见 一作：时见)", "惊起却回头，有恨无人省。拣尽寒枝不肯栖，寂寞沙洲冷。"], "img": false}, {"i": 464, "t": "卜算子·咏梅", "d": "", "a": "", "l": ["陆游〔宋代〕", "驿外断桥边，寂寞开无主。已是黄昏独自愁，更着风和雨。", "无意苦争春，一任群芳妒。零落成泥碾作尘，只有香如故。"], "img": false}, {"i": 465, "t": "沁园春·雪", "d": "", "a": "", "l": ["毛泽东〔近现代〕", "北国风光，千里冰封，万里雪飘。望长城内外，惟余莽莽；大河上下，顿失滔滔。山舞银蛇，原驰蜡象，欲与天公试比高。须晴日，看红装素裹，分外妖娆。", "江山如此多娇，引无数英雄竞折腰。惜秦皇汉武，略输文采；唐宗宋祖，稍逊风骚。一代天骄，成吉思汗，只识弯弓射大雕。俱往矣，数风流人物，还看今朝。"], "img": false}, {"i": 466, "t": "岳阳楼记", "d": "", "a": "", "l": ["范仲淹〔宋代〕", "庆历四年春，滕子京谪守巴陵郡。越明年，政通人和，百废具兴，乃重修岳阳楼，增其旧制，刻唐贤今人诗赋于其上，属予作文以记之。(具 通：俱)", "予观夫巴陵胜状，在洞庭一湖。衔远山，吞长江，浩浩汤汤，横无际涯，朝晖夕阴，气象万千，此则岳阳楼之大观也，前人之述备矣。然则北通巫峡，南极潇湘，迁客骚人，多会于此，览物之情，得无异乎？", "若夫淫雨霏霏，连月不开，阴风怒号，浊浪排空，日星隐曜，山岳潜形，商旅不行，樯倾楫摧，薄暮冥冥，虎啸猿啼。登斯楼也，则有去国怀乡，忧谗畏讥，满目萧然，感极而悲者矣。(隐曜 一作：隐耀；淫雨 通：霪雨)", "至若春和景明，波澜不惊，上下天光，一碧万顷，沙鸥翔集，锦鳞游泳，岸芷汀兰，郁郁青青。而或长烟一空，皓月千里，浮光跃金，静影沉璧，渔歌互答，此乐何极！登斯楼也，则有心旷神怡，宠辱偕忘，把酒临风，其喜洋洋者矣。", "嗟夫！予尝求古仁人之心，或异二者之为，何哉？不以物喜，不以己悲，居庙堂之高则忧其民，处江湖之远则忧其君。是进亦忧，退亦忧。然则何时而乐耶？其必曰“先天下之忧而忧，后天下之乐而乐”乎！", "噫！微斯人，吾谁与归？时六年九月十五日。"], "img": false}, {"i": 467, "t": "酬乐天扬州初逢席上见赠", "d": "", "a": "", "l": ["刘禹锡〔唐代〕", "巴山楚水凄凉地，二十三年弃置身。", "怀旧空吟闻笛赋，到乡翻似烂柯人。", "沉舟侧畔千帆过，病树前头万木春。", "今日听君歌一曲，暂凭杯酒长精神。"], "img": false}, {"i": 468, "t": "水调歌头·明月几时有", "d": "", "a": "", "l": ["苏轼〔宋代〕", "丙辰中秋，欢饮达旦，大醉，作此篇，兼怀子由。", "明月几时有？把酒问青天。不知天上宫阙，今夕是何年。我欲乘风归去，又恐琼楼玉宇，高处不胜寒。起舞弄清影，何似在人间。", "转朱阁，低绮户，照无眠。不应有恨，何事长向别时圆？人有悲欢离合，月有阴晴圆缺，此事古难全。但愿人长久，千里共婵娟。"], "img": false}, {"i": 469, "t": "左迁至蓝关示侄孙湘", "d": "", "a": "", "l": ["韩愈〔唐代〕", "一封朝奏九重天，夕贬潮州路八千。", "欲为圣明除弊事，肯将衰朽惜残年！", "云横秦岭家何在？雪拥蓝关马不前。", "知汝远来应有意，好收吾骨瘴江边。"], "img": false}, {"i": 470, "t": "商山早行", "d": "", "a": "", "l": ["温庭筠〔唐代〕", "晨起动征铎，客行悲故乡。", "鸡声茅店月，人迹板桥霜。", "槲叶落山路，枳花明驿墙。", "因思杜陵梦，凫雁满回塘。"], "img": false}, {"i": 471, "t": "咸阳城东楼", "d": "", "a": "", "l": ["许浑〔唐代〕", "一上高城万里愁，蒹葭杨柳似汀洲。", "溪云初起日沉阁，山雨欲来风满楼。", "鸟下绿芜秦苑夕，蝉鸣黄叶汉宫秋。", "行人莫问当年事，故国东来渭水流。"], "img": false}, {"i": 472, "t": "行香子·树绕村庄", "d": "", "a": "", "l": ["秦观〔宋代〕", "树绕村庄，水满陂塘。倚东风，豪兴徜徉。小园几许，收尽春光。有桃花红，李花白，菜花黄。", "远远围墙，隐隐茅堂。飏青旗，流水桥旁。偶然乘兴，步过东冈。正莺儿啼，燕儿舞，蝶儿忙。(围墙 一作：苔墙)"], "img": false}, {"i": 473, "t": "丑奴儿·书博山道中壁", "d": "", "a": "", "l": ["辛弃疾〔宋代〕", "少年不识愁滋味，爱上层楼。爱上层楼，为赋新词强说愁。", "而今识尽愁滋味，欲说还休。欲说还休，却道“天凉好个秋”！"], "img": false}, {"i": 474, "t": "渔家傲·秋思", "d": "", "a": "", "l": ["范仲淹〔宋代〕", "塞下秋来风景异，衡阳雁去无留意。四面边声连角起，千嶂里，长烟落日孤城闭。", "浊酒一杯家万里，燕然未勒归无计。羌管悠悠霜满地，人不寐，将军白发征夫泪。"], "img": false}, {"i": 475, "t": "江城子·密州出猎", "d": "", "a": "", "l": ["苏轼〔宋代〕", "老夫聊发少年狂，左牵黄，右擎苍，锦帽貂裘，千骑卷平冈。为报倾城随太守，亲射虎，看孙郎。", "酒酣胸胆尚开张。鬓微霜，又何妨！持节云中，何日遣冯唐？会挽雕弓如满月，西北望，射天狼。"], "img": false}, {"i": 476, "t": "破阵子·为陈同甫赋壮词以寄之", "d": "", "a": "", "l": ["辛弃疾〔宋代〕", "醉里挑灯看剑，梦回吹角连营。八百里分麾下炙，五十弦翻塞外声，沙场秋点兵。", "马作的卢飞快，弓如霹雳弦惊。了却君王天下事，赢得生前身后名。可怜白发生！"], "img": false}, {"i": 477, "t": "满江红·小住京华", "d": "", "a": "", "l": ["秋瑾〔近现代〕", "小住京华，早又是中秋佳节。为篱下黄花开遍，秋容如拭。四面歌残终破楚，八年风味徒思浙。苦将侬强派作蛾眉，殊未屑！(徒思浙 一作：独思浙)", "身不得，男儿列，心却比，男儿烈。算平生肝胆，因人常热。俗子胸襟谁识我？英雄末路当磨折。莽红尘何处觅知音？青衫湿！"], "img": false}, {"i": 478, "t": "曹刿论战", "d": "", "a": "", "l": ["左丘明〔先秦〕", "十年春，齐师伐我。公将战，曹刿请见。其乡人曰：“肉食者谋之，又何间焉？”刿曰：“肉食者鄙，未能远谋。”", "乃入见。问：“何以战？”公曰：“衣食所安，弗敢专也，必以分人。”对曰：“小惠未遍，民弗从也。”公曰：“牺牲玉帛，弗敢加也，必以信。”对曰：“小信未孚，神弗福也。”公曰：“小大之狱，虽不能察，必以情。”对曰：“忠之属也。可以一战。战则请从。”", "公与之乘，战于长勺。公将鼓之。刿曰：“未可。”齐人三鼓。刿曰：“可矣。”齐师败绩。公将驰之。刿曰：“未可。”下视其辙，登轼而望之，曰：“可矣。”遂逐齐师。既克，公问其故。对曰：“夫战，勇气也。一鼓作气，再而衰，三而竭。彼竭我盈，故克之。夫大国，难测也，惧有伏焉。吾视其辙乱，望其旗靡，故逐之。”"], "img": false}, {"i": 479, "t": "出师表", "d": "", "a": "", "l": ["诸葛亮〔两汉〕", "    先帝创业未半而中道崩殂，今天下三分，益州疲弊，此诚危急存亡之秋也。然侍卫之臣不懈于内，忠志之士忘身于外者，盖追先帝之殊遇，欲报之于陛下也。诚宜开张圣听，以光先帝遗德，恢弘志士之气，不宜妄自菲薄，引喻失义，以塞忠谏之路也。", "    宫中府中，俱为一体；陟罚臧否，不宜异同。若有作奸犯科及为忠善者，宜付有司论其刑赏，以昭陛下平明之理，不宜偏私，使内外异法也。", "    侍中、侍郎郭攸之、费祎、董允等，此皆良实，志虑忠纯，是以先帝简拔以遗陛下。愚以为宫中之事，事无大小，悉以咨之，然后施行，必能裨补阙漏，有所广益。", "    将军向宠，性行淑均，晓畅军事，试用于昔日，先帝称之曰能，是以众议举宠为督。愚以为营中之事，悉以咨之，必能使行阵和睦，优劣得所。", "    亲贤臣，远小人，此先汉所以兴隆也；亲小人，远贤臣，此后汉所以倾颓也。先帝在时，每与臣论此事，未尝不叹息痛恨于桓、灵也。侍中、尚书、长史、参军，此悉贞良死节之臣，愿陛下亲之信之，则汉室之隆，可计日而待也。", "    臣本布衣，躬耕于南阳，苟全性命于乱世，不求闻达于诸侯。先帝不以臣卑鄙，猥自枉屈，三顾臣于草庐之中，咨臣以当世之事，由是感激，遂许先帝以驱驰。后值倾覆，受任于败军之际，奉命于危难之间，尔来二十有一年矣。", "    先帝知臣谨慎，故临崩寄臣以大事也。受命以来，夙夜忧叹，恐托付不效，以伤先帝之明；故五月渡泸，深入不毛。今南方已定，兵甲已足，当奖率三军，北定中原，庶竭驽钝，攘除奸凶，兴复汉室，还于旧都。此臣所以报先帝而忠陛下之职分也。至于斟酌损益，进尽忠言，则攸之、祎、允之任也。", "    愿陛下托臣以讨贼兴复之效，不效，则治臣之罪，以告先帝之灵。若无兴德之言，则责攸之、祎、允等之慢，以彰其咎；陛下亦宜自谋，以咨诹善道，察纳雅言，深追先帝遗诏。臣不胜受恩感激。今当远离，临表涕零，不知所言。"], "img": false}, {"i": 480, "t": "十五从军征", "d": "", "a": "", "l": ["《乐府诗集》〔两汉〕", "十五从军征，八十始得归。", "道逢乡里人：“家中有阿谁？”", "“遥看是君家，松柏冢累累。”", "兔从狗窦入，雉从梁上飞。", "中庭生旅谷，井上生旅葵。", "舂谷持作饭，采葵持作羹。", "羹饭一时熟，不知饴阿谁。", "出门东向看，泪落沾我衣。"], "img": false}, {"i": 481, "t": "南乡子·登京口北固亭有怀", "d": "", "a": "", "l": ["辛弃疾〔宋代〕", "何处望神州？满眼风光北固楼。千古兴亡多少事？悠悠。不尽长江滚滚流。", "年少万兜鍪，坐断东南战未休。天下英雄谁敌手？曹刘。生子当如孙仲谋。", "万兜(dōu)鍪(móu)：指千军万马。原指古代作战时兵士所带的头盔，这里代指士兵。", "坐断：坐镇，占据，割据。"], "img": false}, {"i": 482, "t": "山坡羊·潼关怀古", "d": "", "a": "", "l": ["张养浩〔元代〕", "峰峦如聚，波涛如怒，山河表里潼关路。望西都，意踌躇。", "伤心秦汉经行处，宫阙万间都做了土。兴，百姓苦；亡，百姓苦。"], "img": false}, {"i": 483, "t": "定风波·莫听", "d": "", "a": "", "l": ["三月七日，沙湖道中遇雨，雨具先去，同行皆狼狈，余独不觉。已而遂晴，故作此(词)。", "莫听穿林打叶声，何妨吟啸且徐行。竹杖芒鞋轻胜马，谁怕？一蓑烟雨任平生。", "料峭春风吹酒醒，微冷，山头斜照却相迎。回首向来萧瑟处，归去，也无风雨也无晴。"], "img": false}, {"i": 484, "t": "临江仙·夜登小阁忆洛中旧游", "d": "", "a": "", "l": ["陈与义〔宋代〕", "忆昔午桥桥上饮，坐中多是豪英。长沟流月去无声。杏花疏影里，吹笛到天明。", "二十余年如一梦，此身虽在堪惊。闲登小阁看新晴。古今多少事，渔唱起三更。"], "img": false}, {"i": 485, "t": "太常引·建康中秋夜为吕叔潜赋", "d": "", "a": "", "l": ["辛弃疾〔宋代〕", "一轮秋影转金波，飞镜又重磨。把酒问姮娥：被白发，欺人奈何？", "乘风好去，长空万里，直下看山河。斫去桂婆娑，人道是，清光更多。"], "img": false}, {"i": 486, "t": "浣溪沙·身向", "d": "", "a": "", "l": ["纳兰性德〔清代〕", "身向云山那畔行，北风吹断马嘶声，深秋远塞若为情！", "一抹晚烟荒戍垒，半竿斜日旧关城。古今幽恨几时平！"], "img": false}, {"i": 487, "t": "南安军", "d": "", "a": "", "l": ["文天祥〔宋代〕", "梅花南北路，风雨湿征衣。", "出岭同谁出？归乡如此归！", "山河千古在，城郭一时非。", "饿死真吾志，梦中行采薇。"], "img": false}, {"i": 488, "t": "别云间", "d": "", "a": "", "l": ["夏完淳〔明代〕", "三年羁旅客，今日又南冠。", "无限山河泪，谁言天地宽。", "已知泉路近，欲别故乡难。", "毅魄归来日，灵旗空际看。"], "img": false}, {"i": 489, "t": "山坡羊·骊山怀古", "d": "", "a": "", "l": ["张养浩〔元代〕", "骊山四顾，阿房一炬，当时奢侈今何处？只见草萧疏，水萦纡。", "至今遗恨迷烟树。列国周齐秦汉楚。赢，都变做了土；输，都变做了土。"], "img": false}, {"i": 490, "t": "芣苢", "d": "", "a": "", "l": ["诗经·国风·周南〔先秦〕", "采采芣苢，薄言采之。", "采采芣苢，薄言有之。", "采采芣苢，薄言掇之。", "采采芣苢，薄言捋之。", "采采芣苢，薄言袺之。", "采采芣苢，薄言襭之。"], "img": false}, {"i": 491, "t": "插秧歌", "d": "", "a": "", "l": ["杨万里〔宋代〕", "田夫抛秧田妇接，小儿拔秧大儿插。", "笠是兜鍪蓑是甲，雨从头上湿到胛。", "唤渠朝餐歇半霎，低头折腰只不答。", "秧根未牢莳未匝，照管鹅儿与雏鸭。"], "img": false}, {"i": 492, "t": "沁园春·长沙", "d": "", "a": "", "l": ["毛泽东〔近现代〕", "    独立寒秋，湘江北去，橘子洲头。看万山红遍，层林尽染；漫江碧透，百舸争流。鹰击长空，鱼翔浅底，万类霜天竞自由。怅寥廓，问苍茫大地，谁主沉浮？", "    携来百侣曾游。忆往昔峥嵘岁月稠。恰同学少年，风华正茂；书生意气，挥斥方遒。指点江山，激扬文字，粪土当年万户侯。曾记否，到中流击水，浪遏飞舟？"], "img": false}, {"i": 493, "t": "师说", "d": "", "a": "", "l": ["韩愈〔唐代〕", "古之学者必有师。师者，所以传道受业解惑也。人非生而知之者，孰能无惑？惑而不从师，其为惑也，终不解矣。生乎吾前，其闻道也固先乎吾，吾从而师之；生乎吾后，其闻道也亦先乎吾，吾从而师之。吾师道也，夫庸知其年之先后生于吾乎？是故无贵无贱，无长无少，道之所存，师之所存也。", "嗟乎！师道之不传也久矣！欲人之无惑也难矣！古之圣人，其出人也远矣，犹且从师而问焉；今之众人，其下圣人也亦远矣，而耻学于师。是故圣益圣，愚益愚。圣人之所以为圣，愚人之所以为愚，其皆出于此乎？爱其子，择师而教之；于其身也，则耻师焉，惑矣。彼童子之师，授之书而习其句读者，非吾所谓传其道解其惑者也。句读之不知，惑之不解，或师焉，或不焉，小学而大遗，吾未见其明也。巫医乐师百工之人，不耻相师。士大夫之族，曰师曰弟子云者，则群聚而笑之。问之，则曰：“彼与彼年相若也，道相似也，位卑则足羞，官盛则近谀。”呜呼！师道之不复，可知矣。巫医乐师百工之人，君子不齿，今其智乃反不能及，其可怪也欤！", "圣人无常师。孔子师郯子、苌弘、师襄、老聃。郯子之徒，其贤不及孔子。孔子曰：三人行，则必有我师。是故弟子不必不如师，师不必贤于弟子，闻道有先后，术业有专攻，如是而已。", "李氏子蟠，年十七，好古文，六艺经传皆通习之，不拘于时，学于余。余嘉其能行古道，作《师说》以贻之。"], "img": false}, {"i": 494, "t": "赤壁赋", "d": "", "a": "", "l": ["苏轼〔宋代〕", "壬戌之秋，七月既望，苏子与客泛舟游于赤壁之下。清风徐来，水波不兴。举酒属客，诵明月之诗，歌窈窕之章。少焉，月出于东山之上，徘徊于斗牛之间。白露横江，水光接天。纵一苇之所如，凌万顷之茫然。浩浩乎如冯虚御风，而不知其所止；飘飘乎如遗世独立，羽化而登仙。(冯 通：凭)", "于是饮酒乐甚，扣舷而歌之。歌曰：“桂棹兮兰桨，击空明兮溯流光。渺渺兮予怀，望美人兮天一方。”客有吹洞箫者，倚歌而和之。其声呜呜然，如怨如慕，如泣如诉；余音袅袅，不绝如缕。舞幽壑之潜蛟，泣孤舟之嫠妇。", "苏子愀然，正襟危坐而问客曰：“何为其然也？”客曰：“‘月明星稀，乌鹊南飞’，此非曹孟德之诗乎？西望夏口，东望武昌，山川相缪，郁乎苍苍，此非孟德之困于周郎者乎？方其破荆州，下江陵，顺流而东也，舳舻千里，旌旗蔽空，酾酒临江，横槊赋诗，固一世之雄也，而今安在哉？况吾与子渔樵于江渚之上，侣鱼虾而友麋鹿，驾一叶之扁舟，举匏樽以相属。寄蜉蝣于天地，渺沧海之一粟。哀吾生之须臾，羡长江之无穷。挟飞仙以遨游，抱明月而长终。知不可乎骤得，托遗响于悲风。”", "苏子曰：“客亦知夫水与月乎？逝者如斯，而未尝往也；盈虚者如彼，而卒莫消长也。盖将自其变者而观之，则天地曾不能以一瞬；自其不变者而观之，则物与我皆无尽也，而又何羡乎！且夫天地之间，物各有主，苟非吾之所有，虽一毫而莫取。惟江上之清风，与山间之明月，耳得之而为声，目遇之而成色，取之无禁，用之不竭。是造物者之无尽藏也，而吾与子之所共适。”(共适 一作：共食)", "客喜而笑，洗盏更酌。肴核既尽，杯盘狼籍。相与枕藉乎舟中，不知东方之既白。"], "img": false}, {"i": 495, "t": "大学之道", "d": "", "a": "", "l": ["《大学》〔两汉〕", "大学之道，在明明德，在亲民，在止于至善。知止而后有定，定而后能静，静而后能安，安而后能虑，虑而后能得。 物有本末，事有终始。知所先后，则近道矣。", "古之欲明明德于天下者，先治其国。欲治其国者，先齐其家。欲齐其家者，先修其身。欲修其身者，先正其心。欲正其心者，先诚其意。欲诚其意者，先致其知。致知在格物。物格而后知至，知至而后意诚，意诚而后心正，心正而后身修，身修而后家齐，家齐而后国治，国治而后天下平。", "自天子以至于庶人，壹是皆以修身为本。其本乱而末治者，否矣。其所厚者薄，而其所薄者厚，未之有也。此谓知本，此谓知之至也。(部分版本无此段)"], "img": false}, {"i": 496, "t": "归去来兮辞", "d": "", "a": "", "l": ["陶渊明〔魏晋〕", "余家贫，耕植不足以自给。幼稚盈室，瓶无储粟，生生所资，未见其术。亲故多劝余为长吏，脱然有怀，求之靡途。会有四方之事，诸侯以惠爱为德，家叔以余贫苦，遂见用于小邑。于时风波未静，心惮远役，彭泽去家百里，公田之利，足以为酒。故便求之。及少日，眷然有归欤之情。何则？质性自然，非矫厉所得。饥冻虽切，违己交病。尝从人事，皆口腹自役。于是怅然慷慨，深愧平生之志。犹望一稔，当敛裳宵逝。寻程氏妹丧于武昌，情在骏奔，自免去职。仲秋至冬，在官八十余日。因事顺心，命篇曰《归去来兮》。乙巳岁十一月也。", "归去来兮，田园将芜胡不归？既自以心为形役，奚惆怅而独悲？悟已往之不谏，知来者之可追。实迷途其未远，觉今是而昨非。舟遥遥以轻飏，风飘飘而吹衣。问征夫以前路，恨晨光之熹微。", "乃瞻衡宇，载欣载奔。僮仆欢迎，稚子候门。三径就荒，松菊犹存。携幼入室，有酒盈樽。引壶觞以自酌，眄庭柯以怡颜。倚南窗以寄傲，审容膝之易安。园日涉以成趣，门虽设而常关。策扶老以流憩，时矫首而遐观。云无心以出岫，鸟倦飞而知还。景翳翳以将入，抚孤松而盘桓。", "归去来兮，请息交以绝游。世与我而相违，复驾言兮焉求？悦亲戚之情话，乐琴书以消忧。农人告余以春及，将有事于西畴。或命巾车，或棹孤舟。既窈窕以寻壑，亦崎岖而经丘。木欣欣以向荣，泉涓涓而始流。善万物之得时，感吾生之行休。", "已矣乎！寓形宇内复几时？曷不委心任去留？胡为乎遑遑欲何之？富贵非吾愿，帝乡不可期。怀良辰以孤往，或植杖而耘耔。登东皋以舒啸，临清流而赋诗。聊乘化以归尽，乐夫天命复奚疑！"], "img": false}, {"i": 497, "t": "春夜宴从弟桃花园序", "d": "", "a": "", "l": ["李白〔唐代〕", "夫天地者万物之逆旅也；光阴者百代之过客也。而浮生若梦，为欢几何？古人秉烛夜游，良有以也。", "况阳春召我以烟景，大块假我以文章。会桃花之芳园，序天伦之乐事。群季俊秀，皆为惠连；吾人咏歌，独惭康乐。幽赏未已，高谈转清。开琼筵以坐花，飞羽觞而醉月。不有佳咏，何伸雅怀？如诗不成，罚依金谷酒数。"], "img": false}, {"i": 498, "t": "短歌行", "d": "", "a": "", "l": ["曹操〔两汉〕", "对酒当歌，人生几何！", "譬如朝露，去日苦多。", "慨当以慷，忧思难忘。", "何以解忧？唯有杜康。", "青青子衿，悠悠我心。", "但为君故，沉吟至今。", "呦呦鹿鸣，食野之苹。", "我有嘉宾，鼓瑟吹笙。", "明明如月，何时可掇？", "忧从中来，不可断绝。", "越陌度阡，枉用相存。", "契阔谈讌，心念旧恩。(谈䜩 一作：谈宴)", "月明星稀，乌鹊南飞。", "绕树三匝，何枝可依？", "山不厌高，海不厌深。", "周公吐哺，天下归心。"], "img": false}, {"i": 499, "t": "归园田居·其一", "d": "", "a": "", "l": ["陶渊明〔魏晋〕", "少无适俗韵，性本爱丘山。", "误入尘网中，一去三十年。", "羁鸟恋旧林，池鱼思故渊。", "开荒南野际，守拙归园田。", "方宅十余亩，草屋八九间。", "榆柳荫后檐，桃李罗堂前。", "暧暧远人村，依依墟里烟。", "狗吠深巷中，鸡鸣桑树颠。", "户庭无尘杂，虚室有余闲。", "久在樊笼里，复得返自然。"], "img": false}, {"i": 500, "t": "念奴娇·赤壁怀古", "d": "", "a": "", "l": ["苏轼〔宋代〕", "大江东去，浪淘尽，千古风流人物。", "故垒西边，人道是，三国周郎赤壁。", "乱石穿空，惊涛拍岸，卷起千堆雪。", "江山如画，一时多少豪杰。", "遥想公瑾当年，小乔初嫁了，雄姿英发。羽扇纶巾，谈笑间，樯橹灰飞烟灭。", "故国神游，多情应笑我，早生华发。", "人生如梦，一尊还酹江月。"], "img": false}, {"i": 501, "t": "永遇乐·京口北固亭怀古", "d": "", "a": "", "l": ["辛弃疾〔宋代〕", "    千古江山，英雄无觅孙仲谋处。舞榭歌台，风流总被雨打风吹去。斜阳草树，寻常巷陌，人道寄奴曾住。想当年，金戈铁马，气吞万里如虎。", "    元嘉草草，封狼居胥，赢得仓皇北顾。四十三年，望中犹记，烽火扬州路。可堪回首，佛狸祠下，一片神鸦社鼓。凭谁问：廉颇老矣，尚能饭否？"], "img": false}, {"i": 502, "t": "声声慢·寻寻觅觅", "d": "", "a": "", "l": ["李清照〔宋代〕", "寻寻觅觅，冷冷清清，凄凄惨惨戚戚。乍暖还寒时候，最难将息。三杯两盏淡酒，怎敌他、晚来风急！雁过也，正伤心，却是旧时相识。", "满地黄花堆积，憔悴损，如今有谁堪摘？守着窗儿，独自怎生得黑！梧桐更兼细雨，到黄昏、点点滴滴。这次第，怎一个愁字了得！"], "img": false}, {"i": 503, "t": "静女", "d": "", "a": "", "l": ["诗经·国风·邶风〔先秦〕", "静女其姝，俟我于城隅。爱而不见，搔首踟蹰。", "静女其娈，贻我彤管。彤管有炜，说怿女美。", "自牧归荑，洵美且异。匪女之为美，美人之贻。"], "img": false}, {"i": 504, "t": "虞美人·春花秋月何时了", "d": "", "a": "", "l": ["李煜〔五代〕", "春花秋月何时了？往事知多少。小楼昨夜又东风，故国不堪回首月明中。", "雕栏玉砌应犹在，只是朱颜改。问君能有几多愁？恰似一江春水向东流。"], "img": false}, {"i": 505, "t": "鹊桥仙·纤云弄巧", "d": "", "a": "", "l": ["秦观〔宋代〕", "纤云弄巧，飞星传恨，银汉迢迢暗度。金风玉露一相逢，便胜却人间无数。", "柔情似水，佳期如梦，忍顾鹊桥归路！两情若是久长时，又岂在朝朝暮暮。"], "img": false}, {"i": 506, "t": "惊梦·皂罗袍", "d": "", "a": "", "l": ["汤显祖〔明代〕", "原来姹紫嫣红开遍，似这般都付与断井颓垣。", "良辰美景奈何天，赏心乐事谁家院！", "朝飞暮卷，云霞翠轩；雨丝风片，烟波画船——锦屏人忒看的这韶光贱！"], "img": false}, {"i": 507, "t": "无衣", "d": "", "a": "", "l": ["诗经·国风·秦风〔先秦〕", "岂曰无衣？与子同袍。王于兴师，修我戈矛。与子同仇！", "岂曰无衣？与子同泽。王于兴师，修我矛戟。与子偕作！", "岂曰无衣？与子同裳。王于兴师，修我甲兵。与子偕行！"], "img": false}, {"i": 508, "t": "春江花月夜", "d": "", "a": "", "l": ["张若虚〔唐代〕", "春江潮水连海平，海上明月共潮生。", "滟滟随波千万里，何处春江无月明。", "江流宛转绕芳甸，月照花林皆似霰。", "空里流霜不觉飞，汀上白沙看不见。", "江天一色无纤尘，皎皎空中孤月轮。", "江畔何人初见月？江月何年初照人？", "人生代代无穷已，江月年年望相似。", "不知江月待何人，但见长江送流水。", "白云一片去悠悠，青枫浦上不胜愁。", "谁家今夜扁舟子？何处相思明月楼？", "可怜楼上月裴回，应照离人妆镜台。", "玉户帘中卷不去，捣衣砧上拂还来。", "此时相望不相闻，愿逐月华流照君。", "鸿雁长飞光不度，鱼龙潜跃水成文。", "昨夜闲潭梦落花，可怜春半不还家。", "江水流春去欲尽，江潭落月复西斜。", "斜月沉沉藏海雾，碣石潇湘无限路。", "不知乘月几人归，落月摇情满江树。"], "img": false}, {"i": 509, "t": "江城子·乙卯正月二十日夜记梦", "d": "", "a": "", "l": ["苏轼〔宋代〕", "十年生死两茫茫，不思量，自难忘。千里孤坟，无处话凄凉。纵使相逢应不识，尘满面，鬓如霜。", "夜来幽梦忽还乡，小轩窗，正梳妆。相顾无言，惟有泪千行。料得年年肠断处，明月夜，短松冈。"], "img": false}, {"i": 510, "t": "书愤", "d": "", "a": "", "l": ["陆游〔宋代〕", "早岁那知世事艰，中原北望气如山。", "楼船夜雪瓜洲渡，铁马秋风大散关。", "塞上长城空自许，镜中衰鬓已先斑。", "出师一表真名世，千载谁堪伯仲间！"], "img": false}, {"i": 511, "t": "离骚", "d": "", "a": "", "l": ["屈原〔先秦〕", "帝高阳之苗裔兮，朕皇考曰伯庸。", "摄提贞于孟陬兮，惟庚寅吾以降。", "皇览揆余初度兮，肇锡余以嘉名：", "名余曰正则兮，字余曰灵均。", "纷吾既有此内美兮，又重之以修能。", "扈江离与辟芷兮，纫秋兰以为佩。", "汩余若将不及兮，恐年岁之不吾与。", "朝搴阰之木兰兮，夕揽洲之宿莽。", "日月忽其不淹兮，春与秋其代序。", "惟草木之零落兮，恐美人之迟暮。", "不抚壮而弃秽兮，何不改此度？", "乘骐骥以驰骋兮，来吾道夫先路！", "昔三后之纯粹兮，固众芳之所在。", "杂申椒与菌桂兮，岂惟纫夫蕙茝！", "彼尧、舜之耿介兮，既遵道而得路。", "何桀纣之猖披兮，夫唯捷径以窘步。", "惟夫党人之偷乐兮，路幽昧以险隘。", "岂余身之惮殃兮，恐皇舆之败绩！", "忽奔走以先后兮，及前王之踵武。", "荃不查余之中情兮，反信谗而齌怒。", "余固知謇謇之为患兮，忍而不能舍也。", "指九天以为正兮，夫唯灵修之故也。", "曰黄昏以为期兮，羌中道而改路！", "初既与余成言兮，后悔遁而有他。", "余既不难夫离别兮，伤灵修之数化。", "余既滋兰之九畹兮，又树蕙之百亩。", "畦留夷与揭车兮，杂杜衡与芳芷。", "冀枝叶之峻茂兮，愿俟时乎吾将刈。", "虽萎绝其亦何伤兮，哀众芳之芜秽。", "众皆竞进以贪婪兮，凭不厌乎求索。", "羌内恕己以量人兮，各兴心而嫉妒。", "忽驰骛以追逐兮，非余心之所急。", "老冉冉其将至兮，恐修名之不立。", "朝饮木兰之坠露兮，夕餐秋菊之落英。", "苟余情其信姱以练要兮，长顑颔亦何伤。", "掔木根以结茝兮，贯薜荔之落蕊。", "矫菌桂以纫蕙兮，索胡绳之纚纚。", "謇吾法夫前修兮，非世俗之所服。", "虽不周于今之人兮，愿依彭咸之遗则。", "长太息以掩涕兮，哀民生之多艰。", "余虽好修姱以鞿羁兮，謇朝谇而夕替。", "既替余以蕙纕兮，又申之以揽茝。", "亦余心之所善兮，虽九死其犹未悔。", "怨灵修之浩荡兮，终不察夫民心。", "众女嫉余之蛾眉兮，谣诼谓余以善淫。", "固时俗之工巧兮，偭规矩而改错。", "背绳墨以追曲兮，竞周容以为度。", "忳郁邑余侘傺兮，吾独穷困乎此时也。", "宁溘死以流亡兮，余不忍为此态也。", "鸷鸟之不群兮，自前世而固然。", "何方圜之能周兮，夫孰异道而相安？", "屈心而抑志兮，忍尤而攘诟。", "伏清白以死直兮，固前圣之所厚。", "悔相道之不察兮，延伫乎吾将反。", "回朕车以复路兮，及行迷之未远。", "步余马于兰皋兮，驰椒丘且焉止息。", "进不入以离尤兮，退将复修吾初服。", "制芰荷以为衣兮，集芙蓉以为裳。", "不吾知其亦已兮，苟余情其信芳。", "高余冠之岌岌兮，长余佩之陆离。", "芳与泽其杂糅兮，唯昭质其犹未亏。", "忽反顾以游目兮，将往观乎四荒。", "佩缤纷其繁饰兮，芳菲菲其弥章。", "民生各有所乐兮，余独好修以为常。", "虽体解吾犹未变兮，岂余心之可惩。", "女嬃之婵媛兮，申申其詈予曰：", "鲧婞直以亡身兮，终然夭乎羽之野。", "汝何博謇而好修兮，纷独有此姱节？", "薋菉葹以盈室兮，判独离而不服。", "众不可户说兮，孰云察余之中情？", "世并举而好朋兮，夫何茕独而不予听？", "依前圣以节中兮，喟凭心而历兹。", "济沅湘以南征兮，就重华而敶词：", "启《九辩》与《九歌》兮，夏康娱以自纵。", "不顾难以图后兮，五子用失乎家衖。", "羿淫游以佚畋兮，又好射夫封狐。", "固乱流其鲜终兮，浞又贪夫厥家。", "浇身被服强圉兮，纵欲而不忍。", "日康娱而自忘兮，厥首用夫颠陨。", "夏桀之常违兮，乃遂焉而逢殃。", "后辛之菹醢兮，殷宗用而不长。", "汤禹俨而祗敬兮，周论道而莫差。", "举贤才而授能兮，循绳墨而不颇。", "皇天无私阿兮，览民德焉错辅。", "夫维圣哲以茂行兮，苟得用此下土。", "瞻前而顾后兮，相观民之计极。", "夫孰非义而可用兮？孰非善而可服？", "阽余身而危死兮，览余初其犹未悔。", "不量凿而正枘兮，固前修以菹醢。", "曾歔欷余郁邑兮，哀朕时之不当。", "揽茹蕙以掩涕兮，沾余襟之浪浪。", "跪敷衽以陈辞兮，耿吾既得此中正。", "驷玉虬以椉鹥兮，溘埃风余上征。", "朝发轫于苍梧兮，夕余至乎县圃。", "欲少留此灵琐兮，日忽忽其将暮。", "吾令羲和弭节兮，望崦嵫而勿迫。", "路曼曼其修远兮，吾将上下而求索。", "饮余马于咸池兮，总余辔乎扶桑。", "折若木以拂日兮，聊逍遥以相羊。", "前望舒使先驱兮，后飞廉使奔属。", "鸾皇为余先戒兮，雷师告余以未具。", "吾令凤鸟飞腾兮，继之以日夜。", "飘风屯其相离兮，帅云霓而来御。纷总总其离合兮，斑陆离其上下。吾令帝阍开关兮，倚阊阖而望予。时暧暧其将罢兮，结幽兰而延伫。世溷浊而不分兮，好蔽美而嫉妒。朝吾将济于白水兮，登阆风而绁马。忽反顾以流涕兮，哀高丘之无女。溘吾游此春宫兮，折琼枝以继佩。及荣华之未落兮，相下女之可诒。吾令丰隆乘云兮，求宓妃之所在。解佩纕以结言兮，吾令謇修以为理。纷总总其离合兮，忽纬繣其难迁。夕归次于穷石兮，朝濯发乎洧盘。保厥美以骄傲兮，日康娱以淫游。虽信美而无礼兮，来违弃而改求。览相观于四极兮，周流乎天余乃下。望瑶台之偃蹇兮，见有娀之佚女。吾令鸩为媒兮，鸩告余以不好。雄鸠之鸣逝兮，余犹恶其佻巧。心犹豫而狐疑兮，欲自适而不可。凤皇既受诒兮，恐高辛之先我。欲远集而无所止兮，聊浮游以逍遥。及少康之未家兮，留有虞之二姚。理弱而媒拙兮，恐导言之不固。世溷浊而嫉贤兮，好蔽美而称恶。闺中既以邃远兮，哲王又不寤。怀朕情而不发兮，余焉能忍而与此终古？索琼茅以筳篿兮，命灵氛为余占之。曰：两美其必合兮，孰信修而慕之？思九州之博大兮，岂惟是其有女？曰：勉远逝而无狐疑兮，孰求美而释女？何所独无芳草兮，尔何怀乎故宇？世幽昧以昡曜兮，孰云察余之善恶？民好恶其不同兮，惟此党人其独异！户服艾以盈要兮，谓幽兰其不可佩。览察草木其犹未得兮，岂珵美之能当？苏粪壤以充祎兮，谓申椒其不芳。欲从灵氛之吉占兮，心犹豫而狐疑。巫咸将夕降兮，怀椒糈而要之。百神翳其备降兮，九疑缤其并迎。皇剡剡其扬灵兮，告余以吉故。曰：勉升降以上下兮，求矩矱之所同。汤、禹俨而求合兮，挚、咎繇而能调。苟中情其好修兮，又何必用夫行媒？说操筑于傅岩兮，武丁用而不疑。吕望之鼓刀兮，遭周文而得举。宁戚之讴歌兮，齐桓闻以该辅。及年岁之未晏兮，时亦犹其未央。恐鹈鴂之先鸣兮，使夫百草为之不芳。何琼佩之偃蹇兮，众薆然而蔽之。惟此党人之不谅兮，恐嫉妒而折之。时缤纷其变易兮，又何可以淹留？兰芷变而不芳兮，荃蕙化而为茅。何昔日之芳草兮，今直为此萧艾也？岂其有他故兮，莫好修之害也！余以兰为可恃兮，羌无实而容长。委厥美以从俗兮，苟得列乎众芳。椒专佞以慢慆兮，樧又欲充夫佩帏。既干进而务入兮，又何芳之能祗？固时俗之流从兮，又孰能无变化？览椒兰其若兹兮，又况揭车与江离？惟兹佩之可贵兮，委厥美而历兹。芳菲菲而难亏兮，芬至今犹未沬。和调度以自娱兮，聊浮游而求女。及余饰之方壮兮，周流观乎上下。灵氛既告余以吉占兮，历吉日乎吾将行。折琼枝以为羞兮，精琼爢以为粻。为余驾飞龙兮，杂瑶象以为车。何离心之可同兮？吾将远逝以自疏。邅吾道夫昆仑兮，路修远以周流。扬云霓之晻蔼兮，鸣玉鸾之啾啾。朝发轫于天津兮，夕余至乎西极。凤皇翼其承旗兮，高翱翔之翼翼。忽吾行此流沙兮，遵赤水而容与。麾蛟龙使梁津兮，诏西皇使涉予。路修远以多艰兮，腾众车使径待。路不周以左转兮，指西海以为期。屯余车其千乘兮，齐玉轪而并驰。驾八龙之婉婉兮，载云旗之委蛇。抑志而弭节兮，神高驰之邈邈。奏《九歌》而舞《韶》兮，聊假日以媮乐。陟升皇之赫戏兮，忽临睨夫旧乡。仆夫悲余马怀兮，蜷局顾而不行。乱曰：已矣哉！国无人莫我知兮，又何怀乎故都！既莫足与为美政兮，吾将从彭咸之所居！"], "img": false}, {"i": 512, "t": "扬州慢·淮左名都", "d": "", "a": "", "l": ["姜夔〔宋代〕", "淳熙丙申至日，予过维扬。夜雪初霁，荠麦弥望。入其城，则四顾萧条，寒水自碧，暮色渐起，戍角悲吟。予怀怆然，感慨今昔，因自度此曲。千岩老人以为有《黍离》之悲也。", "淮左名都，竹西佳处，解鞍少驻初程。过春风十里，尽荠麦青青。自胡马窥江去后，废池乔木，犹厌言兵。渐黄昏，清角吹寒，都在空城。", "杜郎俊赏，算而今，重到须惊。纵豆蔻词工，青楼梦好，难赋深情。二十四桥仍在，波心荡，冷月无声。念桥边红药，年年知为谁生？"], "img": false}, {"i": 513, "t": "兰亭集序", "d": "", "a": "", "l": ["王羲之〔魏晋〕", "永和九年，岁在癸丑，暮春之初，会于会稽山阴之兰亭，修禊事也。群贤毕至，少长咸集。此地有崇山峻岭，茂林修竹；又有清流激湍，映带左右，引以为流觞曲水，列坐其次。虽无丝竹管弦之盛，一觞一咏，亦足以畅叙幽情。", "是日也，天朗气清，惠风和畅。仰观宇宙之大，俯察品类之盛，所以游目骋怀，足以极视听之娱，信可乐也。", "夫人之相与，俯仰一世，或取诸怀抱，悟言一室之内；或因寄所托，放浪形骸之外。虽趣舍万殊，静躁不同，当其欣于所遇，暂得于己，快然自足，不知老之将至。及其所之既倦，情随事迁，感慨系之矣。向之所欣，俯仰之间，已为陈迹，犹不能不以之兴怀。况修短随化，终期于尽。古人云：“死生亦大矣。”岂不痛哉！", "每览昔人兴感之由，若合一契，未尝不临文嗟悼，不能喻之于怀。固知一死生为虚诞，齐彭殇为妄作。后之视今，亦犹今之视昔。悲夫！故列叙时人，录其所述，虽世殊事异，所以兴怀，其致一也。后之览者，亦将有感于斯文。"], "img": false}, {"i": 514, "t": "拟行路难·其四", "d": "", "a": "", "l": ["鲍照〔南北朝〕", "泻水置平地，各自东西南北流。", "人生亦有命，安能行叹复坐愁？", "酌酒以自宽，举杯断绝歌路难。", "心非木石岂无感，吞声踯躅不敢言。"], "img": false}, {"i": 515, "t": "登快阁", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "痴儿了却公家事，快阁东西倚晚晴。", "落木千山天远大，澄江一道月分明。", "朱弦已为佳人绝，青眼聊因美酒横。", "万里归船弄长笛，此心吾与白鸥盟。"], "img": false}, {"i": 516, "t": "临安春雨初霁", "d": "", "a": "", "l": ["陆游〔宋代〕", "世味年来薄似纱，谁令骑马客京华。", "小楼一夜听春雨，深巷明朝卖杏花。", "矮纸斜行闲作草，晴窗细乳戏分茶。", "素衣莫起风尘叹，犹及清明可到家。"], "img": false}, {"i": 517, "t": "咏怀八十二首·夜中", "d": "", "a": "", "l": ["阮籍〔魏晋〕", "夜中不能寐，起坐弹鸣琴。", "薄帷鉴明月，清风吹我襟。", "孤鸿号外野，翔鸟鸣北林。", "徘徊将何见？忧思独伤心。"], "img": false}, {"i": 518, "t": "九歌·湘夫人", "d": "", "a": "", "l": ["屈原〔先秦〕", "帝子降兮北渚，目眇眇兮愁予。", "袅袅兮秋风，洞庭波兮木叶下。", "登白薠兮骋望，与佳期兮夕张。", "鸟何萃兮蘋中，罾何为兮木上？", "沅有芷兮澧有兰，思公子兮未敢言。", "荒忽兮远望，观流水兮潺湲。", "麋何食兮庭中？蛟何为兮水裔？", "朝驰余马兮江皋，夕济兮西澨。", "闻佳人兮召予，将腾驾兮偕逝。", "筑室兮水中，葺之兮荷盖。", "荪壁兮紫坛，播芳椒兮成堂。", "桂栋兮兰橑，辛夷楣兮药房。", "罔薜荔兮为帷，擗蕙櫋兮既张。", "白玉兮为镇，疏石兰兮为芳。", "芷葺兮荷屋，缭之兮杜衡。", "合百草兮实庭，建芳馨兮庑门。", "九嶷缤兮并迎，灵之来兮如云。", "捐余袂兮江中，遗余褋兮澧浦。", "搴汀洲兮杜若，将以遗兮远者。", "时不可兮骤得，聊逍遥兮容与。"], "img": false}, {"i": 519, "t": "杂诗十二首·白日", "d": "", "a": "", "l": ["陶渊明〔魏晋〕", "白日沦西河，素月出东岭。", "遥遥万里晖，荡荡空中景。", "风来入房户，夜中枕席冷。", "气变悟时易，不眠知夕永。", "欲言无予和，挥杯劝孤影。", "日月掷人去，有志不获骋。", "念此怀悲凄，终晓不能静。"], "img": false}, {"i": 520, "t": "一剪梅·红藕", "d": "", "a": "", "l": ["李清照〔宋代〕", "红藕香残玉簟秋。轻解罗裳，独上兰舟。云中谁寄锦书来？雁字回时，月满西楼。", "花自飘零水自流。一种相思，两处闲愁。此情无计可消除，才下眉头，却上心头。"], "img": false}, {"i": 521, "t": "菩萨蛮·人人", "d": "", "a": "", "l": ["韦庄〔唐代〕", "人人尽说江南好，游人只合江南老。春水碧于天，画船听雨眠。", "垆边人似月，皓腕凝霜雪。未老莫还乡，还乡须断肠。"], "img": false}, {"i": 522, "t": "苏幕遮·燎沉香", "d": "", "a": "", "l": ["周邦彦〔宋代〕", "燎沉香，消溽暑。鸟雀呼晴，侵晓窥檐语。叶上初阳干宿雨，水面清圆，一一风荷举。", "故乡遥，何日去？家住吴门，久作长安旅。五月渔郎相忆否？小楫轻舟，梦入芙蓉浦。"], "img": false}, {"i": 523, "t": "九歌·国殇", "d": "", "a": "", "l": ["屈原〔先秦〕", "操吴戈兮被犀甲，车错毂兮短兵接。", "旌蔽日兮敌若云，矢交坠兮士争先。", "凌余阵兮躐余行，左骖殪兮右刃伤。", "霾两轮兮絷四马，援玉枹兮击鸣鼓。", "天时怼兮威灵怒，严杀尽兮弃原野。", "出不入兮往不反，平原忽兮路超远。", "带长剑兮挟秦弓，首身离兮心不惩。", "诚既勇兮又以武，终刚强兮不可凌。", "身既死兮神以灵，子魂魄兮为鬼雄！"], "img": false}, {"i": 524, "t": "菩萨蛮·小山", "d": "", "a": "", "l": ["温庭筠〔唐代〕", "小山重叠金明灭，鬓云欲度香腮雪。懒起画蛾眉，弄妆梳洗迟。", "照花前后镜，花面交相映。新帖绣罗襦，双双金鹧鸪。"], "img": false}, {"i": 525, "t": "少年游·栏干", "d": "", "a": "", "l": ["欧阳修〔宋代〕", "栏干十二独凭春，晴碧远连云。千里万里，二月三月，行色苦愁人。", "谢家池上，江淹浦畔，吟魄与离魂。那堪疏雨滴黄昏。更特地、忆王孙。"], "img": false}, {"i": 526, "t": "玉楼春·春景", "d": "", "a": "", "l": ["宋祁〔宋代〕", "东城渐觉风光好，縠皱波纹迎客棹。", "绿杨烟外晓寒轻，红杏枝头春意闹。", "浮生长恨欢娱少，肯爱千金轻一笑。", "为君持酒劝斜阳，且向花间留晚照。"], "img": false}, {"i": 527, "t": "天仙子·水调", "d": "", "a": "", "l": ["张先〔宋代〕", "时为嘉禾小倅，以病眠，不赴府会。", "水调数声持酒听，午醉醒来愁未醒。送春春去几时回？临晚镜，伤流景，往事后期空记省。", "沙上并禽池上暝，云破月来花弄影。重重帘幕密遮灯，风不定，人初静，明日落红应满径。"], "img": false}, {"i": 528, "t": "摊破浣溪沙·菡萏", "d": "", "a": "", "l": ["李璟〔五代〕", "菡萏香销翠叶残，西风愁起绿波间。还与韶光共憔悴，不堪看。", "细雨梦回鸡塞远，小楼吹彻玉笙寒。多少泪珠无限恨，倚阑干。"], "img": false}, {"i": 529, "t": "青青河畔草.圆中柳", "d": "", "a": "", "l": ["佚名〔两汉〕", "青青河畔草，郁郁园中柳。", "盈盈楼上女，皎皎当窗牖。", "娥娥红粉妆，纤纤出素手。", "昔为倡家女，今为荡子妇。", "荡子行不归，空床难独守。"], "img": false}, {"i": 530, "t": "回车驾言迈", "d": "", "a": "", "l": ["佚名〔两汉〕", "回车驾言迈，悠悠涉长道。", "四顾何茫茫，东风摇百草。", "所遇无故物，焉得不速老。", "盛衰各有时，立身苦不早。", "人生非金石，岂能长寿考？", "奄忽随物化，荣名以为宝。"], "img": false}, {"i": 531, "t": "青青陵", "d": "", "a": "", "l": ["佚名〔两汉〕", "青青陵上柏，磊磊涧中石。", "人生天地间，忽如远行客。", "斗酒相娱乐，聊厚不为薄。", "驱车策驽马，游戏宛与洛。", "洛中何郁郁，冠带自相索。", "长衢罗夹巷，王侯多第宅。", "两宫遥相望，双阙百余尺。", "极宴娱心意，戚戚何所迫？"], "img": false}, {"i": 532, "t": "今日良宴会", "d": "", "a": "", "l": ["佚名〔两汉〕", "今日良宴会，欢乐难具陈。", "弹筝奋逸响，新声妙入神。", "令德唱高言，识曲听其真。", "齐心同所愿，含意俱未申。", "人生寄一世，奄忽若飙尘。", "何不策高足，先据要路津。", "无为守穷贱，轗轲长苦辛。"], "img": false}, {"i": 533, "t": "西北有高楼", "d": "", "a": "", "l": ["佚名〔两汉〕", "西北有高楼，上与浮云齐。", "交疏结绮窗，阿阁三重阶。", "上有弦歌声，音响一何悲！", "谁能为此曲，无乃杞梁妻。", "清商随风发，中曲正徘徊。", "一弹再三叹，慷慨有余哀。", "不惜歌者苦，但伤知音稀。", "愿为双鸿鹄，奋翅起高飞。"], "img": false}, {"i": 534, "t": "明月何皎皎", "d": "", "a": "", "l": ["佚名〔两汉〕", "明月何皎皎，照我罗床帏。", "忧愁不能寐，揽衣起徘徊。", "客行虽云乐，不如早旋归。", "出户独彷徨，愁思当告谁！", "引领还入房，泪下沾裳衣。"], "img": false}, {"i": 535, "t": "冉冉孤生竹", "d": "", "a": "", "l": ["佚名〔两汉〕", "冉冉孤生竹，结根泰山阿。", "与君为新婚，菟丝附女萝。", "菟丝生有时，夫妇会有宜。", "千里远结婚，悠悠隔山陂。", "思君令人老，轩车来何迟！", "伤彼蕙兰花，含英扬光辉。", "过时而不采，将随秋草萎。", "君亮执高节，贱妾亦何为？"], "img": false}, {"i": 536, "t": "行行重行行", "d": "", "a": "", "l": ["佚名〔两汉〕", "行行重行行，与君生别离。", "相去万余里，各在天一涯。", "道路阻且长，会面安可知？", "胡马依北风，越鸟巢南枝。", "相去日已远，衣带日已缓。", "浮云蔽白日，游子不顾反。", "思君令人老，岁月忽已晚。", "弃捐勿复道，努力加餐饭。"], "img": false}, {"i": 537, "t": "东城高且长", "d": "", "a": "", "l": ["佚名〔两汉〕", "东城高且长，逶迤自相属。", "回风动地起，秋草萋已绿。", "四时更变化，岁暮一何速！", "晨风怀苦心，蟋蟀伤局促。", "荡涤放情志，何为自结束！", "燕赵多佳人，美者颜如玉。", "被服罗裳衣，当户理清曲。", "音响一何悲！弦急知柱促。", "驰情整巾带，沉吟聊踯躅。", "思为双飞燕，衔泥巢君屋。"], "img": false}, {"i": 538, "t": "驱车上东门", "d": "", "a": "", "l": ["佚名〔两汉〕", "驱车上东门，遥望郭北墓。", "白杨何萧萧，松柏夹广路。", "下有陈死人，杳杳即长暮。", "潜寐黄泉下，千载永不寤。", "浩浩阴阳移，年命如朝露。", "人生忽如寄，寿无金石固。", "万岁更相迭，贤圣莫能度。", "服食求神仙，多为药所误。", "不如饮美酒，被服纨与素。"], "img": false}, {"i": 539, "t": "去者日以疏", "d": "", "a": "", "l": ["佚名〔两汉〕", "去者日以疏，来者日以亲。", "出郭门直视，但见丘与坟。", "古墓犁为田，松柏摧为薪。", "白杨多悲风，萧萧愁杀人。", "思还故里闾，欲归道无因。"], "img": false}, {"i": 540, "t": "凛凛岁云暮", "d": "", "a": "", "l": ["佚名〔两汉〕", "凛凛岁云暮，蝼蛄夕鸣悲。", "凉风率已厉，游子寒无衣。", "锦衾遗洛浦，同袍与我违。", "独宿累长夜，梦想见容辉。", "良人惟古欢，枉驾惠前绥。", "愿得常巧笑，携手同车归。", "既来不须臾，又不处重闱。", "亮无晨风翼，焉能凌风飞？", "眄睐以适意，引领遥相睎。", "徙倚怀感伤，垂涕沾双扉。"], "img": false}, {"i": 541, "t": "孟冬寒气至", "d": "", "a": "", "l": ["佚名〔两汉〕", "孟冬寒气至，北风何惨栗。", "愁多知夜长，仰观众星列。", "三五明月满，四五蟾兔缺。", "客从远方来，遗我一书札。", "上言长相思，下言久离别。", "置书怀袖中，三岁字不灭。", "一心抱区区，惧君不识察。"], "img": false}, {"i": 542, "t": "客从远方来", "d": "", "a": "", "l": ["佚名〔两汉〕", "客从远方来，遗我一端绮。", "相去万余里，故人心尚尔。", "文采双鸳鸯，裁为合欢被。", "著以长相思，缘以结不解。", "以胶投漆中，谁能别离此？"], "img": false}, {"i": 543, "t": "明月皎夜光", "d": "", "a": "", "l": ["佚名〔两汉〕", "明月皎夜光，促织鸣东壁。", "玉衡指孟冬，众星何历历。", "白露沾野草，时节忽复易。", "秋蝉鸣树间，玄鸟逝安适。", "昔我同门友，高举振六翮。", "不念携手好，弃我如遗迹。", "南箕北有斗，牵牛不负轭。", "良无盘石固，虚名复何益？"], "img": false}, {"i": 544, "t": "迢迢牵牛星", "d": "", "a": "", "l": ["佚名〔两汉〕", "迢迢牵牛星，皎皎河汉女。", "纤纤擢素手，札札弄机杼。", "终日不成章，泣涕零如雨。", "河汉清且浅，相去复几许。", "盈盈一水间，脉脉不得语。"], "img": false}, {"i": 545, "t": "涉江采芙蓉", "d": "", "a": "", "l": ["佚名〔两汉〕", "涉江采芙蓉，兰泽多芳草。", "采之欲遗谁？所思在远道。", "还顾望旧乡，长路漫浩浩。", "同心而离居，忧伤以终老。"], "img": false}, {"i": 546, "t": "庭中有奇树", "d": "", "a": "", "l": ["佚名〔两汉〕", "庭中有奇树，绿叶发华滋。", "攀条折其荣，将以遗所思。", "馨香盈怀袖，路远莫致之。", "此物何足贵？但感别经时。"], "img": false}, {"i": 547, "t": "生年不满百", "d": "", "a": "", "l": ["佚名 两汉", "生年不满百，常怀千岁忧。", "昼短苦夜长，何不秉烛游！", "为乐当及时，何能待来兹？", "愚者爱惜费，但为后世嗤。", "仙人王子乔，难可与等期。"], "img": false}, {"i": 548, "t": "如梦令·昨夜", "d": "", "a": "", "l": ["李清照〔宋代〕", "昨夜雨疏风骤，浓睡不消残酒。", "试问卷帘人，却道海棠依旧。", "知否，知否？应是绿肥红瘦。"], "img": false}, {"i": 549, "t": "鹊踏枝·六曲", "d": "", "a": "", "l": ["冯延巳(一说晏殊)〔五代〕", "六曲阑干偎碧树，杨柳风轻，展尽黄金缕。", "谁把钿筝移玉柱，穿帘海燕双飞去。", "满眼游丝兼落絮，红杏开时，一霎清明雨。", "浓睡觉来莺乱语，惊残好梦无寻处。"], "img": false}, {"i": 550, "t": "夜行船·满眼", "d": "", "a": "", "l": ["欧阳修〔宋代〕", "满眼东风飞絮。催行色、短亭春暮。落花流水草连云，看看是、断肠南浦。", "檀板未终人去去。扁舟在、绿杨深处。手把金樽难为别，更那听、乱莺疏雨。"], "img": false}, {"i": 551, "t": "绵州巴歌", "d": "", "a": "", "l": ["佚名〔隋代〕", "豆子山，打瓦鼓。", "扬平山，撒白雨。", "下白雨，取龙女。", "织得绢，二丈五。", "一半属罗江，一半属玄武。"], "img": false}, {"i": 552, "t": "橘柚垂华实", "d": "", "a": "", "l": ["佚名〔两汉〕", "橘柚垂华实，乃在深山侧。", "闻君好我甘，窃独自雕饰。", "委身玉盘中，历年冀见食。", "芳菲不相投，青黄忽改色。", "人倘欲我知，因君为羽翼。"], "img": false}, {"i": 553, "t": "华清宫三首·门横", "d": "", "a": "", "l": ["崔橹〔唐代〕", "门横金锁悄无人，落日秋声渭水滨。", "红叶下山寒寂寂，湿云如梦雨如尘。"], "img": false}, {"i": 554, "t": "题三义塔", "d": "", "a": "", "l": ["三义塔者，中国上海闸北三义里遗鸠埋骨之塔也，在日本，农人共建。", "奔霆飞熛歼人子，败井颓垣剩饿鸠。", "偶值大心离火宅，终遗高塔念瀛洲。", "精禽梦觉仍衔石，斗士诚坚共抗流。", "度尽劫波兄弟在，相逢一笑泯恩仇。", "西村博士于上海战后得丧家之鸠，持归养之，初亦相安，而终化去。建塔以藏，且征题咏，率成一律，聊答遐情云尔。熛(biāo)鸠(jiū)"], "img": false}, {"i": 555, "t": "金陵五题·石头城", "d": "", "a": "", "l": ["刘禹锡〔唐代〕", "山围故国周遭在，潮打空城寂寞回。", "淮水东边旧时月，夜深还过女墙来。"], "img": false}, {"i": 556, "t": "赠去婢", "d": "", "a": "", "l": ["崔郊〔唐代〕", "公子王孙逐后尘，绿珠垂泪滴罗巾。", "侯门一入深如海，从此萧郎是路人。"], "img": false}, {"i": 557, "t": "菩萨蛮·回文夏闺怨", "d": "", "a": "", "l": ["苏轼〔宋代〕", "柳庭风静人眠昼，昼眠人静风庭柳。香汗薄衫凉，凉衫薄汗香。", "手红冰碗藕，藕碗冰红手。郎笑藕丝长，长丝藕笑郎。"], "img": false}, {"i": 558, "t": "满庭芳·蜗角", "d": "", "a": "", "l": ["苏轼〔宋代〕", "蜗角虚名，蝇头微利，算来著甚干忙。事皆前定，谁弱又谁强。且趁闲身未老，尽放我、些子疏狂。百年里，浑教是醉，三万六千场。", "思量。能几许，忧愁风雨，一半相妨，又何须抵死，说短论长。幸对清风皓月，苔茵展、云幕高张。江南好，千钟美酒，一曲满庭芳。"], "img": false}, {"i": 559, "t": "自题金山画像", "d": "", "a": "", "l": ["苏轼〔宋代〕", "心似已灰之木，身如不系之舟。", "问汝平生功业，黄州惠州儋州。"], "img": false}, {"i": 560, "t": "水龙吟·杨花词", "d": "", "a": "", "l": ["苏轼〔宋代〕", "似花还似非花，也无人惜从教坠。抛家傍路，思量却是，无情有思。萦损柔肠，困酣娇眼，欲开还闭。梦随风万里，寻郎去处，又还被、莺呼起。", "不恨此花飞尽，恨西园、落红难缀。晓来雨过，遗踪何在？一池萍碎。春色三分，二分尘土，一分流水。细看来，不是杨花，点点是离人泪。"], "img": false}, {"i": 561, "t": "浣溪沙·细雨", "d": "", "a": "", "l": ["苏轼〔宋代〕", "元丰七年十二月二十四日，从泗州刘倩叔游南山", "细雨斜风作晓寒，淡烟疏柳媚晴滩。入淮清洛渐漫漫。", "雪沫乳花浮午盏，蓼茸蒿笋试春盘。人间有味是清欢。"], "img": false}, {"i": 562, "t": "临江仙·送钱穆父", "d": "", "a": "", "l": ["苏轼〔宋代〕", "一别都门三改火，天涯踏尽红尘。依然一笑作春温。无波真古井，有节是秋筠。", "惆怅孤帆连夜发，送行淡月微云。樽前不用翠眉颦。人生如逆旅，我亦是行人。"], "img": false}, {"i": 563, "t": "八六子·倚危亭", "d": "", "a": "", "l": ["秦观 宋", "倚危亭。恨如芳草，萋萋刬尽还生。念柳外青骢别后，水边红袂分时，怆然暗惊。", "无端天与娉婷。夜月一帘幽梦，春风十里柔情。", "怎奈向、欢娱渐随流水，素弦声断，翠绡香减，那堪片片飞花弄晚，蒙蒙残雨笼晴。正销凝。黄鹂又啼数声。"], "img": false}, {"i": 564, "t": "江城子·西城", "d": "", "a": "", "l": ["秦观〔宋代〕", "西城杨柳弄春柔，动离忧，泪难收。犹记多情、曾为系归舟。碧野朱桥当日事，人不见，水空流。", "韶华不为少年留，恨悠悠，几时休？飞絮落花时候、一登楼。便作春江都是泪，流不尽，许多愁。"], "img": false}, {"i": 565, "t": "踏莎行·郴州旅舍", "d": "", "a": "", "l": ["秦观〔宋代〕", "雾失楼台，月迷津渡。桃源望断无寻处。可堪孤馆闭春寒，杜鹃声里斜阳暮。", "驿寄梅花，鱼传尺素。砌成此恨无重数。郴江幸自绕郴山，为谁流下潇湘去。"], "img": false}, {"i": 566, "t": "水调歌头·重上井冈山", "d": "", "a": "", "l": ["毛泽东〔近现代〕", "久有凌云志，重上井冈山。千里来寻故地，旧貌变新颜。到处莺歌燕舞，更有潺潺流水，高路入云端。过了黄洋界，险处不须看。", "风雷动，旌旗奋，是人寰。三十八年过去，弹指一挥间。可上九天揽月，可下五洋捉鳖，谈笑凯歌还。世上无难事，只要肯登攀。"], "img": false}, {"i": 567, "t": "株林", "d": "", "a": "", "l": ["诗经·国风·陈风〔先秦〕", "胡为乎株林？从夏南！", "匪适株林，从夏南！", "驾我乘马，说于株野。", "乘我乘驹，朝食于株！"], "img": false}, {"i": 568, "t": "正月二十日与潘郭二生出郊寻春忽记去年是日同至女王城作诗乃和前韵", "d": "", "a": "", "l": ["苏轼〔宋代〕", "东风未肯入东门，走马还寻去岁村。", "人似秋鸿来有信，事如春梦了无痕。", "江城白酒三杯酽，野老苍颜一笑温。", "已约年年为此会，故人不用赋招魂。"], "img": false}, {"i": 569, "t": "花影", "d": "", "a": "", "l": ["苏轼〔宋代〕", "重重叠叠上瑶台，几度呼童扫不开。", "刚被太阳收拾去，却教明月送将来。(却教 一作：又教)"], "img": false}, {"i": 570, "t": "於潜僧绿筠轩", "d": "", "a": "", "l": ["苏轼〔宋代〕", "宁可食无肉，不可居无竹。", "无肉令人瘦，无竹令人俗。", "人瘦尚可肥，士俗不可医。", "旁人笑此言，似高还似痴。", "若对此君仍大嚼，世间那有扬州鹤？"], "img": false}, {"i": 571, "t": "惠州一绝", "d": "", "a": "", "l": ["苏轼〔宋代〕", "罗浮山下四时春，卢橘杨梅次第新。", "日啖荔枝三百颗，不辞长作岭南人。"], "img": false}, {"i": 572, "t": "和子由渑池怀旧", "d": "", "a": "", "l": ["苏轼〔宋代〕", "人生到处知何似，应似飞鸿踏雪泥。", "泥上偶然留指爪，鸿飞那复计东西。", "老僧已死成新塔，坏壁无由见旧题。", "往日崎岖还记否，路长人困蹇驴嘶。"], "img": false}, {"i": 573, "t": "春宵", "d": "", "a": "", "l": ["苏轼〔宋代〕", "春宵一刻值千金，花有清香月有阴。", "歌管楼台声细细，秋千院落夜沉沉。"], "img": false}, {"i": 574, "t": "西江月·中秋和子由", "d": "", "a": "", "l": ["苏轼〔宋代〕", "世事一场大梦，人生几度秋凉？夜来风叶已鸣廊。看取眉头鬓上。", "酒贱常愁客少，月明多被云妨。中秋谁与共孤光。把盏凄然北望。"], "img": false}, {"i": 575, "t": "寄蜀中薛涛校书", "d": "", "a": "", "l": ["王建〔唐代〕", "万里桥边女校书，枇杷花里闭门居。", "扫眉才子知多少，管领春风总不如。"], "img": false}, {"i": 576, "t": "蝶恋花·阅", "d": "", "a": "", "l": ["王国维〔近现代〕", "阅尽天涯离别苦，不道归来，零落花如许。花底相看无一语，绿窗春与天俱莫。", "待把相思灯下诉，一缕新欢，旧恨千千缕。最是人间留不住，朱颜辞镜花辞树。"], "img": false}, {"i": 577, "t": "赠花卿", "d": "", "a": "", "l": ["杜甫〔唐代〕", "锦城丝管日纷纷，半入江风半入云。", "此曲只应天上有，人间能得几回闻。"], "img": false}, {"i": 578, "t": "定风波·南海归赠王定国侍人寓娘", "d": "", "a": "", "l": ["苏轼〔宋代〕", "王定国歌儿曰柔奴，姓宇文氏，眉目娟丽，善应对，家世住京师。定国南迁归，余问柔：“广南风土， 应是不好？”柔对曰：“此心安处，便是吾乡。”因为缀词云。", "常羡人间琢玉郎，天应乞与点酥娘。尽道清歌传皓齿，风起，雪飞炎海变清凉。", "万里归来颜愈少。微笑，笑时犹带岭梅香。试问岭南应不好，却道：此心安处是吾乡。"], "img": false}, {"i": 579, "t": "蝶恋花·春景", "d": "", "a": "", "l": ["苏轼〔宋代〕", "花褪残红青杏小，燕子飞时，绿水人家绕。枝上柳绵吹又少。天涯何处无芳草。", "墙里秋千墙外道，墙外行人，墙里佳人笑。笑渐不闻声渐悄。多情却被无情恼。"], "img": false}, {"i": 580, "t": "望江南·超然台作", "d": "", "a": "", "l": ["苏轼〔宋代〕", "春未老，风细柳斜斜。试上超然台上看，半壕春水一城花。烟雨暗千家。(看 一作：望)", "寒食后，酒醒却咨嗟。休对故人思故国，且将新火试新茶。诗酒趁年华。"], "img": false}, {"i": 581, "t": "和董传留别", "d": "", "a": "", "l": ["苏轼〔宋代〕", "粗缯大布裹生涯，腹有诗书气自华。", "厌伴老儒烹瓠叶，强随举子踏槐花。", "囊空不办寻春马，眼乱行看择婿车。", "得意犹堪夸世俗，诏黄新湿字如鸦。"], "img": false}, {"i": 582, "t": "临江仙·夜归临皋", "d": "", "a": "", "l": ["苏轼〔宋代〕", "夜饮东坡醒复醉，归来仿佛三更。家童鼻息已雷鸣。敲门都不应，倚杖听江声。", "长恨此身非我有，何时忘却营营。夜阑风静縠纹平。小舟从此逝，江海寄余生。"], "img": false}, {"i": 583, "t": "水调歌头·黄州快哉亭赠张偓佺", "d": "", "a": "", "l": ["苏轼〔宋代〕", "    落日绣帘卷，亭下水连空。知君为我新作，窗户湿青红。长记平山堂上，欹枕江南烟雨，杳杳没孤鸿。认得醉翁语，山色有无中。", "    一千顷，都镜净，倒碧峰。忽然浪起，掀舞一叶白头翁。堪笑兰台公子，未解庄生天籁，刚道有雌雄。一点浩然气，千里快哉风。"], "img": false}, {"i": 584, "t": "行香子·述怀", "d": "", "a": "", "l": ["苏轼〔宋代〕", "    清夜无尘，月色如银。酒斟时、须满十分。浮名浮利，虚苦劳神。叹隙中驹，石中火，梦中身。", "    虽抱文章，开口谁亲。且陶陶、乐尽天真。几时归去，作个闲人。对一张琴，一壶酒，一溪云。"], "img": false}, {"i": 585, "t": "南乡子·集句", "d": "", "a": "", "l": ["苏轼〔宋代〕", "怅望送春怀。渐老逢春能几回。花满楚城愁远别，伤怀。何况清丝急管催。", "吟断望乡台。万里归心独上来。景物登临闲始见，徘徊。一寸相思一寸灰。", "约作于苏轼贬谪黄州时期，词中所集皆唐人诗句。词为“怅望送春怀（杜牧）。渐老逢春能几回（杜甫）。花满楚城愁远别（许浑），伤怀。何况清丝急管催（刘禹锡）。万里归心独上来（许浑）。景物登临闲始见（杜牧），徘徊。一寸相思一寸灰（李商隐）”，反映了苏轼当时的心境。"], "img": false}, {"i": 586, "t": "南乡子·自述", "d": "", "a": "", "l": ["苏轼〔宋代〕", "    凉簟碧纱厨。一枕清风昼睡馀。睡听晚衙无一事，徐徐。读尽床头几卷书。", "    搔首赋归欤。自觉功名懒更疏。若问使君才与术，何如。占得人间一味愚。"], "img": false}, {"i": 587, "t": "狱中寄子由二首·其一", "d": "", "a": "", "l": ["苏轼〔宋代〕", "圣主如天万物春，小臣愚暗自亡身。", "百年未满先偿债，十口无归更累人。", "是处青山可埋骨，他年夜雨独伤神。", "与君世世为兄弟，更结来生未了因。"], "img": false}, {"i": 588, "t": "别鄞女", "d": "", "a": "", "l": ["王安石〔宋代〕", "行年三十已衰翁，满眼忧伤只自攻。", "今夜扁舟来诀汝，死生从此各西东。"], "img": false}, {"i": 589, "t": "鄂州南楼书事", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "四顾山光接水光，凭栏十里芰荷香。", "清风明月无人管，并作南楼一味凉。", "芰(jì）：菱角。"], "img": false}, {"i": 590, "t": "蝶恋花·伫倚", "d": "", "a": "", "l": ["柳永〔宋代〕", "伫倚危楼风细细，望极春愁，黯黯生天际。草色烟光残照里，无言谁会凭阑意。", "拟把疏狂图一醉，对酒当歌，强乐还无味。衣带渐宽终不悔，为伊消得人憔悴。"], "img": false}, {"i": 591, "t": "蝶恋花·槛菊", "d": "", "a": "", "l": ["晏殊〔宋代〕", "槛菊愁烟兰泣露，罗幕轻寒，燕子双飞去。明月不谙离别苦，斜光到晓穿朱户。", "昨夜西风凋碧树，独上高楼，望尽天涯路。欲寄彩笺兼尺素，山长水阔知何处？"], "img": false}, {"i": 592, "t": "蝶恋花·出塞", "d": "", "a": "", "l": ["纳兰性德〔清代〕", "今古河山无定据。画角声中，牧马频来去。满目荒凉谁可语？西风吹老丹枫树。", "从前幽怨应无数。铁马金戈，青冢黄昏路。一往情深深几许？深山夕照深秋雨。"], "img": false}, {"i": 593, "t": "青玉案·元夕", "d": "", "a": "", "l": ["辛弃疾〔宋代〕", "东风夜放花千树，更吹落、星如雨。宝马雕车香满路。凤箫声动，玉壶光转，一夜鱼龙舞。", "蛾儿雪柳黄金缕，笑语盈盈暗香去。众里寻他千百度，蓦然回首，那人却在，灯火阑珊处。"], "img": false}, {"i": 594, "t": "颍亭留别", "d": "", "a": "", "l": ["元好问〔金朝〕", "故人重分携，临流驻归驾。", "乾坤展清眺，万景若相借。", "北风三日雪，太素秉元化。", "九山郁峥嵘，了不受陵跨。", "寒波澹澹起，白鸟悠悠下。(澹澹 一作：淡淡)", "怀归人自急，物态本闲暇。", "壶觞负吟啸，尘土足悲咤。", "回首亭中人，平林淡如画。"], "img": false}, {"i": 595, "t": "燕山亭·北行见杏花", "d": "", "a": "", "l": ["赵佶〔宋代〕", "裁剪冰绡，轻叠数重，淡著胭脂匀注。新样靓妆，艳溢香融，羞杀蕊珠宫女。易得凋零，更多少、无情风雨。愁苦。闲院落凄凉，几番春暮。", "凭寄离恨重重，这双燕，何曾会人言语。天遥地远，万水千山，知他故宫何处。怎不思量，除梦里、有时曾去。无据，和梦也新来不做。"], "img": false}, {"i": 596, "t": "蝶恋花·萧瑟", "d": "", "a": "", "l": ["纳兰性德〔清代〕", "萧瑟兰成看老去。为怕多情，不作怜花句。阁泪倚花愁不语，暗香飘尽知何处。", "重到旧时明月路。袖口香寒，心比秋莲苦。休说生生花里住，惜花人去花无主。"], "img": false}, {"i": 597, "t": "更漏子·柳丝长", "d": "", "a": "", "l": ["温庭筠〔唐代〕", "柳丝长，春雨细，花外漏声迢递。惊塞雁，起城乌，画屏金鹧鸪。", "香雾薄，透帘幕，惆怅谢家池阁。红烛背，绣帘垂，梦长君不知。"], "img": false}, {"i": 598, "t": "菩萨蛮·红楼", "d": "", "a": "", "l": ["韦庄〔唐代〕", "红楼别夜堪惆怅，香灯半卷流苏帐。残月出门时，美人和泪辞。", "琵琶金翠羽，弦上黄莺语。劝我早归家，绿窗人似花。"], "img": false}, {"i": 599, "t": "菩萨蛮·娇鬟", "d": "", "a": "", "l": ["冯延巳〔五代〕", "娇鬟堆枕钗横凤，溶溶春水杨花梦。红烛泪阑干，翠屏烟浪寒。", "锦壶催画箭，玉佩天涯远。和泪试严妆，落梅飞晓霜。"], "img": false}, {"i": 600, "t": "相见欢·无言", "d": "", "a": "", "l": ["李煜〔五代〕", "无言独上西楼，月如钩。寂寞梧桐深院锁清秋。", "剪不断，理还乱，是离愁。别是一番滋味在心头。"], "img": false}, {"i": 601, "t": "浪淘沙令·帘外", "d": "", "a": "", "l": ["李煜〔五代〕", "帘外雨潺潺，春意阑珊。罗衾不耐五更寒。梦里不知身是客，一晌贪欢。", "独自莫凭栏，无限江山。别时容易见时难。流水落花春去也，天上人间。"], "img": false}, {"i": 602, "t": "相见欢·林花", "d": "", "a": "", "l": ["李煜〔五代〕", "林花谢了春红，太匆匆。无奈朝来寒雨晚来风。", "胭脂泪，相留醉，几时重。自是人生长恨水长东。(相留 一作：留人)"], "img": false}, {"i": 603, "t": "长相思·一重山", "d": "", "a": "", "l": ["李煜〔五代〕", "一重山，两重山。山远天高烟水寒，相思枫叶丹。", "菊花开，菊花残。塞雁高飞人未还，一帘风月闲。"], "img": false}, {"i": 604, "t": "破阵子·四十", "d": "", "a": "", "l": ["李煜〔五代〕", "四十年来家国，三千里地山河。凤阁龙楼连霄汉，玉树琼枝作烟萝，几曾识干戈？", "一旦归为臣虏，沈腰潘鬓消磨。最是仓皇辞庙日，教坊犹奏别离歌，垂泪对宫娥。"], "img": false}, {"i": 605, "t": "清平乐·别来春半", "d": "", "a": "", "l": ["李煜〔五代〕", "别来春半，触目柔肠断。砌下落梅如雪乱，拂了一身还满。(柔肠断 一作：愁肠断)", "雁来音信无凭，路遥归梦难成。离恨恰如春草，更行更远还生。"], "img": false}, {"i": 606, "t": "望江南·多少恨", "d": "", "a": "", "l": ["李煜〔五代〕", "多少恨，昨夜梦魂中。还似旧时游上苑，车如流水马如龙。花月正春风。"], "img": false}, {"i": 607, "t": "乌夜啼·昨夜风", "d": "", "a": "", "l": ["李煜〔五代〕", "昨夜风兼雨，帘帏飒飒秋声。烛残漏断频欹枕，起坐不能平。", "世事漫随流水，算来一梦浮生。醉乡路稳宜频到，此外不堪行。"], "img": false}, {"i": 608, "t": "渔父·一棹", "d": "", "a": "", "l": ["李煜〔五代〕", "一棹春风一叶舟，一纶茧缕一轻钩。花满渚，酒满瓯，万顷波中得自由。"], "img": false}, {"i": 609, "t": "颂平常心是道", "d": "", "a": "", "l": ["无门慧开禅师〔宋代〕", "春有百花秋有月，夏有凉风冬有雪。", "若无闲事挂心头，便是人间好时节。"], "img": false}, {"i": 610, "t": "寄李十二白二十韵", "d": "", "a": "", "l": ["杜甫〔唐代〕", "昔年有狂客，号尔谪仙人。", "笔落惊风雨，诗成泣鬼神。", "声名从此大，汩没一朝伸。", "文采承殊渥，流传必绝伦。", "龙舟移棹晚，兽锦夺袍新。", "白日来深殿，青云满后尘。", "乞归优诏许，遇我宿心亲。", "未负幽栖志，兼全宠辱身。", "剧谈怜野逸，嗜酒见天真。", "醉舞梁园夜，行歌泗水春。", "才高心不展，道屈善无邻。", "处士祢衡俊，诸生原宪贫。", "稻粱求未足，薏苡谤何频。", "五岭炎蒸地，三危放逐臣。", "几年遭鵩鸟，独泣向麒麟。", "苏武先还汉，黄公岂事秦。", "楚筵辞醴日，梁狱上书辰。", "已用当时法，谁将此义陈。", "老吟秋月下，病起暮江滨。", "莫怪恩波隔，乘槎与问津。"], "img": false}, {"i": 611, "t": "五柳先生传", "d": "", "a": "", "l": ["陶渊明〔魏晋〕", "先生不知何许人也，亦不详其姓字，宅边有五柳树，因以为号焉。闲静少言，不慕荣利。好读书，不求甚解；每有会意，便欣然忘食。", "性嗜酒，家贫不能常得。亲旧知其如此，或置酒而招之；造饮辄尽，期在必醉。既醉而退，曾不吝情去留。环堵萧然，不蔽风日；短褐穿结，箪瓢屡空，晏如也。常著文章自娱，颇示己志。忘怀得失，以此自终。", "赞曰：黔娄之妻有言：“不戚戚于贫贱，不汲汲于富贵。”其言兹若人之俦乎？衔觞赋诗，以乐其志，无怀氏之民欤？葛天氏之民欤？"], "img": false}, {"i": 612, "t": "空城雀", "d": "", "a": "", "l": ["李白", "嗷嗷空城雀，身计何戚促。", "本与鹪鹩群，不随凤凰族。", "提携四黄口，饮乳未尝足。", "食君糠秕馀，尝恐乌鸢逐。", "耻涉太行险，羞营覆车粟。", "天命有定端，守分绝所欲。"], "img": false}, {"i": 613, "t": "赐萧瑀", "d": "", "a": "", "l": ["李世民", "疾风知劲草，板荡识诚臣。", "勇夫安识义，智者必怀仁。"], "img": false}, {"i": 614, "t": "看梅绝句", "d": "", "a": "", "l": ["陆游", "老子舞时不须拍，梅花乱插乌巾香。", "樽前作剧莫相笑，我死诸君思此狂。"], "img": false}, {"i": 615, "t": "钗头凤·红", "d": "", "a": "", "l": ["陆游", "红酥手，黄縢酒，满城春色宫墙柳。东风恶，欢情薄。一怀愁绪，几年离索。错、错、错。", "春如旧，人空瘦，泪痕红浥鲛绡透。桃花落，闲池阁。山盟虽在，锦书难托。莫、莫、莫！"], "img": false}, {"i": 616, "t": "冬夜读书示子聿", "d": "", "a": "", "l": ["陆游", "古人学问无遗力，少壮工夫老始成。", "纸上得来终觉浅，绝知此事要躬行。"], "img": false}, {"i": 617, "t": "诉衷情·当年", "d": "", "a": "", "l": ["陆游", "当年万里觅封侯，匹马戍梁州。关河梦断何处？尘暗旧貂裘。", "胡未灭，鬓先秋，泪空流。此生谁料，心在天山，身老沧洲。"], "img": false}, {"i": 618, "t": "病起书怀", "d": "", "a": "", "l": ["陆游", "病骨支离纱帽宽，孤臣万里客江干。", "位卑未敢忘忧国，事定犹须待阖棺。", "天地神灵扶庙社，京华父老望和銮。", "出师一表通今古，夜半挑灯更细看。"], "img": false}, {"i": 619, "t": "谢池春·壮岁", "d": "", "a": "", "l": ["陆游", "    壮岁从戎，曾是气吞残虏。阵云高、狼烟夜举。朱颜青鬓，拥雕戈西戍。笑儒冠、自来多误。", "    功名梦断，却泛扁舟吴楚。漫悲歌、伤怀吊古。烟波无际，望秦关何处。叹流年、又成虚度。"], "img": false}, {"i": 620, "t": "长相思·云千重", "d": "", "a": "", "l": ["陆游", "云千重，水千重，身在千重云水中。月明收钓筒。", "头未童，耳未聋，得酒犹能双脸红。一尊谁与同。"], "img": false}, {"i": 621, "t": "钗头凤·世情薄", "d": "", "a": "", "l": ["唐婉", "世情薄，人情恶，雨送黄昏花易落。晓风干，泪痕残。欲笺心事，独语斜阑。难，难，难！", "人成各，今非昨，病魂常似秋千索。角声寒，夜阑珊。怕人寻问，咽泪装欢。瞒，瞒，瞒。"], "img": false}, {"i": 622, "t": "侠客行", "d": "", "a": "", "l": ["李白", "赵客缦胡缨，吴钩霜雪明。", "银鞍照白马，飒沓如流星。", "十步杀一人，千里不留行。", "事了拂衣去，深藏身与名。", "闲过信陵饮，脱剑膝前横。", "将炙啖朱亥，持觞劝侯嬴。", "三杯吐然诺，五岳倒为轻。", "眼花耳热后，意气素霓生。", "救赵挥金槌，邯郸先震惊。", "千秋二壮士，烜赫大梁城。", "纵死侠骨香，不惭世上英。", "谁能书阁下，白首太玄经。"], "img": false}, {"i": 623, "t": "上李邕", "d": "", "a": "", "l": ["李白", "大鹏一日同风起，扶摇直上九万里。", "假令风歇时下来，犹能簸却沧溟水。", "世人见我恒殊调，闻余大言皆冷笑。(闻 一作：见)", "宣父犹能畏后生，丈夫未可轻年少。"], "img": false}, {"i": 624, "t": "客中作", "d": "", "a": "", "l": ["李白", "兰陵美酒郁金香，玉碗盛来琥珀光。", " 但使主人能醉客，不知何处是他乡。"], "img": false}, {"i": 625, "t": "醉翁亭记", "d": "", "a": "", "l": ["欧阳修", "环滁皆山也。其西南诸峰，林壑尤美，望之蔚然而深秀者，琅琊也。山行六七里，渐闻水声潺潺，而泻出于两峰之间者，酿泉也。峰回路转，有亭翼然临于泉上者，醉翁亭也。作亭者谁？山之僧智仙也。名之者谁？太守自谓也。太守与客来饮于此，饮少辄醉，而年又最高，故自号曰醉翁也。醉翁之意不在酒，在乎山水之间也。山水之乐，得之心而寓之酒也。", "若夫日出而林霏开，云归而岩穴暝，晦明变化者，山间之朝暮也。野芳发而幽香，佳木秀而繁阴，风霜高洁，水落而石出者，山间之四时也。朝而往，暮而归，四时之景不同，而乐亦无穷也。", "至于负者歌于途，行者休于树，前者呼，后者应，伛偻提携，往来而不绝者，滁人游也。临溪而渔，溪深而鱼肥，酿泉为酒，泉香而酒洌，山肴野蔌，杂然而前陈者，太守宴也。宴酣之乐，非丝非竹，射者中，弈者胜，觥筹交错，起坐而喧哗者，众宾欢也。苍颜白发，颓然乎其间者，太守醉也。", "已而夕阳在山，人影散乱，太守归而宾客从也。树林阴翳，鸣声上下，游人去而禽鸟乐也。然而禽鸟知山林之乐，而不知人之乐；人知从太守游而乐，而不知太守之乐其乐也。醉能同其乐，醒能述以文者，太守也。太守谓谁？庐陵欧阳修也。"], "img": false}, {"i": 626, "t": "夏日登车盖亭", "d": "", "a": "", "l": ["蔡确", "纸屏石枕竹方床，手倦抛书午梦长。", "睡起莞然成独笑，数声渔笛在沧浪。"], "img": false}, {"i": 627, "t": "渡易水歌", "d": "", "a": "", "l": ["佚名", "风萧萧兮易水寒，壮士一去兮不复还。(复还 一作：复反)", "探虎穴兮入蛟宫，仰天呼气兮成白虹。(此句疑为后人补作)"], "img": false}, {"i": 628, "t": "上邪", "d": "", "a": "", "l": ["佚名", "上邪！我欲与君相知，长命无绝衰。", "山无陵，江水为竭，冬雷震震，夏雨雪，天地合，乃敢与君绝。"], "img": false}, {"i": 629, "t": "饮马长城窟行", "d": "", "a": "", "l": ["佚名", "青青河畔草，绵绵思远道。", "远道不可思，夙昔梦见之。", "梦见在我傍，忽觉在他乡。", "他乡各异县，辗转不相见。", "枯桑知天风，海水知天寒。", "入门各自媚，谁肯相为言？", "客从远方来，遗我双鲤鱼。", "呼儿烹鲤鱼，中有尺素书。", "长跪读素书，书中竟何如？", "上言加餐食，下言长相忆。"], "img": false}, {"i": 630, "t": "击壤歌", "d": "", "a": "", "l": ["佚名 先秦", "日出而作，日入而息。", "凿井而饮，耕田而食。", "帝力于我何有哉！"], "img": false}, {"i": 631, "t": "戏赠张先", "d": "", "a": "", "l": ["佚名 宋朝", "十八新娘八十郎，苍苍白发对红妆。", "鸳鸯被里成双夜，一树梨花压海棠。"], "img": false}, {"i": 632, "t": "古艳歌", "d": "", "a": "", "l": ["佚名 两汉", "茕茕白兔，东走西顾。", "衣不如新，人不如故。"], "img": false}, {"i": 633, "t": "月儿弯弯照九州", "d": "", "a": "", "l": ["佚名  宋代", "月儿弯弯照九州，几家欢乐几家愁。", "几家夫妇同罗帐，几个飘零在外头？"], "img": false}, {"i": 634, "t": "残花", "d": "", "a": "", "l": ["佚名", "花开花落花无悔，缘来缘去缘如水。", "花谢为花开，花飞为花悲。", "花悲为花泪，花泪为花碎。", "花舞花落泪，花哭花瓣飞。", "花开为谁谢，花谢为谁悲。"], "img": false}, {"i": 635, "t": "木兰花·拟古决绝词柬友", "d": "", "a": "", "l": ["纳兰性德", "人生若只如初见，何事秋风悲画扇。等闲变却故人心，却道故人心易变。", "骊山语罢清宵半，泪雨霖铃终不怨。何如薄幸锦衣郎，比翼连枝当日愿。"], "img": false}, {"i": 636, "t": "唐多令·芦", "d": "", "a": "", "l": ["刘过 宋", "芦叶满汀洲，寒沙带浅流。二十年重过南楼。柳下系船犹未稳，能几日，又中秋。", "黄鹤断矶头，故人今在否？旧江山浑是新愁。欲买桂花同载酒，终不似，少年游。"], "img": false}, {"i": 637, "t": "诉衷情·一波", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "戎州登临胜景，未尝不歌渔父家风，以谢江山。门生请问：先生家风如何？为拟金华道人作此章。", "一波才动万波随，蓑笠一钩丝。金鳞正在深处，千尺也须垂。", "吞又吐，信还疑，上钩迟。水寒江静，满目青山，载月明归。"], "img": false}, {"i": 638, "t": "清平乐·六盘山", "d": "", "a": "", "l": ["毛泽东", "天高云淡，望断南飞雁。不到长城非好汉，屈指行程二万。", "六盘山上高峰，红旗漫卷西风。今日长缨在手，何时缚住苍龙？”"], "img": false}, {"i": 639, "t": "于易水送别.骆冰王", "d": "", "a": "", "l": ["【唐】骆宾王", "此地别燕丹，壮士发冲冠。", "昔时人已没，今日水犹寒。"], "img": false}, {"i": 640, "t": "满江红·写怀", "d": "", "a": "", "l": ["岳飞 南宋", "怒发冲冠，凭栏处、潇潇雨歇。抬望眼，仰天长啸，壮怀激烈。三十功名尘与土，八千里路云和月。莫等闲，白了少年头，空悲切！", "靖康耻，犹未雪。臣子恨，何时灭！驾长车，踏破贺兰山缺。壮志饥餐胡虏肉，笑谈渴饮匈奴血。待从头、收拾旧山河，朝天阙。(壮志 一作：壮士；山缺 一作：山阙)"], "img": false}, {"i": 641, "t": "长相思·汴", "d": "", "a": "", "l": ["白居易 唐", "汴水流，泗水流，流到瓜州古渡头。吴山点点愁。", "思悠悠，恨悠悠，恨到归时方始休。月明人倚楼。"], "img": false}, {"i": 642, "t": "江上值水如海势聊短述", "d": "", "a": "", "l": ["杜甫", "为人性僻耽佳句，语不惊人死不休。", "老去诗篇浑漫与，春来花鸟莫深愁。(漫与 一作：漫兴)", "新添水槛供垂钓，故着浮槎替入舟。", "焉得思如陶谢手，令渠述作与同游。"], "img": false}, {"i": 643, "t": "续侄溥赏酴醾劝酒二首·其一", "d": "", "a": "", "l": ["陈著", "花有重开日，人无再少年。", "相逢拌酩酊，何必备芳鲜。"], "img": false}, {"i": 644, "t": "洗儿诗", "d": "", "a": "", "l": ["苏轼", "人皆养子望聪明，我被聪明误一生。", "惟愿孩儿愚且鲁，无灾无难到公卿。"], "img": false}, {"i": 645, "t": "前出塞九首·挽", "d": "", "a": "", "l": ["杜甫", "挽弓当挽强，用箭当用长。", "射人先射马，擒贼先擒王。", "杀人亦有限，列国自有疆。", "苟能制侵陵，岂在多杀伤。"], "img": false}, {"i": 646, "t": "赠李白", "d": "", "a": "", "l": ["杜甫", "秋来相顾尚飘蓬，未就丹砂愧葛洪。", " 痛饮狂歌空度日，飞扬跋扈为谁雄。"], "img": false}, {"i": 647, "t": "水槛遣心二首", "d": "", "a": "", "l": ["杜甫", "去郭轩楹敞，无村眺望赊。", "澄江平少岸，幽树晚多花。", "细雨鱼儿出，微风燕子斜。", "城中十万户，此地两三家。", "蜀天常夜雨，江槛已朝晴。", "叶润林塘密，衣干枕席清。", "不堪祗老病，何得尚浮名。", "浅把涓涓酒，深凭送此生。"], "img": false}, {"i": 648, "t": "柏学士茅屋", "d": "", "a": "", "l": ["杜甫", "碧山学士焚银鱼，白马却走身岩居。", "古人已用三冬足，年少今开万卷余。", "晴云满户团倾盖，秋水浮阶溜决渠。", "富贵必从勤苦得，男儿须读五车书。"], "img": false}, {"i": 649, "t": "雨霖铃·寒蝉", "d": "", "a": "", "l": ["柳永", "寒蝉凄切，对长亭晚，骤雨初歇。都门帐饮无绪，留恋处，兰舟催发。执手相看泪眼，竟无语凝噎。念去去，千里烟波，暮霭沉沉楚天阔。", "多情自古伤离别，更那堪，冷落清秋节！今宵酒醒何处？杨柳岸，晓风残月。此去经年，应是良辰美景虚设。便纵有千种风情，更与何人说？"], "img": false}, {"i": 650, "t": "望海潮·东南", "d": "", "a": "", "l": ["柳永", "东南形胜，三吴都会，钱塘自古繁华。烟柳画桥，风帘翠幕，参差十万人家。云树绕堤沙，怒涛卷霜雪，天堑无涯。市列珠玑，户盈罗绮，竞豪奢。(三吴 一作：江吴)", "重湖叠巘清嘉，有三秋桂子，十里荷花。羌管弄晴，菱歌泛夜，嬉嬉钓叟莲娃。千骑拥高牙，乘醉听箫鼓，吟赏烟霞。异日图将好景，归去凤池夸。"], "img": false}, {"i": 651, "t": "鹤冲天·黄金榜", "d": "", "a": "", "l": ["柳永", "黄金榜上，偶失龙头望。明代暂遗贤，如何向。未遂风云便，争不恣狂荡。何须论得丧？才子词人，自是白衣卿相。", "烟花巷陌，依约丹青屏障。幸有意中人，堪寻访。且恁偎红倚翠，风流事、平生畅。青春都一饷。忍把浮名，换了浅斟低唱！"], "img": false}, {"i": 652, "t": "八声甘州·对潇潇", "d": "", "a": "", "l": ["柳永", "对潇潇暮雨洒江天，一番洗清秋。渐霜风凄紧，关河冷落，残照当楼。是处红衰翠减，苒苒物华休。唯有长江水，无语东流。", "不忍登高临远，望故乡渺邈，归思难收。叹年来踪迹，何事苦淹留。想佳人妆楼颙望，误几回、天际识归舟。争知我，倚阑杆处，正恁凝愁！"], "img": false}, {"i": 653, "t": "醉花阴·薄雾", "d": "", "a": "", "l": ["李清照 南宋", "薄雾浓云愁永昼，瑞脑销金兽。佳节又重阳，玉枕纱厨，半夜凉初透。", "东篱把酒黄昏后，有暗香盈袖。莫道不销魂，帘卷西风，人比黄花瘦。"], "img": false}, {"i": 654, "t": "武陵春·春晚", "d": "", "a": "", "l": ["李清照 宋代", "风住尘香花已尽，日晚倦梳头。物是人非事事休，欲语泪先流。", "闻说双溪春尚好，也拟泛轻舟。只恐双溪舴艋舟，载不动许多愁。"], "img": false}, {"i": 655, "t": "连昌宫词（节选）", "d": "", "a": "", "l": ["元稹", "开元之末姚宋死，朝廷渐渐由妃子。", "禄山宫里养作儿，虢国门前闹如市。", "弄权宰相不记名，依稀忆得杨与李。", "庙谟颠倒四海摇，五十年来作疮痏。"], "img": false}, {"i": 656, "t": "赋菊", "d": "", "a": "", "l": ["黄巢", "待到秋来九月八，我花开后百花杀。", "冲天香阵透长安，满城尽带黄金甲。"], "img": false}, {"i": 657, "t": "登科后", "d": "", "a": "", "l": ["孟郊", "昔日龌龊不足夸，今朝放荡思无涯。", "春风得意马蹄疾，一日看尽长安花。"], "img": false}, {"i": 658, "t": "汴河怀古二首", "d": "", "a": "", "l": ["皮日休〔唐代〕", "万艘龙舸绿丝间，载到扬州尽不还。", "应是天教开汴水，一千余里地无山。", "尽道隋亡为此河，至今千里赖通波。", "若无水殿龙舟事，共禹论功不较多。"], "img": false}, {"i": 659, "t": "摸鱼儿·雁丘词", "d": "", "a": "", "l": ["元好问乙丑岁赴试并州，道逢捕雁者云：“今旦获一雁，杀之矣。其脱网者悲鸣不能去，竟自投于地而死。”予因买得之，葬之汾水之上，垒石为识，号曰“雁丘”。同行者多为赋诗，予亦有《雁丘词》。旧所作无宫商，今改定之。", "问世间，情是何物，直教生死相许？天南地北双飞客，老翅几回寒暑。欢乐趣，离别苦，就中更有痴儿女。君应有语：渺万里层云，千山暮雪，只影向谁去？", "横汾路，寂寞当年箫鼓，荒烟依旧平楚。招魂楚些何嗟及，山鬼暗啼风雨。天也妒，未信与，莺儿燕子俱黄土。千秋万古，为留待骚人，狂歌痛饮，来访雁丘处。"], "img": false}, {"i": 660, "t": "九歌·山鬼", "d": "", "a": "", "l": ["若有人兮山之阿，被薜荔兮带女萝。", "既含睇兮又宜笑，子慕予兮善窈窕。", "乘赤豹兮从文狸，辛夷车兮结桂旗。", "被石兰兮带杜衡，折芳馨兮遗所思。", "余处幽篁兮终不见天，路险难兮独后来。", "表独立兮山之上，云容容兮而在下。", "杳冥冥兮羌昼晦，东风飘兮神灵雨。", "留灵修兮憺忘归，岁既晏兮孰华予。", "采三秀兮於山间，石磊磊兮葛蔓蔓。", "怨公子兮怅忘归，君思我兮不得闲。", "山中人兮芳杜若，饮石泉兮荫松柏，君思我兮然疑作；", "雷填填兮雨冥冥，猨啾啾兮狖夜鸣。", "风飒飒兮木萧萧，思公子兮徒离忧。"], "img": false}, {"i": 661, "t": "垓下歌", "d": "", "a": "", "l": ["项羽〔两汉〕", "力拔山兮气盖世。时不利兮骓不逝。", "骓不逝兮可奈何！虞兮虞兮奈若何！"], "img": false}, {"i": 662, "t": "大风歌", "d": "汉", "a": "刘邦", "l": ["大风起兮云飞扬，威加海内兮归故乡，安得猛士兮守四方。"], "img": false}, {"i": 663, "t": "战城南", "d": "", "a": "", "l": ["佚名〔两汉〕", "战城南，死郭北，野死不葬乌可食。", "为我谓乌：且为客豪！", "野死谅不葬，腐肉安能去子逃？", "水深激激，蒲苇冥冥；", "枭骑战斗死，驽马徘徊鸣。", "梁筑室，何以南？何以北？", "禾黍不获君何食？愿为忠臣安可得？", "思子良臣，良臣诚可思：", "朝行出攻，暮不夜归！"], "img": false}, {"i": 664, "t": "艳歌行", "d": "", "a": "", "l": ["佚名〔两汉〕", "翩翩堂前燕，冬藏夏来见。", "兄弟两三人，流宕在他县。", "故衣谁当补，新衣谁当绽？", "赖得贤主人，览取为吾绽。", "夫婿从门来，斜柯西北眄。", "语卿且勿眄，水清石自见。", "石见何累累，远行不如归。"], "img": false}, {"i": 665, "t": "杂诗十二首·人生", "d": "", "a": "", "l": ["陶渊明〔魏晋〕", "人生无根蒂，飘如陌上尘。", "分散逐风转，此已非常身。", "落地为兄弟，何必骨肉亲！", "得欢当作乐，斗酒聚比邻。", "盛年不重来，一日难再晨。", "及时当勉励，岁月不待人。"], "img": false}, {"i": 666, "t": "题都城南庄", "d": "", "a": "", "l": ["[唐代] 崔护", "去年今日此门中，人面桃花相映红。", "人面不知何处去，桃花依旧笑春风。"], "img": false}, {"i": 667, "t": "桃花庵歌", "d": "", "a": "", "l": ["唐寅〔明代〕", "桃花坞里桃花庵，桃花庵里桃花仙。", "桃花仙人种桃树，又摘桃花换酒钱。", "酒醒只在花前坐，酒醉还来花下眠。", "半醒半醉日复日，花落花开年复年。", "但愿老死花酒间，不愿鞠躬车马前。", "车尘马足富者趣，酒盏花枝贫者缘。", "若将富贵比贫者，一在平地一在天。", "若将贫贱比车马，他得驱驰我得闲。", "别人笑我忒风颠，我笑他人看不穿。", "不见五陵豪杰墓，无花无酒锄作田。"], "img": false}, {"i": 668, "t": "桃花源记", "d": "", "a": "", "l": ["陶渊明〔魏晋〕", "晋太元中，武陵人捕鱼为业。缘溪行，忘路之远近。忽逢桃花林，夹岸数百步，中无杂树，芳草鲜美，落英缤纷。渔人甚异之，复前行，欲穷其林。", "林尽水源，便得一山，山有小口，仿佛若有光。便舍船，从口入。初极狭，才通人。复行数十步，豁然开朗。土地平旷，屋舍俨然，有良田、美池、桑竹之属。阡陌交通，鸡犬相闻。其中往来种作，男女衣着，悉如外人。黄发垂髫，并怡然自乐。", "见渔人，乃大惊，问所从来。具答之。便要还家，设酒杀鸡作食。村中闻有此人，咸来问讯。自云先世避秦时乱，率妻子邑人来此绝境，不复出焉，遂与外人间隔。问今是何世，乃不知有汉，无论魏晋。此人一一为具言所闻，皆叹惋。余人各复延至其家，皆出酒食。停数日，辞去。此中人语云：“不足为外人道也。”(间隔 一作：隔绝)", "既出，得其船，便扶向路，处处志之。及郡下，诣太守，说如此。太守即遣人随其往，寻向所志，遂迷，不复得路。", "南阳刘子骥，高尚士也，闻之，欣然规往。未果，寻病终。后遂无问津者。"], "img": false}, {"i": 669, "t": "入朝曲", "d": "", "a": "", "l": ["谢朓〔南北朝〕", "江南佳丽地，金陵帝王州。", "逶迤带绿水，迢递起朱楼。", "飞甍夹驰道，垂杨荫御沟。", "凝笳翼高盖，叠鼓送华辀。", "献纳云台表，功名良可收。"], "img": false}, {"i": 670, "t": "好了歌", "d": "", "a": "", "l": ["曹雪芹〔清代〕", "世人都晓神仙好，惟有功名忘不了！", "古今将相在何方？荒冢一堆草没了。", "世人都晓神仙好，只有金银忘不了！", "终朝只恨聚无多，及到多时眼闭了。", "世人都晓神仙好，只有娇妻忘不了！", "君生日日说恩情，君死又随人去了。", "世人都晓神仙好，只有儿孙忘不了！", "痴心父母古来多，孝顺儿孙谁见了？"], "img": false}, {"i": 671, "t": "竹枝词二首·其一", "d": "", "a": "", "l": ["刘禹锡〔唐代〕", "杨柳青青江水平，闻郎江上踏歌声。", "东边日出西边雨，道是无晴却有晴。"], "img": false}, {"i": 672, "t": "滕王阁序", "d": "", "a": "", "l": ["王勃〔唐代〕", "    豫章故郡，洪都新府。星分翼轸，地接衡庐。襟三江而带五湖，控蛮荆而引瓯越。物华天宝，龙光射牛斗之墟；人杰地灵，徐孺下陈蕃之榻。雄州雾列，俊采星驰。台隍枕夷夏之交，宾主尽东南之美。都督阎公之雅望，棨戟遥临；宇文新州之懿范，襜帷暂驻。十旬休假，胜友如云；千里逢迎，高朋满座。腾蛟起凤，孟学士之词宗；紫电青霜，王将军之武库。家君作宰，路出名区；童子何知，躬逢胜饯。", "    时维九月，序属三秋。潦水尽而寒潭清，烟光凝而暮山紫。俨骖騑于上路，访风景于崇阿。临帝子之长洲，得天人之旧馆。层峦耸翠，上出重霄；飞阁流丹，下临无地。鹤汀凫渚，穷岛屿之萦回；桂殿兰宫，即冈峦之体势。", "    披绣闼，俯雕甍，山原旷其盈视，川泽纡其骇瞩。闾阎扑地，钟鸣鼎食之家；舸舰弥津，青雀黄龙之舳。云销雨霁，彩彻区明。落霞与孤鹜齐飞，秋水共长天一色。渔舟唱晚，响穷彭蠡之滨，雁阵惊寒，声断衡阳之浦。", "    遥襟甫畅，逸兴遄飞。爽籁发而清风生，纤歌凝而白云遏。睢园绿竹，气凌彭泽之樽；邺水朱华，光照临川之笔。四美具，二难并。穷睇眄于中天，极娱游于暇日。天高地迥，觉宇宙之无穷；兴尽悲来，识盈虚之有数。望长安于日下，目吴会于云间。地势极而南溟深，天柱高而北辰远。关山难越，谁悲失路之人；萍水相逢，尽是他乡之客。怀帝阍而不见，奉宣室以何年？", "    嗟乎！时运不齐，命途多舛。冯唐易老，李广难封。屈贾谊于长沙，非无圣主；窜梁鸿于海曲，岂乏明时？所赖君子见机，达人知命。老当益壮，宁移白首之心？穷且益坚，不坠青云之志。酌贪泉而觉爽，处涸辙以犹欢。北海虽赊，扶摇可接；东隅已逝，桑榆非晚。孟尝高洁，空余报国之情；阮籍猖狂，岂效穷途之哭！", "    勃，三尺微命，一介书生。无路请缨，等终军之弱冠；有怀投笔，慕宗悫之长风。舍簪笏于百龄，奉晨昏于万里。非谢家之宝树，接孟氏之芳邻。他日趋庭，叨陪鲤对；今兹捧袂，喜托龙门。杨意不逢，抚凌云而自惜；钟期既遇，奏流水以何惭？", "    呜呼！胜地不常，盛筵难再；兰亭已矣，梓泽丘墟。临别赠言，幸承恩于伟饯；登高作赋，是所望于群公。敢竭鄙怀，恭疏短引；一言均赋，四韵俱成。请洒潘江，各倾陆海云尔。", "滕王高阁临江渚，佩玉鸣鸾罢歌舞。", "画栋朝飞南浦云，珠帘暮卷西山雨。", "闲云潭影日悠悠，物换星移几度秋。", "阁中帝子今何在？槛外长江空自流。"], "img": false}, {"i": 673, "t": "蝶恋花. 谁道", "d": "五代", "a": "冯延巳", "l": ["谁道闲情抛掷久，每到春来，惆怅还依旧。日日花前常病酒，不辞镜里朱颜瘦。", "河畔青芜堤上柳，为问新愁，何事年年有。独立小桥风满袖，平林新月人归后。"], "img": false}, {"i": 674, "t": "更漏子.玉炉香", "d": "", "a": "", "l": ["晚唐·温庭筠", "玉炉香，红烛泪，偏照画堂秋思。眉翠薄，鬓云残，夜长衾枕寒。", "梧桐树，三更雨，不道离情正苦。一叶叶，一声声，空阶滴到明。"], "img": false}, {"i": 675, "t": "蝶恋花.庭院", "d": "宋", "a": "欧阳修", "l": ["庭院深深深几许，杨柳堆烟，帘幕无重数。玉勒雕鞍游冶处，楼高不见章台路。", "雨横风狂三月暮，门掩黄昏，无计留春住。泪眼问花花不语，乱红飞过秋千去。"], "img": false}, {"i": 676, "t": "在军登城楼", "d": "", "a": "", "l": ["骆宾王", "城上风威冷，江中水气寒。", "戎衣何日定，歌舞入长安"], "img": false}, {"i": 677, "t": "渡湘江", "d": "", "a": "", "l": ["杜审言", "迟日园林悲昔游，今春花鸟作边愁。", "独怜京国人南窜，不似湘江水北流。"], "img": false}, {"i": 678, "t": "古剑篇", "d": "", "a": "", "l": ["郭震 唐", "君不见昆吾铁冶飞炎烟，红光紫气俱赫然。", "良工锻炼凡几年，铸得宝剑名龙泉。", "龙泉颜色如霜雪，良工咨嗟叹奇绝。", "琉璃玉匣吐莲花，错镂金环映明月。", "正逢天下无风尘，幸得周防君子身。", "精光黯黯青蛇色，文章片片绿龟鳞。", "非直结交游侠子，亦曾亲近英雄人。", "何言中路遭弃捐，零落漂沦古狱边。", "虽复尘埋无所用，犹能夜夜气冲天。"], "img": false}, {"i": 679, "t": "生查子·元夕", "d": "", "a": "", "l": ["欧阳修", "去年元夜时，花市灯如昼。", "月上柳梢头，人约黄昏后。", "今年元夜时，月与灯依旧。", "不见去年人，泪湿春衫袖。"], "img": false}, {"i": 680, "t": "酷相思.杏花深院", "d": "", "a": "", "l": ["郑燮", "杏花深院红如许，一线画墙拦住。叹人间咫尺千山路，不见也相思苦，便见也相思苦。", "分明背地情千缕，拌恼从教诉。奈花间乍遇言辞阻，半句也何曾吐，一字也何曾吐!"], "img": false}, {"i": 681, "t": "临江仙·梦后", "d": "", "a": "", "l": ["晏几道 北宋", "梦后楼台高锁，酒醒帘幕低垂。去年春恨却来时。落花人独立，微雨燕双飞。", "记得小蘋初见，两重心字罗衣。琵琶弦上说相思。当时明月在，曾照彩云归。"], "img": false}, {"i": 682, "t": "谪仙怨·晴川", "d": "", "a": "", "l": ["刘长卿", "晴川落日初低，惆怅孤舟解携。鸟向平芜远近，人随流水东西。", "白云千里万里，明月前溪后溪。独恨长沙谪去，江潭春草萋萋。"], "img": false}, {"i": 683, "t": "雪梅·其二", "d": "", "a": "", "l": ["卢钺 宋", "有梅无雪不精神，有雪无诗俗了人。", "日暮诗成天又雪，与梅并作十分春。"], "img": false}, {"i": 684, "t": "蝶恋花·暖雨", "d": "", "a": "", "l": ["李清照", "暖雨晴风初破冻，柳眼梅腮，已觉春心动。酒意诗情谁与共？泪融残粉花钿重。", "乍试夹衫金缕缝，山枕斜欹，枕损钗头凤。独抱浓愁无好梦，夜阑犹剪灯花弄。"], "img": false}, {"i": 685, "t": "酌酒与裴迪", "d": "", "a": "", "l": ["王维", "酌酒与君君自宽，人情翻覆似波澜。", "白首相知犹按剑，朱门先达笑弹冠。", "草色全轻细雨湿，花枝欲动春风寒。", "世事浮云何足问，不如高卧且加餐。"], "img": false}, {"i": 686, "t": "苏幕遮·怀旧", "d": "", "a": "", "l": ["范仲淹〔宋代〕", "碧云天，黄叶地，秋色连波，波上寒烟翠。山映斜阳天接水，芳草无情，更在斜阳外。", "黯乡魂，追旅思，夜夜除非，好梦留人睡。明月楼高休独倚，酒入愁肠，化作相思泪。"], "img": false}, {"i": 687, "t": "花非花", "d": "", "a": "", "l": ["白居易 唐", "花非花，雾非雾。", "夜半来，天明去。", "来如春梦几多时？", "去似朝云无觅处。"], "img": false}, {"i": 688, "t": "鹧鸪天·桂花", "d": "", "a": "", "l": ["李清照", "暗淡轻黄体性柔，情疏迹远只香留。", "何须浅碧深红色，自是花中第一流。", "梅定妒，菊应羞，画阑开处冠中秋。", "骚人可煞无情思，何事当年不见收。"], "img": false}, {"i": 689, "t": "寄黄几复", "d": "", "a": "", "l": ["黄庭坚 北宋", "我居北海君南海，寄雁传书谢不能。", "桃李春风一杯酒，江湖夜雨十年灯。", "持家但有四立壁，治病不蕲三折肱。", "想见读书头已白，隔溪猿哭瘴溪藤。"], "img": false}, {"i": 690, "t": "水调歌头·游览", "d": "", "a": "", "l": ["黄庭坚 北宋", "瑶草一何碧，春入武陵溪。溪上桃花无数，枝上有黄鹂。我欲穿花寻路，直入白云深处，浩气展虹霓。只恐花深里，红露湿人衣。", "坐玉石，倚玉枕，拂金徽。谪仙何处？无人伴我白螺杯。我为灵芝仙草，不为朱唇丹脸，长啸亦何为？醉舞下山去，明月逐人归。"], "img": false}, {"i": 691, "t": "牧童诗", "d": "", "a": "", "l": ["黄庭坚", "宋皇祐三年（1051年），七岁，作牧童诗：“骑牛远远过前村，吹笛风斜隔岸闻，多少长安名利客，机关用尽不如君”。", "宋皇祐四年（1052年），八岁，作诗送人赴举：“万里云程着祖鞭，送君归去玉阶前，若问旧时黄庭坚，谪在人间今八年”"], "img": false}, {"i": 692, "t": "越人歌", "d": "", "a": "", "l": ["佚名 先秦", "今夕何夕兮，搴舟中流。", "今日何日兮，得与王子同舟。", "蒙羞被好兮，不訾诟耻。", "心几烦而不绝兮，得知王子。", "山有木兮木有枝，心悦君兮君不知。"], "img": false}, {"i": 693, "t": "临江仙·滚滚长江", "d": "", "a": "", "l": ["杨慎 明", "滚滚长江东逝水，浪花淘尽英雄。是非成败转头空。青山依旧在，几度夕阳红。", "白发渔樵江渚上，惯看秋月春风。一壶浊酒喜相逢。古今多少事，都付笑谈中。"], "img": false}, {"i": 694, "t": "喜迁莺·梅雨霁", "d": "", "a": "", "l": ["周彦邦  北宋", "梅雨霁，暑风和。高柳乱蝉多。小园台榭远池波。鱼戏动新荷。", "薄纱厨，轻羽扇。枕冷簟凉深院。此时情绪此时天。无事小神仙。"], "img": false}, {"i": 695, "t": "白头吟", "d": "", "a": "", "l": ["卓文君 疑", "皑如山上雪，皎若云间月。", "闻君有两意，故来相决绝。", "今日斗酒会，明旦沟水头。", "躞蹀御沟上，沟水东西流。", "凄凄复凄凄，嫁娶不须啼。", "愿得一心人，白头不相离。", "竹竿何袅袅，鱼尾何簁簁！(袅袅 一作：嫋嫋)", "男儿重意气，何用钱刀为！"], "img": false}, {"i": 696, "t": "赠邻女", "d": "", "a": "", "l": ["鱼玄机  唐", "羞日遮罗袖，愁春懒起妆。", "易求无价宝，难得有情郎。", "枕上潜垂泪，花间暗断肠。", "自能窥宋玉，何必恨王昌？"], "img": false}, {"i": 697, "t": "佳人歌", "d": "", "a": "", "l": ["李延年", "北方有佳人，绝世而独立。", "一顾倾人城，再顾倾人国。", "宁不知倾城与倾国，佳人难再得！"], "img": false}, {"i": 698, "t": "三字经", "d": "", "a": "", "l": ["南宋·王应麟", "人之初，性本善。", "性相近，习相远。", "苟不教，性乃迁。", "教之道，贵以专。", "昔孟母，择邻处。", "子不学，断机杼。", "窦燕山，有义方。", "教五子，名俱扬。", "养不教，父之过。", "教不严，师之惰。", "子不学，非所宜。", "幼不学，老何为。", "玉不琢，不成器。", "人不学，不知义。", "曰江河，曰淮济。", "此四渎，水之纪。", "曰岱华，嵩恒衡。", "此五岳，山之名。", "稻粱菽，麦黍稷。", "此六谷，人所食。", "匏土革，木石金。", "丝与竹，乃八音。", "曰平上，曰去入。", "此四声，宜调协。", "高曾祖，父而身。", "身而子，子而孙。", "自子孙，至玄曾。", "乃九族，人之伦。", "斩齐衰，大小功。", "至缌麻，五服终。", "礼乐射，御书数。", "古六艺，今不具。", "有古文，大小篆。", "隶草继，不可乱。", "凡训蒙，须讲究。", "详训诂，明句读。", "为学者，必有初。", "小学终，至四书。", "论语者，二十篇。", "群弟子，记善言。", "孟子者，七篇止。", "讲道德，说仁义。", "作中庸，子思笔。", "中不偏，庸不易。", "作大学，乃曾子。", "自修齐，至平治。", "孝经通，四书熟。", "如六经，始可读。", "诗书易，礼春秋。", "号六经，当讲求。", "有连山，有归藏。", "有周易，三易详。", "有典谟，有训诰。", "有誓命，书之奥。", "我周公，作周礼。", "著六官，存治体。", "大小戴，注礼记。", "述圣言，礼乐备。", "曰国风，曰雅颂。", "号四诗，当讽咏。", "诗既亡，春秋作。", "寓褒贬，别善恶。", "三传者，有公羊。", "有左氏，有谷梁。", "经既明，方读子。", "撮其要，记其事。", "五子者，有荀扬。", "文中子，及老庄。", "经子通，读诸史。", "考世系，知终始。", "自羲农，至黄帝。", "号三皇，居上世。", "唐有虞，号二帝。", "相揖逊，称盛世。", "夏有禹，商有汤。", "周武王，称三王。", "夏传子，家天下。", "四百载，迁夏社。", "汤伐夏，国号商。", "六百载，至纣亡。", "周武王，始诛纣。", "八百载，最长久。", "周辙东，王纲坠。", "逞干戈，尚游说。", "始春秋，终战国。", "五霸强，七雄出。", "嬴秦氏，始兼并。", "传二世，楚汉争。", "高祖兴，汉业建。", "至孝平，王莽篡。", "光武兴，为东汉。", "四百年，终于献。", "魏蜀吴，争汉鼎。", "号三国，迄两晋。", "宋齐继，梁陈承。", "为南朝，都金陵。", "北元魏，分东西。", "宇文周，与高齐。", "迨至隋，一土宇。", "不再传，失统绪。", "唐高祖，起义师。", "除隋乱，创国基。", "二十传，三百载。", "梁灭之，国乃改。", "梁唐晋，及汉周。", "称五代，皆有由。", "炎宋兴，受周禅。", "十八传，南北混。", "辽与金，皆称帝。", "元灭金，绝宋世。", "舆图广，超前代。", "九十年，国祚废。", "太祖兴，国大明。", "号洪武，都金陵。", "迨成祖，迁燕京。", "十六世，至崇祯。", "权阉肆，寇如林。", "李闯出，神器焚。", "清世祖，膺景命。", "靖四方，克大定。", "由康雍，历乾嘉。", "民安富，治绩夸。", "道咸间，变乱起。", "始英法，扰都鄙。", "同光后，宣统弱。", "传九帝，满清殁。", "革命兴，废帝制。", "立宪法，建民国。", "古今史，全在兹。", "载治乱，知兴衰。", "史虽繁，读有次。", "史记一，汉书二。", "后汉三，国志四。", "兼证经，参通鉴。", "读史者，考实录。", "通古今，若亲目。", "口而诵，心而惟。", "朝于斯，夕于斯。", "昔仲尼，师项橐。", "古圣贤，尚勤学。", "赵中令，读鲁论。", "彼既仕，学且勤。", "披蒲编，削竹简。", "彼无书，且知勉。", "头悬梁，锥刺股。", "彼不教，自勤苦。", "如囊萤，如映雪。", "家虽贫，学不辍。", "如负薪，如挂角。", "身虽劳，犹苦卓。", "苏老泉，二十七。", "始发愤，读书籍。", "彼既老，犹悔迟。", "尔小生，宜早思。", "若梁灏，八十二。", "对大廷，魁多士。", "彼既成，众称异。", "尔小生，宜立志。", "莹八岁，能咏诗。", "泌七岁，能赋棋。", "彼颖悟，人称奇。", "尔幼学，当效之。", "蔡文姬，能辨琴。", "谢道韫，能咏吟。", "彼女子，且聪敏。", "尔男子，当自警。", "唐刘晏，方七岁。", "举神童，作正字。", "晏虽幼，身已仕。", "有为者，亦若是。", "犬守夜，鸡司晨。", "苟不学，曷为人。", "蚕吐丝，蜂酿蜜。", "人不学，不如物。", "幼而学，壮而行。", "上致君，下泽民。", "扬名声，显父母。", "光于前，裕于后。", "人遗子，金满赢。", "我教子，唯一经。", "勤有功，戏无益。", "戒之哉，宜勉力。"], "img": false}, {"i": 699, "t": "自遣", "d": "", "a": "", "l": ["罗隐 唐", "得即高歌失即休，多愁多恨亦悠悠。", "今朝有酒今朝醉，明日愁来明日愁。"], "img": false}, {"i": 700, "t": "画堂春·一生一代", "d": "", "a": "", "l": ["纳兰容若", "一生一代一双人，争教两处销魂。相思相望不相亲，天为谁春？", "浆向蓝桥易乞，药成碧海难奔。若容相访饮牛津，相对忘贫。"], "img": false}, {"i": 701, "t": "卜算子·我住", "d": "", "a": "", "l": ["李之仪 北宋", "我住长江头，君住长江尾。", "日日思君不见君，共饮长江水。", "此水几时休，此恨何时已。", "只愿君心似我心，定不负相思意。"], "img": false}, {"i": 702, "t": "题李凝幽居", "d": "", "a": "", "l": ["贾岛", "闲居少邻并，草径入荒园。", "鸟宿池边树，僧敲月下门。", "过桥分野色，移石动云根。", "暂去还来此，幽期不负言。"], "img": false}, {"i": 703, "t": "菩提寺禁裴迪", "d": "", "a": "", "l": ["王维", "万户伤心生野烟，百官何日再朝天。", "秋槐叶落空宫里，凝碧池头奏管弦。"], "img": false}, {"i": 704, "t": "李凭箜篌引", "d": "", "a": "", "l": ["李贺", "吴丝蜀桐张高秋，空山凝云颓不流。", "江娥啼竹素女愁，李凭中国弹箜篌。", "昆山玉碎凤凰叫，芙蓉泣露香兰笑。", "十二门前融冷光，二十三丝动紫皇。", "女娲炼石补天处，石破天惊逗秋雨。", "梦入神山教神妪，老鱼跳波瘦蛟舞。", "吴质不眠倚桂树，露脚斜飞湿寒兔。"], "img": false}, {"i": 705, "t": "苦昼短", "d": "", "a": "", "l": ["李贺", "飞光飞光，劝尔一杯酒。", "吾不识青天高，黄地厚。", "唯见月寒日暖，来煎人寿。", "食熊则肥，食蛙则瘦。", "神君何在？太一安有？", "天东有若木，下置衔烛龙。", "吾将斩龙足，嚼龙肉，使之朝不得回，夜不得伏。", "自然老者不死，少者不哭。", "何为服黄金、吞白玉？", "谁似任公子，云中骑碧驴？", "刘彻茂陵多滞骨，嬴政梓棺费鲍鱼。"], "img": false}, {"i": 706, "t": "闻乐天授江州司马", "d": "", "a": "", "l": ["元稹", "残灯无焰影幢幢，此夕闻君谪九江。", "垂死病中惊坐起，暗风吹雨入寒窗。"], "img": false}, {"i": 707, "t": "节妇吟·寄东平李司空师道", "d": "", "a": "", "l": ["张藉", "君知妾有夫，赠妾双明珠。", "感君缠绵意，系在红罗襦。", "妾家高楼连苑起，良人执戟明光里。", "知君用心如日月，事夫誓拟同生死。", "还君明珠双泪垂，恨不相逢未嫁时。"], "img": false}, {"i": 708, "t": "离思五首·曾经", "d": "", "a": "", "l": ["元稹", "曾经沧海难为水，除却巫山不是云。", "取次花丛懒回顾，半缘修道半缘君。"], "img": false}, {"i": 709, "t": "读禅经", "d": "", "a": "", "l": ["白居易", "须知诸相皆非相，若住无馀却有馀。", "言下忘言一时了，梦中说梦两重虚。", "空花岂得兼求果，阳焰如何更觅鱼。", "摄动是禅禅是动，不禅不动即如如。"], "img": false}, {"i": 710, "t": "花月痕·第十五回诗", "d": "", "a": "", "l": ["魏秀仁", "多情自古空余恨，好梦由来最易醒。", "岂是拈花难解脱，可怜飞絮太飘零。", "香巢乍结鸳鸯社，新句犹书翡翠屏。", "不为别离肠已断，泪痕也满旧衫青。"], "img": false}, {"i": 711, "t": "寓意", "d": "", "a": "", "l": ["晏殊", "油壁香车不再逢，峡云无迹任西东。", "梨花院落溶溶月，柳絮池塘淡淡风。", "几日寂寥伤酒后，一番萧索禁烟中。", "鱼书欲寄何由达，水远山长处处同。"], "img": false}, {"i": 712, "t": "梦天", "d": "", "a": "", "l": ["李贺 唐朝", "老兔寒蟾泣天色，", "云楼半开壁斜白。", "玉轮轧露湿团光，", "鸾珮相逢桂香陌。", "黄尘清水三山下，", "更变千年如走马。", "遥望齐州九点烟，", "一泓海水杯中泻。"], "img": false}, {"i": 713, "t": "题龙阳县青草湖", "d": "", "a": "", "l": ["唐珙 元代", "西风吹老洞庭波，一夜湘君白发多。", "醉后不知天在水，满船清梦压星河。"], "img": false}, {"i": 714, "t": "开愁歌", "d": "", "a": "", "l": ["李贺〔唐代〕", "秋风吹地百草干，华容碧影生晚寒。", "我当二十不得意，一心愁谢如枯兰。", "衣如飞鹑马如狗，临歧击剑生铜吼。", "旗亭下马解秋衣，请贳宜阳一壶酒。", "壶中唤天云不开，白昼万里闲凄迷。", "主人劝我养心骨，莫受俗物相填豗。"], "img": false}, {"i": 715, "t": "宫娃歌", "d": "", "a": "", "l": ["李贺〔唐代〕", "蜡光高悬照纱空，花房夜捣红守宫。", "象口吹香毾覴暖，七星挂城闻漏板。", "寒入罘罳殿影昏，彩鸾帘额著霜痕。", "啼蛄吊月钩阑下，屈膝铜铺锁阿甄。", "梦入家门上沙渚，天河落处长洲路。", "愿君光明如太阳，放妾骑鱼撇波去。"], "img": false}, {"i": 716, "t": "贝宫夫人", "d": "", "a": "", "l": ["李贺〔唐代〕", "丁丁海女弄金环，雀钗翘揭双翅关。", "六宫不语一生闲，高悬银榜照青山。", "长眉凝绿几千年，清凉堪老镜中鸾。", "秋肌稍觉玉衣寒，空光贴妥水如天。"], "img": false}, {"i": 717, "t": "巫山高", "d": "", "a": "", "l": ["李贺〔唐代〕", "碧丛丛，高插天，大江翻澜神曳烟。", "楚魂寻梦风飔然，晓风飞雨生苔钱。", "瑶姬一去一千年，丁香筇竹啼老猿。", "古祠近月蟾桂寒，椒花坠红湿云间。"], "img": false}, {"i": 718, "t": "江南弄", "d": "", "a": "", "l": ["李贺〔唐代〕", "江中绿雾起凉波，天上叠巘红嵯峨。", "水风浦云生老竹，渚暝蒲帆如一幅。", "鲈鱼千头酒百斛，酒中倒卧南山绿。", "吴歈越吟未终曲，江上团团贴寒玉。"], "img": false}, {"i": 719, "t": "南山田中行", "d": "", "a": "", "l": ["李贺〔唐代〕", "秋野明，秋风白，塘水漻漻虫啧啧。", "云根苔藓山上石，冷红泣露娇啼色。", "荒畦九月稻叉牙，蛰萤低飞陇径斜。", "石脉水流泉滴沙，鬼灯如漆点松花。"], "img": false}, {"i": 720, "t": "神弦", "d": "", "a": "", "l": ["李贺〔唐代〕", "女巫浇酒云满空，玉炉炭火香咚咚。", "海神山鬼来座中，纸钱窸窣鸣旋风。", "相思木贴金舞鸾，攒蛾一啑重一弹。", "呼星召鬼歆杯盘，山魅食时人森寒。", "终南日色低平湾，神兮长在有无间。", "神嗔神喜师更颜，送神万骑还青山。"], "img": false}, {"i": 721, "t": "官街鼓", "d": "", "a": "", "l": ["李贺〔唐代〕", "晓声隆隆催转日，暮声隆隆呼月出。", "汉城黄柳映新帘，柏陵飞燕埋香骨。", "磓碎千年日长白，孝武秦皇听不得。", "从君翠发芦花色，独共南山守中国。", "几回天上葬神仙，漏声相将无断绝。"], "img": false}, {"i": 722, "t": "七夕", "d": "", "a": "", "l": ["李贺〔唐代〕", "别浦今朝暗，罗帷午夜愁。", "鹊辞穿线月，花入曝衣楼。", "天上分金镜，人间望玉钩。", "钱塘苏小小，更值一年秋。"], "img": false}, {"i": 723, "t": "将进酒", "d": "", "a": "", "l": ["李贺〔唐代〕", "琉璃钟，琥珀浓，小槽酒滴真珠红。", "烹龙炮凤玉脂泣，罗帏绣幕围香风。", "吹龙笛，击鼍鼓；皓齿歌，细腰舞。", "况是青春日将暮，桃花乱落如红雨。", "劝君终日酩酊醉，酒不到刘伶坟上土。"], "img": false}, {"i": 724, "t": "致酒行", "d": "", "a": "", "l": ["李贺〔唐代〕", "零落栖迟一杯酒，主人奉觞客长寿。", "主父西游困不归，家人折断门前柳。", "吾闻马周昔作新丰客，天荒地老无人识。", "空将笺上两行书，直犯龙颜请恩泽。", "我有迷魂招不得，雄鸡一声天下白。", "少年心事当拏云，谁念幽寒坐呜呃。"], "img": false}, {"i": 725, "t": "金铜仙人辞汉歌", "d": "", "a": "", "l": ["李贺〔唐代〕", "魏明帝青龙元年八月，诏宫官牵车西取汉孝武捧露盘仙人，欲立置前殿。宫官既拆盘，仙人临载，乃潸然泪下。唐诸王孙李长吉遂作《金铜仙人辞汉歌》。", "茂陵刘郎秋风客，夜闻马嘶晓无迹。", "画栏桂树悬秋香，三十六宫土花碧。", "魏官牵车指千里，东关酸风射眸子。", "空将汉月出宫门，忆君清泪如铅水。", "衰兰送客咸阳道，天若有情天亦老。", "携盘独出月荒凉，渭城已远波声小。"], "img": false}, {"i": 726, "t": "南园十三首·其五", "d": "", "a": "", "l": ["李贺〔唐代〕", "男儿何不带吴钩，收取关山五十州。", "请君暂上凌烟阁，若个书生万户侯？"], "img": false}, {"i": 727, "t": "临江仙·自洛阳往孟津道中作", "d": "", "a": "", "l": ["元好问〔金朝〕", "今古北邙山下路，黄尘老尽英雄。人生长恨水长东。幽怀谁共语，远目送归鸿。", "盖世功名将底用，从前错怨天公。浩歌一曲酒千钟。男儿行处是，未要论穷通。"], "img": false}, {"i": 728, "t": "同儿辈赋未开海棠·其二", "d": "", "a": "", "l": ["元好问〔金朝〕", "枝间新绿一重重， 小蕾深藏数点红。", "爱惜芳心莫轻吐， 且教桃李闹春风。"], "img": false}, {"i": 729, "t": "新荷叶·薄露初零", "d": "", "a": "", "l": ["李清照〔宋代〕", "薄露初零，长宵共、永昼分停。绕水楼台，高耸万丈蓬瀛。芝兰为寿，相辉映、簪笏盈庭。花柔玉净，捧觞别有娉婷。", "鹤瘦松青，精神与、秋月争明。德行文章，素驰日下声名。东山高蹈，虽卿相、不足为荣。安石须起，要苏天下苍生。"], "img": false}, {"i": 730, "t": "睦州四韵", "d": "", "a": "", "l": ["杜牧〔唐代〕", "州在钓台边，溪山实可怜。", "有家皆掩映，无处不潺湲。", "好树鸣幽鸟，晴楼入野烟。", "残春杜陵客，中酒落花前。"], "img": false}, {"i": 731, "t": "善哉行·有美一人", "d": "", "a": "", "l": ["曹丕〔魏晋〕", "有美一人，婉如清扬。", "妍姿巧笑，和媚心肠。", "知音识曲，善为乐方。", "哀弦微妙，清气含芳。", "流郑激楚，度宫中商。", "感心动耳，绮丽难忘。", "离鸟夕宿，在彼中洲。", "延颈鼓翼，悲鸣相求。", "眷然顾之，使我心愁。", "嗟尔昔人，何以忘忧。"], "img": false}, {"i": 732, "t": "陌上花三首", "d": "", "a": "", "l": ["苏轼〔宋代〕", "游九仙山，闻里中儿歌陌上花，父老云，吴越王妃每岁春必归临安，王以书遗妃曰：“陌上花开，可缓缓归矣。”吴人用其语为歌，含思宛转，听之凄然。而其词鄙野，为易之云。", "陌上花开蝴蝶飞，江山犹是昔人非。", "遗民几度垂垂老，游女长歌缓缓归。", "陌上山花无数开，路人争看翠軿来。", "若为留得堂堂去，且更从教缓缓回。", "生前富贵草头露，身后风流陌上花。", "已作迟迟君去鲁，犹教缓缓妾还家。"], "img": false}, {"i": 733, "t": "四时读书乐·其二", "d": "", "a": "", "l": ["翁森〔宋代〕", "新竹压檐桑四围，小斋幽敞明朱曦。", "昼长吟罢蝉鸣树，夜深烬落萤入帏。", "北窗高卧羲皇侣，只因素稔读书趣。", "读书之乐乐无穷，瑶琴一曲来薰风。"], "img": false}, {"i": 734, "t": "月夜听卢子顺弹琴", "d": "", "a": "", "l": ["李白〔唐代〕", "闲夜坐明月，幽人弹素琴。", "忽闻悲风调，宛若寒松吟。", "白雪乱纤手，绿水清虚心。", "钟期久已没，世上无知音。"], "img": false}, {"i": 735, "t": "秦楼月·浮云集", "d": "", "a": "", "l": ["范成大〔宋代〕", "浮云集。轻雷隐隐初惊蛰。初惊蛰。鹁鸠鸣怒，绿杨风急。", "玉炉烟重香罗浥。拂墙浓杏燕支湿。燕支湿。花梢缺处，画楼人立。"], "img": false}, {"i": 736, "t": "春夜别友人二首·其一", "d": "", "a": "", "l": ["陈子昂〔唐代〕", "银烛吐青烟，金樽对绮筵。", "离堂思琴瑟，别路绕山川。", "明月隐高树，长河没晓天。", "悠悠洛阳道，此会在何年。"], "img": false}, {"i": 737, "t": "汴河曲", "d": "", "a": "", "l": ["李益〔唐代〕", "汴水东流无限春，隋家宫阙已成尘。", "行人莫上长堤望，风起杨花愁杀人。"], "img": false}, {"i": 738, "t": "送蔡山人", "d": "", "a": "", "l": ["李白〔唐代〕", "我本不弃世，世人自弃我。", "一乘无倪舟，八极纵远舵。", "燕客期跃马，唐生安敢讥。", "采珠勿惊龙，大道可暗归。", "故山有松月，迟尔玩清晖。"], "img": false}, {"i": 739, "t": "东平别前卫县李寀少府", "d": "", "a": "", "l": ["高适〔唐代〕", "黄鸟翩翩杨柳垂，春风送客使人悲。", "怨别自惊千里外，论交却忆十年时。", "云开汶水孤帆远，路绕梁山匹马迟。", "此地从来可乘兴，留君不住益凄其。"], "img": false}, {"i": 740, "t": "观猎", "d": "", "a": "", "l": ["王维〔唐代〕", "风劲角弓鸣，将军猎渭城。", "草枯鹰眼疾，雪尽马蹄轻。", "忽过新丰市，还归细柳营。", "回看射雕处，千里暮云平。"], "img": false}, {"i": 741, "t": "满庭芳·山抹微云", "d": "", "a": "", "l": ["秦观〔宋代〕", "山抹微云，天连衰草，画角声断谯门。暂停征棹，聊共引离尊。多少蓬莱旧事，空回首、烟霭纷纷。斜阳外，寒鸦数点，流水绕孤村。", "销魂当此际，香囊暗解，罗带轻分。谩赢得、青楼薄幸名存。此去何时见也？襟袖上、空惹啼痕。伤情处，高城望断，灯火已黄昏。"], "img": false}, {"i": 742, "t": "落花 -宋祁", "d": "", "a": "", "l": ["宋祁〔宋代〕", "坠素翻红各自伤，青楼烟雨忍相忘。", "将飞更作回风舞，已落犹成半面妆。", "沧海客归珠有泪，章台人去骨遗香。", "可能无意传双蝶，尽付芳心与蜜房。"], "img": false}, {"i": 743, "t": "奉试明堂火珠", "d": "", "a": "", "l": ["崔曙〔唐代〕", "正位开重屋，凌空出火珠。", "夜来双月满，曙后一星孤。", "天净光难灭，云生望欲无。", "遥知太平代，国宝在名都。"], "img": false}, {"i": 744, "t": "金错刀行", "d": "", "a": "", "l": ["陆游〔宋代〕", "![图片](https://image.keymemox.com/2025/02/21/ecbb2b8584994f049b3f53719c4e7bdbphotoAsset0.png)", "![图片](https://image.keymemox.com/2025/02/21/228e453533d84a3289fe531d54beb8b3photoAsset1.png)", "黄金错刀白玉装，夜穿窗扉出光芒。", "丈夫五十功未立，提刀独立顾八荒。", "京华结交尽奇士，意气相期共生死。", "千年史册耻无名，一片丹心报天子。", "尔来从军天汉滨，南山晓雪玉嶙峋。", "呜呼！楚虽三户能亡秦，岂有堂堂中国空无人！"], "img": true}, {"i": 745, "t": "振鹭", "d": "", "a": "", "l": ["诗经·周颂·臣工之什〔先秦〕", "振鹭于飞，于彼西雍。", "我客戾止，亦有斯容。", "在彼无恶，在此无斁。", "庶几夙夜，以永终誉。"], "img": false}, {"i": 746, "t": "送别 .骆宾王", "d": "", "a": "", "l": ["骆宾王〔唐代〕", "寒更承夜永，凉夕向秋澄。", "离心何以赠，自有玉壶冰。"], "img": false}, {"i": 747, "t": "汨罗遇风", "d": "", "a": "", "l": ["柳宗元〔唐代〕", "南来不作楚臣悲，重入修门自有期。", "为报春风汨罗道，莫将波浪枉明时。"], "img": false}, {"i": 748, "t": "宿清溪主人", "d": "", "a": "", "l": ["李白〔唐代〕", "夜到清溪宿，主人碧岩里。", "檐楹挂星斗，枕席响风水。", "月落西山时，啾啾夜猿起。"], "img": false}, {"i": 749, "t": "江亭", "d": "", "a": "", "l": ["杜甫〔唐代〕", "坦腹江亭暖，长吟野望时。", "水流心不竞，云在意俱迟。", "寂寂春将晚，欣欣物自私。", "江东犹苦战，回首一颦眉。"], "img": false}, {"i": 750, "t": "焚书坑", "d": "", "a": "", "l": ["章碣〔唐代〕", "竹帛烟销帝业虚，关河空锁祖龙居。", "坑灰未冷山东乱，刘项原来不读书。"], "img": false}, {"i": 751, "t": "满江红·敲碎离愁", "d": "", "a": "", "l": ["辛弃疾〔宋代〕", "敲碎离愁，纱窗外、风摇翠竹。人去后、吹箫声断，倚楼人独。满眼不堪三月暮，举头已觉千山绿。但试将一纸寄来书，从头读。", "相思字，空盈幅；相思意，何时足？滴罗襟点点，泪珠盈掬。芳草不迷行客路，垂杨只碍离人目。最苦是、立尽月黄昏，阑干曲。"], "img": false}, {"i": 752, "t": "嘲三月十八日雪", "d": "", "a": "", "l": ["温庭筠〔唐代〕", "三月雪连夜，未应伤物华。", "只缘春欲尽，留著伴梨花。"], "img": false}, {"i": 753, "t": "卖花声·雨花台", "d": "", "a": "", "l": ["朱彝尊〔清代〕", "衰柳白门湾，潮打城还。小长干接大长干。歌板酒旗零落尽，剩有渔竿。", "秋草六朝寒，花雨空坛。更无人处一凭栏。燕子斜阳来又去，如此江山。"], "img": false}, {"i": 754, "t": "小重山·昨夜", "d": "", "a": "", "l": ["岳飞〔宋代〕", "昨夜寒蛩不住鸣。惊回千里梦，已三更。起来独自绕阶行。人悄悄，帘外月胧明。", "白首为功名。旧山松竹老，阻归程。欲将心事付瑶琴。知音少，弦断有谁听？"], "img": false}, {"i": 755, "t": "杨叛儿", "d": "", "a": "", "l": ["李白〔唐代〕", "君歌杨叛儿，妾劝新丰酒。", "何许最关人，乌啼白门柳。", "乌啼隐杨花，君醉留妾家。", "博山炉中沉香火，双烟一气凌紫霞。"], "img": false}, {"i": 756, "t": "南乡子·和杨元素时移守密州", "d": "", "a": "", "l": ["苏轼〔宋代〕", "东武望余杭，云海天涯两杳茫。何日功成名遂了，还乡，醉笑陪公三万场。", "不用诉离觞，痛饮从来别有肠。今夜送归灯火冷，河塘，堕泪羊公却姓杨。"], "img": false}, {"i": 757, "t": "泾溪", "d": "", "a": "", "l": ["杜荀鹤〔唐代〕", "泾溪石险人兢慎，终岁不闻倾覆人。", "却是平流无石处，时时闻说有沉沦。"], "img": false}, {"i": 758, "t": "题长安壁主人", "d": "", "a": "", "l": ["张谓〔唐代〕", "世人结交须黄金，黄金不多交不深。", "纵令然诺暂相许，终是悠悠行路心。"], "img": false}, {"i": 759, "t": "春日使府寓怀二首", "d": "", "a": "", "l": ["薛能〔唐代〕", "一想流年百事惊，已抛渔父戴尘缨。", "青春背我堂堂去， 白发欺人故故生。", "道困古来应有分，诗传身后亦何荣。", "谁怜合负清朝力，独把风骚破郑声。", "平生无解亦无操，永日书生坐独劳。", "唯觉宦情如水薄，不知人事有山高。", "孤心好直迍犹强，病发慵梳痒更搔。", "何事故溪归未得，几抛清浅泛红桃。"], "img": false}, {"i": 760, "t": "杏花", "d": "", "a": "", "l": ["薛能〔唐代〕", "活色生香第一流，手中移得近青楼。", "谁知艳性终相负，乱向春风笑不休。"], "img": false}, {"i": 761, "t": "并州寓怀", "d": "", "a": "", "l": ["薛能〔唐代〕", "人多知遇独难求，人负知音独爱酬。", "常恐此心无乐处，枉称年少在并州。"], "img": false}, {"i": 762, "t": "水调歌头·送杨民瞻", "d": "", "a": "", "l": ["辛弃疾〔宋代〕", "日月如磨蚁，万事且浮休。君看檐外江水，滚滚自东流。风雨瓢泉夜半，花草雪楼春到，老子已菟裘。岁晚问无恙，归计橘千头。", "梦连环，歌弹铗，赋登楼。黄鸡白酒，君去村社一番秋。长剑倚天谁问，夷甫诸人堪笑，西北有神州。此事君自了，千古一扁舟。"], "img": false}, {"i": 763, "t": "正月二十日往岐亭郡人潘古郭三人送余于女王城东禅庄院", "d": "", "a": "", "l": ["苏轼〔宋代〕", "十日春寒不出门，不知江柳已摇村。", "稍闻决决流冰谷，尽放青青没烧痕。", "数亩荒园留我住，半瓶浊酒待君温。", "去年今日关山路，细雨梅花正断魂。"], "img": false}, {"i": 764, "t": "菊", "d": "", "a": "", "l": ["罗隐〔唐代〕", "篱落岁云暮，数枝聊自芳。", "雪裁纤蕊密，金拆小苞香。", "千载白衣酒，一生青女霜。", "春丛莫轻薄，彼此有行藏。"], "img": false}, {"i": 765, "t": "虞美人·有美堂赠述古", "d": "", "a": "", "l": ["苏轼〔宋代〕", "湖山信是东南美，一望弥千里。使君能得几回来？便使樽前醉倒更徘徊。", "沙河塘里灯初上，水调谁家唱？夜阑风静欲归时，惟有一江明月碧琉璃。"], "img": false}, {"i": 766, "t": "黄头郎", "d": "", "a": "", "l": ["李贺〔唐代〕", "黄头郎，捞拢去不归。", "南浦芙蓉影，愁红独自垂。", "水弄湘娥佩，竹啼山露月。", "玉瑟调青门，石云湿黄葛。", "沙上蘼芜花，秋风已先发。", "好持扫罗荐，香出鸳鸯热。"], "img": false}, {"i": 767, "t": "题画竹", "d": "", "a": "", "l": ["郑燮〔清代〕", "秋风昨夜渡潇湘，触石穿林惯作狂。", "惟有竹枝浑不怕，挺然相斗一千场。"], "img": false}, {"i": 768, "t": "舟过谢潭三首·其三", "d": "", "a": "", "l": ["杨万里〔宋代〕", "碧酒时倾一两杯，船门才闭又还开。", "好山万皱无人见，都被斜阳拈出来。"], "img": false}, {"i": 769, "t": "枉凝眉", "d": "", "a": "", "l": ["曹雪芹〔清代〕", "一个是阆苑仙葩，一个是美玉无瑕。", "若说没奇缘，今生偏又遇着他；", "若说有奇缘，如何心事终虚化？", "一个枉自嗟呀，一个空劳牵挂。", "一个是水中月，一个是镜中花。", "想眼中能有多少泪珠儿，怎禁得秋流到冬尽，春流到夏！"], "img": false}, {"i": 770, "t": "生查子·独游雨岩", "d": "", "a": "", "l": ["辛弃疾〔宋代〕", "溪边照影行，天在清溪底。天上有行云，人在行云里。", "高歌谁和余，空谷清音起。非鬼亦非仙，一曲桃花水。"], "img": false}, {"i": 771, "t": "忆秦娥·咏桐", "d": "", "a": "", "l": ["李清照〔宋代〕", "临高阁，乱山平野烟光薄。烟光薄，栖鸦归后，暮天闻角。", "断香残酒情怀恶，西风催衬梧桐落。梧桐落，又还秋色，又还寂寞。"], "img": false}, {"i": 772, "t": "拨不断·菊花开", "d": "", "a": "", "l": ["马致远〔元代〕", "菊花开，正归来。伴虎溪僧、鹤林友、龙山客，似杜工部、陶渊明、李太白，在洞庭柑、东阳酒、西湖蟹。哎，楚三闾休怪！"], "img": false}, {"i": 773, "t": "不见", "d": "", "a": "", "l": ["杜甫〔唐代〕", "不见李生久，佯狂真可哀。", "世人皆欲杀，吾意独怜才。", "敏捷诗千首，飘零酒一杯。", "匡山读书处，头白好归来。"], "img": false}, {"i": 774, "t": "泊岳阳城下", "d": "", "a": "", "l": ["杜甫〔唐代〕", "江国逾千里，山城近百层。", "岸风翻夕浪，舟雪洒寒灯。", "留滞才难尽，艰危气益增。", "图南未可料，变化有鲲鹏。"], "img": false}, {"i": 775, "t": "西江月·世事短如", "d": "", "a": "", "l": ["朱敦儒〔宋代〕", "世事短如春梦，人情薄似秋云。不须计较苦劳心，万事原来有命。", "幸遇三杯酒好，况逢一朵花新。片时欢笑且相亲，明日阴晴未定。"], "img": false}, {"i": 776, "t": "浣溪沙·和柳亚子先生", "d": "", "a": "", "l": ["毛泽东〔近现代〕", "长夜难明赤县天，百年魔怪舞翩跹，人民五亿不团圆。", "一唱雄鸡天下白，万方乐奏有于阗，诗人兴会更无前。"], "img": false}, {"i": 777, "t": "赠郭将军", "d": "", "a": "", "l": ["李白〔唐代〕", "将军少年出武威，入掌银台护紫微。", "平明拂剑朝天去，薄暮垂鞭醉酒归。", "爱子临风吹玉笛，美人向月舞罗衣。", "畴昔雄豪如梦里，相逢且欲醉春晖。"], "img": false}, {"i": 778, "t": "柳梢青·送卢梅坡", "d": "", "a": "", "l": ["刘过〔宋代〕", "泛菊杯深，吹梅角远，同在京城。聚散匆匆，云边孤雁，水上浮萍。", "教人怎不伤情。觉几度、魂飞梦惊。后夜相思，尘随马去，月逐舟行。"], "img": false}, {"i": 779, "t": "元日述怀", "d": "", "a": "", "l": ["卢照邻〔唐代〕", "筮仕无中秩，归耕有外臣。", "人歌小岁酒，花舞大唐春。", "草色迷三径，风光动四邻。", "愿得长如此，年年物候新。"], "img": false}, {"i": 780, "t": "休洗红", "d": "", "a": "", "l": ["李贺〔唐代〕", "休洗红，洗多红色浅。", "卿卿骋少年，昨日殷桥见。", "封侯早归来，莫作弦上箭。"], "img": false}, {"i": 781, "t": "崇义里滞雨", "d": "", "a": "", "l": ["李贺〔唐代〕", "落莫谁家子，来感长安秋。", "壮年抱羁恨，梦泣生白头。", "瘦马秣败草，雨沫飘寒沟。", "南宫古帘暗，湿景传签筹。", "家山远千里，云脚天东头。", "忧眠枕剑匣，客帐梦封侯。"], "img": false}, {"i": 782, "t": "秦王饮酒", "d": "", "a": "", "l": ["李贺〔唐代〕", "秦王骑虎游八极，剑光照空天自碧。", "羲和敲日玻璃声，劫灰飞尽古今平。", "龙头泻酒邀酒星，金槽琵琶夜枨枨。", "洞庭雨脚来吹笙，酒酣喝月使倒行。", "银云栉栉瑶殿明，宫门掌事报一更。", "花楼玉凤声娇狞，海绡红文香浅清，", "黄鹅跌舞千年觥。", "仙人烛树蜡烟轻，清琴醉眼泪泓泓。"], "img": false}, {"i": 783, "t": "上之回", "d": "", "a": "", "l": ["李贺〔唐代〕", "上之回，大旗喜。", "悬红云，挞凤尾。", "剑匣破，舞蛟龙。", "蚩尤死，鼓逢逢。", "天高庆雷齐堕地。", "地无惊烟海千里。"], "img": false}, {"i": 784, "t": "帝子歌", "d": "", "a": "", "l": ["李贺〔唐代〕", "洞庭明月一千里，凉风雁啼天在水。", "九节菖蒲石上死，湘神弹琴迎帝子。", "山头老桂吹古香，雌龙怨吟寒水光。", "沙浦走鱼白石郎，闲取真珠掷龙堂。"], "img": false}, {"i": 785, "t": "春坊正字剑子歌", "d": "", "a": "", "l": ["李贺〔唐代〕", "先辈匣中三尺水，曾入吴潭斩龙子。", "隙月斜明刮露寒，练带平铺吹不起。", "蛟胎皮老蒺藜刺，鸊鹈淬花白鹇尾。", "直是荆轲一片心，莫教照见春坊字。", "挼丝团金悬簏簌，神光欲截蓝田玉。", "提出西方白帝惊，嗷嗷鬼母秋郊哭。"], "img": false}, {"i": 786, "t": "老夫采玉歌", "d": "", "a": "", "l": ["李贺〔唐代〕", "采玉采玉须水碧，琢作步摇徒好色。", "老夫饥寒龙为愁，蓝溪水气无清白。", "夜雨冈头食蓁子，杜鹃口血老夫泪。", "蓝溪之水厌生人，身死千年恨溪水。", "斜山柏风雨如啸，泉脚挂绳青袅袅。", "村寒白屋念娇婴，古台石磴悬肠草。"], "img": false}, {"i": 787, "t": "长平箭头歌", "d": "", "a": "", "l": ["李贺〔唐代〕", "漆灰骨末丹水沙，凄凄古血生铜花。", "白翎金竿雨中尽，直余三脊残狼牙。", "我寻平原乘两马，驿东石田蒿坞下。", "风长日短星萧萧，黑旗云湿悬空夜。", "左魂右魄啼肌瘦，酪瓶倒尽将羊炙。", "虫栖雁病芦笋红，回风送客吹阴火。", "访古丸澜收断镞，折锋赤璺曾刲肉。", "南陌东城马上儿，劝我将金换簝竹。"], "img": false}, {"i": 788, "t": "蝴蝶飞", "d": "", "a": "", "l": ["李贺〔唐代〕", "![图片](https://image.keymemox.com/2025/02/20/2f1cdca50c1f4ff186fdf837d031b532photoAsset0.png)", "杨花扑帐春云热，龟甲屏风醉眼缬。", "东家胡蝶西家飞，白骑少年今日归。"], "img": true}, {"i": 789, "t": "浩歌", "d": "", "a": "", "l": ["李贺〔唐代〕", "南风吹山作平地，帝遣天吴移海水。", "王母桃花千遍红，彭祖巫咸几回死？", "青毛骢马参差钱，娇春杨柳含缃烟。", "筝人劝我金屈卮，神血未凝身问谁？", "不须浪饮丁都护，世上英雄本无主。", "买丝绣作平原君，有酒唯浇赵州土。", "漏催水咽玉蟾蜍，卫娘发薄不胜梳。", "羞见秋眉换新绿，二十男儿那刺促？"], "img": false}, {"i": 790, "t": "走马引", "d": "", "a": "", "l": ["李贺〔唐代〕", "我有辞乡剑，玉锋堪截云。", "襄阳走马客，意气自生春。", "朝嫌剑光静，暮嫌剑花冷。", "能持剑向人，不解持照身。"], "img": false}, {"i": 791, "t": "假龙吟歌", "d": "", "a": "", "l": ["李贺〔唐代〕", "石轧铜杯，吟咏枯瘁。", "苍鹰摆血，白凤下肺。", "桂子自落，云弄车盖。", "木死沙崩恶谿岛，阿母得仙今不老。", "窞中跳汰截清涎，隈壖卧水埋金爪。", "崖蹬苍苔吊石发，江君掩帐筼筜折。", "莲花去国一千年，雨后闻腥犹带铁。"], "img": false}, {"i": 792, "t": "相和歌辞·神弦曲", "d": "", "a": "", "l": ["李贺〔唐代〕", "西山日没东山昏，旋风吹马马踏云。", "画弦素管声浅繁，花裙綷縩步秋尘。", "桂叶刷风桂坠子，青狸哭血寒狐死。", "古壁彩虬金帖尾，雨工骑入秋潭水。", "百年老鸮成木魅，笑声碧火巢中起。"], "img": false}, {"i": 793, "t": "纵笔三首·寂寂", "d": "", "a": "", "l": ["苏轼〔宋代〕", "寂寂东坡一病翁，白须萧散满霜风。", "小儿误喜朱颜在，一笑那知是酒红。"], "img": false}, {"i": 794, "t": "洞仙歌·冰肌玉骨", "d": "", "a": "", "l": ["仆七岁时，见眉州老尼，姓朱，忘其名，年九十岁。自言尝随其师入蜀主孟昶宫中，一日大热，蜀主与花蕊夫人夜纳凉摩诃池上，作一词，朱具能记之。今四十年，朱已死久矣，人无知此词者，但记其首两句，暇日寻味，岂《洞仙歌》令乎？乃为足之云。", "冰肌玉骨，自清凉无汗。水殿风来暗香满。绣帘开，一点明月窥人，人未寝，欹枕钗横鬓乱。", "起来携素手，庭户无声，时见疏星渡河汉。试问夜如何？夜已三更，金波淡，玉绳低转。但屈指西风几时来，又不道流年暗中偷换。"], "img": false}, {"i": 795, "t": "青玉案·送伯固归吴中", "d": "", "a": "", "l": ["苏轼〔宋代〕", "三年枕上吴中路。遣黄耳、随君去。若到松江呼小渡。莫惊鸥鹭，四桥尽是，老子经行处。", "辋川图上看春暮。常记高人右丞句。作个归期天已许。春衫犹是，小蛮针线，曾湿西湖雨。"], "img": false}, {"i": 796, "t": "水调歌头·呈汉阳使君", "d": "", "a": "", "l": ["王以宁〔宋代〕", "大别我知友，突兀起西州。十年重见，依旧秀色照清眸。常记鲒碕狂客，邀我登楼雪霁，杖策拥羊裘。山吐月千仞，残夜水明楼。", "黄粱梦，未觉枕，几经秋。与君邂逅，相逐飞步碧山头。举酒一觞今古，叹息英雄骨冷，清泪不能收。鹦鹉更谁赋，遗恨满芳州。"], "img": false}, {"i": 797, "t": "诉衷情·永夜抛人", "d": "", "a": "", "l": ["顾夐〔五代〕", "永夜抛人何处去？绝来音。香阁掩，眉敛，月将沉。", "争忍不相寻？怨孤衾。换我心，为你心，始知相忆深。"], "img": false}, {"i": 798, "t": "菩萨蛮·半烟", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "王荆公新筑草堂于半山，引八功德水作小港，其上垒石作桥，为集句云：“数间茅屋闲临水，窄衫短帽垂杨里。花是去年红，吹开一夜风。梢梢新月偃，午醉醒来晚。何物最关情，黄鹂三两声。”戏效荆公作。", "半烟半雨溪桥畔，渔翁醉着无人唤。疏懒意何长，春风花草香。", "江山如有待，此意陶潜解。问我去何之，君行到自知。"], "img": false}, {"i": 799, "t": "清明 .黄庭坚", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "佳节清明桃李笑，野田荒冢只生愁。", "雷惊天地龙蛇蛰，雨足郊原草木柔。", "人乞祭余骄妾妇，士甘焚死不公侯。", "贤愚千载知谁是，满眼蓬蒿共一丘。"], "img": false}, {"i": 800, "t": "水调歌头·游览", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "瑶草一何碧，春入武陵溪。溪上桃花无数，枝上有黄鹂。我欲穿花寻路，直入白云深处，浩气展虹霓。只恐花深里，红露湿人衣。", "坐玉石，倚玉枕，拂金徽。谪仙何处？无人伴我白螺杯。我为灵芝仙草，不为朱唇丹脸，长啸亦何为？醉舞下山去，明月逐人归。"], "img": false}, {"i": 801, "t": "鹧鸪天·座中有眉山隐客史应之和前韵即席答之", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "黄菊枝头生晓寒。人生莫放酒杯干。风前横笛斜吹雨，醉里簪花倒著冠。", "身健在，且加餐。舞裙歌板尽清欢。黄花白发相牵挽，付与时人冷眼看。"], "img": false}, {"i": 802, "t": "杂诗七首·此身", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "此身天地一蘧庐，世事消磨绿鬓疏。", "毕竟几人真得鹿，不知终日梦为鱼。"], "img": false}, {"i": 803, "t": "雨中登岳阳楼望君山", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "投荒万死鬓毛斑，生入瞿塘滟滪关。", "未到江南先一笑，岳阳楼上对君山。", "满川风雨独凭栏，绾结湘娥十二鬟。", "可惜不当湖水面，银山堆里看青山。"], "img": false}, {"i": 804, "t": "虞美人·宜州见梅作", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "天涯也有江南信。梅破知春近。夜阑风细得香迟。不道晓来开遍、向南枝。", "玉台弄粉花应妒。飘到眉心住。平生个里愿杯深。去国十年老尽、少年心。"], "img": false}, {"i": 805, "t": "念奴娇·断虹霁雨", "d": "", "a": "", "l": ["黄庭坚 北宋", "![图片](https://image.keymemox.com/2025/02/21/272b9289c97a46ba9537f32321981219photoAsset0.png)", "![图片](https://image.keymemox.com/2025/02/21/fdda9736e2ed46179fb3acc05d597473photoAsset1.png)", "八月十七日，同诸生步自永安城楼，过张宽夫园待月。偶有名酒，因以金荷酌众客。客有孙彦立，善吹笛。援笔作乐府长短句，文不加点。", "断虹霁雨，净秋空，山染修眉新绿。桂影扶疏，谁便道，今夕清辉不足？万里青天，姮娥何处，驾此一轮玉。寒光零乱，为谁偏照醽醁？", "年少从我追游，晚凉幽径，绕张园森木。共倒金荷，家万里，难得尊前相属。老子平生，江南江北，最爱临风曲。孙郎微笑，坐来声喷霜竹。(风曲 一作：临风笛)"], "img": true}, {"i": 806, "t": "定风波·次高左藏使君韵", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "![图片](https://image.keymemox.com/2025/02/20/1c1668abe57940bcbc8f8ddd127e5289photoAsset0.png)", "万里黔中一漏天，屋居终日似乘船。及至重阳天也霁，催醉，鬼门关外蜀江前。", "莫笑老翁犹气岸，君看，几人黄菊上华颠？戏马台南追两谢，驰射，风流犹拍古人肩。"], "img": true}, {"i": 807, "t": "王充道送水仙花五十支", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "凌波仙子生尘袜，水上轻盈步微月。", "是谁招此断肠魂，种作寒花寄愁绝。", "含香体素欲倾城，山矾是弟梅是兄。", "坐对真成被花恼，出门一笑大江横。"], "img": false}, {"i": 808, "t": "次元明韵寄子由", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "半世交亲随逝水，几人图画入凌烟？", "春风春雨花经眼，江北江南水拍天。", "欲解铜章行问道，定知石友许忘年。", "脊令各有思归恨，日月相催雪满颠。"], "img": false}, {"i": 809, "t": "南乡子·诸将", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "重阳日，宜州城楼宴集，即席作。", "诸将说封侯，短笛长歌独倚楼。万事尽随风雨去，休休，戏马台南金络头。", "催酒莫迟留，酒味今秋似去秋。花向老人头上笑，羞羞，白发簪花不解愁。"], "img": false}, {"i": 810, "t": "诉衷情·小桃", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "小桃灼灼柳鬖鬖，春色满江南。雨晴风暖烟淡，天气正醺酣。", "山泼黛，水挼蓝，翠相搀。歌楼酒旆，故故招人，权典青衫。"], "img": false}, {"i": 811, "t": "奉答李和甫代简二绝句", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "山色江声相与清，卷帘待得月华生。", "可怜一曲并船笛，说尽故人离别情。", "梦中往事随心见，醉里繁华乱眼生。", "长为风流恼人病，不如天性总无情。"], "img": false}, {"i": 812, "t": "品令·茶词", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "凤舞团团饼。恨分破、教孤令。金渠体净，只轮慢碾，玉尘光莹。汤响松风，早减了、二分酒病。", "味浓香永。醉乡路、成佳境。恰如灯下，故人万里，归来对影。口不能言，心下快活自省。"], "img": false}, {"i": 813, "t": "西江月·断送", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "老夫既戒酒不饮，遇宴集，独醒其旁。坐客欲得小词，援笔为赋。", "断送一生惟有，破除万事无过。远山横黛蘸秋波，不饮旁人笑我。", "花病等闲瘦弱，春愁无处遮拦。杯行到手莫留残，不道月斜人散。"], "img": false}, {"i": 814, "t": "南歌子·槐绿", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "槐绿低窗暗，榴红照眼明。玉人邀我少留行。无奈一帆烟雨、画船轻。", "柳叶随歌皱，梨花与泪倾。别时不似见时情。今夜月明江上、酒初醒。"], "img": false}, {"i": 815, "t": "和答元明黔南赠别", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "万里相看忘逆旅，三声清泪落离觞。", "朝云往日攀天梦，夜雨何时对榻凉。", "急雪脊令相并影，惊风鸿雁不成行。", "归舟天际常回首，从此频书慰断肠。"], "img": false}, {"i": 816, "t": "寄贺方回", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "少游醉卧古藤下，谁与愁眉唱一杯。", "解作江南断肠句，只今唯有贺方回。"], "img": false}, {"i": 817, "t": "望江东·江水西头", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "江水西头隔烟树。望不见、江东路。思量只有梦来去。更不怕、江阑住。", "灯前写了书无数。算没个、人传与。直饶寻得雁分付。又还是、秋将暮。"], "img": false}, {"i": 818, "t": "双井茶送子瞻", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "人间风日不到处，天上玉堂森宝书。", "想见东坡旧居士，挥毫百斛泻明珠。", "我家江南摘云腴，落硙霏霏雪不如。", "为公唤起黄州梦，独载扁舟向五湖。"], "img": false}, {"i": 819, "t": "谒金门·示知命弟", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "山又水，行尽吴头楚尾。兄弟灯前家万里，相看如梦寐。", "君似成蹊桃李，入我草堂松桂。莫厌岁寒无气味，余生今已矣。"], "img": false}, {"i": 820, "t": "题胡逸老致虚庵", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "藏书万卷可教子，遗金满籯常作灾。", "能与贫人共年谷，必有明月生蚌胎。", "山随宴坐图画出，水作夜窗风雨来。", "观水观山皆得妙，更将何物污灵台。"], "img": false}, {"i": 821, "t": "跋子瞻和陶诗", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "子瞻谪岭南，时宰欲杀之。", "饱吃惠州饭，细和渊明诗。", "彭泽千载人，东坡百世士。", "出处虽不同，风味乃相似。"], "img": false}, {"i": 822, "t": "渔家傲·三十年", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "三十年来无孔窍，几回得眼还迷照。一见桃花参学了。呈法要，无弦琴上单于调。", "摘叶寻枝虚半老，看花特地重年少。今后水云人欲晓。非玄妙，灵云合被桃花笑。"], "img": false}, {"i": 823, "t": "水调歌头·落日", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "落日塞垣路，风劲戛貂裘。翩翩数骑闲猎，深入黑山头。极目平沙千里，惟见雕弓白羽，铁面骏骅骝。隐隐望青冢，特地起闲愁。", "汉天子，方鼎盛，四百州。玉颜皓齿，深锁三十六宫秋。堂有经纶贤相，边有纵横谋将，不减翠蛾羞。戎虏和乐也，圣主永无忧。"], "img": false}, {"i": 824, "t": "青玉案·至宜州次韵上酬七兄", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "烟中一线来时路。极目送，归鸿去。第四阳关云不度。山胡新啭，子规言语，正在人愁处。", "忧能损性休朝暮。忆我当年醉诗句，渡水穿云心已许。暮年光景，小轩南浦，同卷西山雨。(醉诗句 一作：醉时句)"], "img": false}, {"i": 825, "t": "赠元发弟放言", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "亏功一篑，未成丘山。", "凿井九阶，不次水泽。", "行百里者半九十，小狐汔济濡其尾。", "故曰时乎，时不再来。", "终终始始，是谓君子。"], "img": false}, {"i": 826, "t": "到官归志浩然二绝句-其一", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "雨洗风吹桃李净，松声聒尽鸟惊春。", "满船明月从此去，本是江湖寂寞人。"], "img": false}, {"i": 827, "t": "陈留市隐", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "陈留江端礼季共曰：“陈留市上有刀镊工，年四十馀，无世家子姓；惟一女年七岁矣，日以刀镊所得钱与女子醉饱，则簪花吹长笛，肩女而归，无一朝之忧，而有终身之乐，疑以为有道者也。”陈无己为赋诗，庭坚亦拟作。", "市井怀珠玉，往来人未逢。", "乘肩娇小女，邂逅此生同。", "养性霜刀在，阅人清镜空。", "时时能举酒，弹镊送归鸿。"], "img": false}, {"i": 828, "t": "献钱尚父", "d": "", "a": "", "l": ["（唐）贯休", "贵逼人来不自由，龙骧凤翥势难收。", "满堂花醉三千客，一剑霜寒十四州。", "鼓角揭天嘉气冷，风涛动地海山秋。", "东南永作金天柱，谁羡当时万户侯。"], "img": false}, {"i": 829, "t": "东周列国志-道德", "d": "", "a": "", "l": ["道德三皇五帝，功名夏后商周；", "英雄五霸闹春秋，顷刻兴亡过手！", "青史几行名姓，北邙无数荒丘；", "前人田地后人收，说甚龙争虎斗"], "img": false}, {"i": 830, "t": "硕人", "d": "", "a": "", "l": ["硕人其颀(qí)，衣(yì)锦褧(jiǒng)衣。齐侯之子，卫侯之妻。东宫之妹，邢侯之姨，谭公维私。", "手如柔荑(tí)，肤如凝脂。领如蝤(qiú)蛴(qí)，齿如瓠(hù)犀(xī)。螓(qín)首蛾眉，巧笑倩兮，美目盼兮。", "硕人敖(áo)敖，说(shuì)于农郊。四牡有骄，朱幩(fén)镳(biāo)镳。翟(dí)茀(fú)以朝。大夫夙(sù)退，无使君劳。", "河水洋洋，北流活(guō)活。施罛(gū)濊(huò)濊，鳣(zhān)鲔(wěi)发(bō)发。葭(jiā)菼(tǎn)揭揭，庶姜孽(niè)孽，庶士有朅(qiè)。"], "img": false}, {"i": 831, "t": "博学（中庸）", "d": "", "a": "", "l": ["博学之￼，审问之￼，慎思之￼，明辨之￼，笃行之￼。有弗学，学之弗能，弗措也￼。有弗问，问之弗知￼，弗措也。有弗思，思之弗得￼，弗措也。有弗辨，辨之弗明，弗措也。有弗行，行之弗笃，弗措也。人一能之，己百之￼；人十能之，己千之。果能此道矣￼，虽愚必明￼，虽柔必强￼。"], "img": false}, {"i": 832, "t": "诚意（大学）", "d": "", "a": "", "l": ["所谓诚其意者￼，毋自欺也，如恶恶臭￼，如好好色￼。此之谓自谦￼。故君子必慎其独也￼。", "小人闲居为不善￼，无所不至￼，见君子而后厌然揜其不善而着其善￼。人之视己，如见其肺肝然￼，则何益矣￼？此谓诚于中，形于外￼。故君子必慎其独也。", "曾子曰：“十目所视，十手所指，其严乎￼！”", "富润屋￼，德润身，心广体胖￼。故君子必诚其意。"], "img": false}, {"i": 833, "t": "点绛唇·蹴罢秋千", "d": "", "a": "", "l": ["作者：李清照 (宋代）", "蹴罢秋千，起来慵整纤纤手。", "露浓花瘦，薄汗轻衣透。", "见客入来，袜刬金钗溜。", "和羞走，倚门回首，却把青梅嗅。"], "img": false}, {"i": 834, "t": "白马篇", "d": "", "a": "", "l": ["曹植", "白马饰金羁，连翩西北驰。", "借问谁家子，幽并游侠儿。", "少小去乡邑，扬声沙漠垂。", "宿昔秉良弓，楛矢何参差。", "控弦破左的，右发摧月支。", "仰手接飞猱，俯身散马蹄。", "狡捷过猴猿，勇剽若豹螭。", "边城多警急，虏骑数迁移。(虏骑 一作：胡骑)", "羽檄从北来，厉马登高堤。", "长驱蹈匈奴，左顾凌鲜卑。", "弃身锋刃端，性命安可怀？", "父母且不顾，何言子与妻！", "名编壮士籍，不得中顾私。(名编 一作：名在)", "捐躯赴国难，视死忽如归！"], "img": false}], "stats": {"total": 835, "lines": 4540, "dyn": {"未标注": 803, "唐": 19, "宋": 5, "明": 2, "清": 2, "南北朝": 1, "先秦": 1, "汉": 1, "五代": 1}, "authors": [["佚名", 805], ["李白", 9], ["白居易", 3], ["杜甫", 2], ["范仲淹", 1], ["杜牧", 1], ["崔颢", 1], ["王磐", 1], ["纳兰性德", 1], ["王安石", 1], ["袁枚", 1], ["李贺", 1], ["卢钺", 1], ["唐寅", 1], ["文天祥", 1], ["王勃", 1], ["张志和", 1], ["刘邦", 1], ["冯延巳", 1], ["欧阳修", 1]], "buckets": {"1行": 3, "4行": 50, "2行": 25, "3行": 356, "8行以上": 110, "5-7行": 291}}};
const POEMS = DATA.poems;
const COL = {唐:"#e07b53",宋:"#5fb0e8",明:"#7bcf7b",清:"#c98fe0",南北朝:"#e0b643",先秦:"#d98c8c",汉:"#8fb0e0",五代:"#e0a85f",未标注:"#5a6b8c"};

// ---- header stats ----
document.getElementById('stats').innerHTML =
  '<span><b>'+DATA.stats.total+'</b> 首</span>'+
