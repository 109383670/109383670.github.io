<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>诗词歌赋 · 可视化</title>
<style>
  :root{ --bg:#0f1626; --panel:#16213a; --panel2:#22304f; --txt:#e6ecf5; --muted:#93a4c3;
         --line:#2c3c5e; --accent:#e0b643; --accent2:#5fb0e8; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}
  header{padding:10px 18px;background:linear-gradient(90deg,#0b1220,#16213a);display:flex;align-items:center;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
  header h1{font-size:17px;margin:0;font-weight:700}
  .stats{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
  .stats b{color:var(--accent);font-size:15px}
  .tabs{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap}
  .tab{background:var(--panel);color:var(--muted);border:1px solid var(--line);padding:6px 13px;border-radius:18px;cursor:pointer;font-size:13px}
  .tab.active{background:var(--accent);color:#241c02;border-color:var(--accent);font-weight:700}
  .rand{background:var(--panel2);color:var(--txt);border:1px solid var(--line);padding:6px 12px;border-radius:18px;cursor:pointer;font-size:13px}
  .rand:hover{border-color:var(--accent2)}
  main{position:relative;height:calc(100vh - 56px)}
  section{position:absolute;inset:0;display:none;overflow:auto}
  section.active{display:block}
  /* overview */
  .obar{padding:10px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;border-bottom:1px solid var(--line);position:sticky;top:0;background:#10182b;z-index:3}
  #search{background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:7px 12px;border-radius:18px;font-size:13px;width:300px;outline:none}
  #search:focus{border-color:var(--accent2)}
  .count{font-size:12px;color:var(--muted)}
  .plist{padding:6px 14px 30px}
  .prow{display:flex;align-items:center;gap:12px;padding:9px 12px;border-bottom:1px solid var(--line);cursor:pointer}
  .prow:hover{background:#16223c}
  .prow .pt{font-weight:600;font-size:14px;min-width:120px;flex:0 0 auto}
  .prow .pm{font-size:12px;color:var(--muted);flex:1 1 auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .prow .pc{font-size:11px;color:var(--muted);white-space:nowrap;flex:0 0 auto}
  .badge{font-size:11px;padding:2px 8px;border-radius:10px;color:#10202f;white-space:nowrap;font-weight:700}
  .imgdot{color:var(--accent2);font-size:12px}
  /* stats */
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px;padding:22px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .card h3{margin:0 0 14px;font-size:15px;color:var(--accent)}
  .bar{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:12.5px}
  .bar .lab{width:78px;flex:0 0 auto;color:var(--muted);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar .track{flex:1 1 auto;background:#0c1424;border-radius:6px;height:18px;overflow:hidden}
  .bar .fill{height:100%;background:linear-gradient(90deg,var(--accent2),#8fd0ff);border-radius:6px}
  .bar .val{width:42px;flex:0 0 auto;color:var(--txt);text-align:left}
  .note{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.5}
  /* authors / dynasties */
  .chips{padding:18px;display:flex;flex-wrap:wrap;gap:10px}
  .chip{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:8px 14px;cursor:pointer;font-size:13px}
  .chip:hover{border-color:var(--accent)}
  .chip b{color:var(--accent)}
  .back{padding:10px 18px;cursor:pointer;color:var(--accent2);font-size:13px;border-bottom:1px solid var(--line)}
  /* reader */
  #reader{position:fixed;inset:0;background:rgba(4,8,16,.86);display:none;align-items:center;justify-content:center;z-index:50;padding:22px}
  #reader.show{display:flex}
  .rbox{background:var(--panel);border:1px solid var(--line);border-radius:16px;width:min(760px,95vw);max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
  .rhead{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid var(--line);background:#101a30}
  .rt{font-size:18px;font-weight:700;flex:1}
  .rc{font-size:11px;padding:2px 9px;border-radius:10px;color:#10202f;font-weight:700}
  .rbtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:5px 11px;border-radius:8px;cursor:pointer;font-size:12px}
  .rbtn:hover{border-color:var(--accent)}
  .rx{background:var(--panel2);border:none;color:var(--txt);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:15px}
  .rx:hover{background:var(--accent);color:#241c02}
  .rbody{padding:22px 26px;overflow:auto;line-height:2;font-size:17px;letter-spacing:1px}
  .rbody.vert{writing-mode:vertical-rl;text-orientation:upright;max-height:60vh;margin:0 auto;line-height:2.1}
  .rbody p{margin:0 0 4px}
  .rbody.vert p{margin:0 14px 0 0}
  .rbody img{max-width:100%;border-radius:10px;margin:8px 0;display:block}
  .rmeta{font-size:12px;color:var(--muted);padding:0 26px 14px}
</style>
</head>
<body>
<header>
  <h1>📜 诗词歌赋 · 可视化</h1>
  <div class="stats" id="stats"></div>
  <div class="tabs">
    <div class="tab active" data-v="over">总览</div>
    <div class="tab" data-v="stat">统计</div>
    <div class="tab" data-v="auth">作者</div>
    <div class="tab" data-v="dyn">朝代</div>
  </div>
  <div class="rand" id="randBtn">🎲 随机一首</div>
</header>
<main>
  <section id="over" class="active">
    <div class="obar">
      <span class="count" id="ovCount"></span>
      <input id="search" placeholder="搜索标题 / 作者 / 正文…">
    </div>
    <div class="plist" id="plist"></div>
  </section>
  <section id="stat"><div class="grid" id="statGrid"></div></section>
  <section id="auth">
    <div class="chips" id="authChips"></div>
    <div id="authList"></div>
  </section>
  <section id="dyn">
    <div class="chips" id="dynChips"></div>
    <div id="dynList"></div>
  </section>
</main>

<div id="reader" onclick="if(event.target===this)closeReader()">
  <div class="rbox">
    <div class="rhead">
      <span class="rt" id="rTitle"></span>
      <span class="rc" id="rCat"></span>
      <button class="rbtn" id="vBtn">竖排 ⇄</button>
      <button class="rx" onclick="closeReader()">✕</button>
    </div>
    <div class="rmeta" id="rMeta"></div>
    <div class="rbody" id="rBody"></div>
  </div>
</div>

<script>
const DATA = {"poems": [{"i": 0, "t": "中庸", "d": "", "a": "", "l": ["天命之谓性；率性之谓道；修道之谓教。道也者，不可须臾离也；可离，非道也。是故君子戒慎乎其所不睹，恐惧乎其所不闻。莫见乎隐，莫显乎微。故君子慎其独也。喜、怒、哀、乐之未发，谓之中。发而皆中节，谓之和。中也者，天下之大本也。和也者，天下之达道也。致中和，天地位焉，万物育焉。"], "img": false}, {"i": 1, "t": "望岳", "d": "唐", "a": "杜甫", "l": ["岱宗夫如何，齐鲁青未了。", "造化钟神秀，阴阳割昏晓。", "荡胸生层云，决眦入归鸟。", "会当凌绝顶，一览众山小。"], "img": false}, {"i": 2, "t": "大林寺桃花", "d": "唐", "a": "白居易", "l": ["人间四月芳菲尽，山寺桃花始盛开。", "长恨春归无觅处，不知转入此中来。"], "img": false}, {"i": 3, "t": "江上渔者", "d": "宋", "a": "范仲淹", "l": ["江上往来人，但爱鲈鱼美。", "君看一叶舟，出没风波里。"], "img": false}, {"i": 4, "t": "泊秦淮", "d": "唐", "a": "杜牧", "l": ["烟笼寒水月笼沙，夜泊秦淮近酒家。", "商女不知亡国恨，隔江犹唱后庭花。"], "img": false}, {"i": 5, "t": "钱塘湖春行", "d": "唐", "a": "白居易", "l": ["孤山寺北贾亭西，水面初平云脚低。", "几处早莺争暖树，谁家新燕啄春泥。", "乱花渐欲迷人眼，浅草才能没马蹄。", "最爱湖东行不足，绿杨阴里白沙堤。"], "img": false}, {"i": 6, "t": "黄鹤楼", "d": "唐", "a": "崔颢", "l": ["昔人已乘黄鹤去，此地空余黄鹤楼。", "黄鹤一去不复返，白云千载空悠悠。", "晴川历历汉阳树，芳草萋萋鹦鹉洲。", "日暮乡关何处是？烟波江上使人愁。"], "img": false}, {"i": 7, "t": "朝天子·咏喇叭", "d": "明", "a": "王磐", "l": ["喇叭，唢呐，曲儿小腔儿大。", "官船来往乱如麻，全仗你抬声价。", "军听了军愁，民听了民怕，哪里去辨甚么真共假！", "眼见得吹翻了这家，吹伤了那家，只吹的水净鹅飞罢！"], "img": false}, {"i": 8, "t": "忆江南", "d": "唐", "a": "白居易", "l": ["江南好，风景旧曾谙。", "日出江花红胜火，春来江水绿如蓝。", "能不忆江南？"], "img": false}, {"i": 9, "t": "静夜思", "d": "唐", "a": "李白", "l": ["床前明月光，疑是地上霜。", "举头望明月，低头思故乡"], "img": false}, {"i": 10, "t": "赠汪伦", "d": "唐", "a": "李白", "l": ["李白乘舟将欲行，忽闻岸上踏歌声。", "桃花潭水深千尺，不及汪伦送我情。"], "img": false}, {"i": 11, "t": "长相思·山一程", "d": "清", "a": "纳兰性德", "l": ["山一程，水一程，身向榆关那畔行，夜深千帐灯。", "风一更，雪一更，聒碎乡心梦不成，故园无此声。"], "img": false}, {"i": 12, "t": "元日", "d": "宋", "a": "王安石", "l": ["爆竹声中一岁除，春风送暖入屠苏。", "千门万户曈曈日，总把新桃换旧符。"], "img": false}, {"i": 13, "t": "将进酒", "d": "唐", "a": "李白", "l": ["君不见黄河之水天上来，奔流到海不复回。", "君不见高堂明镜悲白发，朝如青丝暮成雪。", "人生得意须尽欢，莫使金樽空对月。", "天生我材必有用，千金散尽还复来。", "烹羊宰牛且为乐，会须一饮三百杯。", "岑夫子，丹丘生，将进酒，杯莫停。", "与君歌一曲，请君为我倾耳听。", "钟鼓馔玉不足贵，但愿长醉不复醒。", "古来圣贤皆寂寞，惟有饮者留其名。", "陈王昔时宴平乐，斗酒十千恣欢谑。", "主人何为言少钱，径须沽取对君酌。", "五花马，千金裘，呼儿将出换美酒，与尔同销万古愁。"], "img": false}, {"i": 14, "t": "木兰诗", "d": "南北朝", "a": "佚名", "l": ["唧唧复唧唧，木兰当户织。", "不闻机杼声，唯闻女叹息。", "问女何所思，问女何所忆。", "女亦无所思，女亦无所忆。", "昨夜见军帖，可汗大点兵，军书十二卷，卷卷有爷名。", "阿爷无大儿，木兰无长兄，愿为市鞍马，从此替爷征。", "东市买骏马，西市买鞍鞯，南市买辔头，北市买长鞭。", "旦辞爷娘去，暮宿黄河边，不闻爷娘唤女声，但闻黄河流水鸣溅溅。", "旦辞黄河去，暮至黑山头，不闻爷娘唤女声，但闻燕山胡骑鸣啾啾。", "万里赴戎机，关山度若飞。", "朔气传金柝，寒光照铁衣。", "将军百战死，壮士十年归。", "归来见天子，天子坐明堂。", "策勋十二转，赏赐百千强。", "可汗问所欲，木兰不用尚书郎，愿驰千里足，送儿还故乡。", "爷娘闻女来，出郭相扶将；", "阿姊闻妹来，当户理红妆；", "小弟闻姊来，磨刀霍霍向猪羊。", "开我东阁门，坐我西阁床。", "脱我战时袍，著我旧时裳。", "当窗理云鬓，对镜帖花黄。", "出门看火伴，火伴皆惊忙：同行十二年，不知木兰是女郎。", "雄兔脚扑朔，雌兔眼迷离；双兔傍地走，安能辨我是雄雌？", "![图片](https://image.keymemox.com/2026/05/13/95c5fe69077a4ec48c8a022812dac244photoAsset0.png)", "![图片](https://image.keymemox.com/2026/05/13/09dcce6f06bc426f92c3785fb1064b66photoAsset1.png)"], "img": true}, {"i": 15, "t": "苔", "d": "清", "a": "袁枚", "l": ["白日不到处，青春恰自来。", "苔花如米小，也学牡丹开。"], "img": false}, {"i": 16, "t": "采薇", "d": "先秦", "a": "佚名", "l": ["昔我往矣，杨柳依依。", "今我来思，雨雪霏霏。", "行道迟迟，载渴载饥。", "我心伤悲，莫知我哀！"], "img": false}, {"i": 17, "t": "马诗二十三首·大漠", "d": "唐", "a": "李贺", "l": ["大漠沙如雪，燕山月似钩。", "何当金络脑，快走踏清秋。"], "img": false}, {"i": 18, "t": "独坐敬亭山", "d": "唐", "a": "李白", "l": ["众鸟高飞尽，孤云独去闲。", "相看两不厌，只有敬亭山。"], "img": false}, {"i": 19, "t": "雪梅", "d": "宋", "a": "卢钺", "l": ["梅雪争春未肯降，骚人搁笔费评章。", "梅须逊雪三分白，雪却输梅一段香。"], "img": false}, {"i": 20, "t": "画鸡", "d": "明", "a": "唐寅", "l": ["头上红冠不用裁，满身雪白走将来。", "平生不敢轻言语，一叫千门万户开。"], "img": false}, {"i": 21, "t": "饮中八仙歌", "d": "唐", "a": "杜甫", "l": ["知章骑马似乘船，眼花落井水底眠。", "汝阳三斗始朝天，道逢麴车口流涎，恨不移封向酒泉。", "左相日兴费万钱，饮如长鲸吸百川，衔杯乐圣称避贤。", "宗之潇洒美少年，举觞白眼望青天，皎如王树临风前。", "苏晋长斋绣佛前，醉中往往爱逃禅。", "李白斗酒诗百篇，长安市上酒家眠，天子呼来不上船，自称臣是酒中仙。", "张旭三杯草圣传，脱帽露顶王宫前，挥毫落纸如云烟。", "焦遂五斗方卓然，高谈雄辩惊四筵。"], "img": false}, {"i": 22, "t": "过零丁洋", "d": "宋", "a": "文天祥", "l": ["辛苦遭逢起一经，干戈寥落四周星。", "山河破碎风飘絮，身世浮沉雨打萍。", "惶恐滩头说惶恐，零丁洋里叹零丁。", "人生自古谁无死，留取丹心照汗青。"], "img": false}, {"i": 23, "t": "子夜吴歌·春歌", "d": "唐", "a": "李白", "l": ["秦地罗敷女，采桑绿水边。", "素手青条上，红妆白日鲜。", "蚕饥妾欲去，五马莫留连。"], "img": false}, {"i": 24, "t": "子夜吴歌·夏歌", "d": "唐", "a": "李白", "l": ["镜湖三百里，菡萏荷花开。", "五月西施采，人看隘若耶。", "回舟不待月，归去越王家。"], "img": false}, {"i": 25, "t": "子夜吴歌·秋歌", "d": "唐", "a": "李白", "l": ["长安一片月，万户捣衣声。", "秋风吹不尽，总是玉关情。", "何日平胡虏，良人罢远征。"], "img": false}, {"i": 26, "t": "子夜吴歌·冬歌", "d": "唐", "a": "李白", "l": ["明朝驿使发，一夜絮征袍。", "素手抽针冷，那堪把剪刀。", "裁缝寄远道，几日到临洮。"], "img": false}, {"i": 27, "t": "秋浦歌", "d": "唐", "a": "李白", "l": ["白发三千丈，缘愁似个长。", "不知明镜里，何处得秋霜？"], "img": false}, {"i": 28, "t": "滕王阁诗", "d": "唐", "a": "王勃", "l": ["滕王高阁临江渚，佩玉鸣鸾罢歌舞。", "画栋朝飞南浦云，珠帘暮卷西山雨。", "闲云潭影日悠悠，物换星移几度秋。", "阁中帝子今何在，槛外长江空自流。"], "img": false}, {"i": 29, "t": "赠范晔诗", "d": "", "a": "", "l": ["陆凯 南北朝", "折梅逢驿使，寄与陇头人。", "江南无所有，聊赠一枝春。"], "img": false}, {"i": 30, "t": "行宫", "d": "", "a": "", "l": ["元稹〔唐代〕", "寥落古行宫，宫花寂寞红。", "白头宫女在，闲坐说玄宗。"], "img": false}, {"i": 31, "t": "相思", "d": "", "a": "", "l": ["王维 〔唐代〕", "红豆生南国，春来发几枝。", "愿君多采撷，此物最相思。"], "img": false}, {"i": 32, "t": "戏为六绝句·王杨", "d": "", "a": "", "l": ["王杨卢骆当时体，轻薄为文哂未休。", "尔曹身与名俱灭，不废江河万古流。"], "img": false}, {"i": 33, "t": "杂诗三首·君自", "d": "", "a": "", "l": ["王维 〔唐代〕", "君自故乡来，应知故乡事。", "来日绮窗前，寒梅著花未？"], "img": false}, {"i": 34, "t": "鹿柴", "d": "", "a": "", "l": ["王维 〔唐代〕", "空山不见人，但闻人语响。", "返景入深林，复照青苔上。"], "img": false}, {"i": 35, "t": "竹里馆", "d": "", "a": "", "l": ["王维 〔唐代〕", "独坐幽篁里，弹琴复长啸。", "深林人不知，明月来相照。"], "img": false}, {"i": 36, "t": "送别", "d": "", "a": "", "l": ["王维 〔唐代〕", "山中相送罢，日暮掩柴扉。", "春草明年绿，王孙归不归？"], "img": false}, {"i": 37, "t": "问刘十九", "d": "", "a": "", "l": ["白居易 〔唐代〕", "绿蚁新醅酒，红泥小火炉。", "晚来天欲雪，能饮一杯无？"], "img": false}, {"i": 38, "t": "哥舒歌", "d": "", "a": "", "l": ["西鄙人 〔唐代〕", "北斗七星高，哥舒夜带刀。", "至今窥牧马，不敢过临洮。"], "img": false}, {"i": 39, "t": "怨情", "d": "", "a": "", "l": ["李白 〔唐代〕", "美人卷珠帘，深坐蹙蛾眉。", "但见泪痕湿，不知心恨谁。"], "img": false}, {"i": 40, "t": "登乐游原", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "向晚意不适，驱车登古原。", "夕阳无限好，只是近黄昏。"], "img": false}, {"i": 41, "t": "听筝", "d": "", "a": "", "l": ["李端 〔唐代〕", "鸣筝金粟柱，素手玉房前。", "欲得周郎顾，时时误拂弦。"], "img": false}, {"i": 42, "t": "渡汉江", "d": "", "a": "", "l": ["宋之问 〔唐代〕", "岭外音书断，经冬复历春。", "近乡情更怯，不敢问来人。"], "img": false}, {"i": 43, "t": "八阵图", "d": "", "a": "", "l": ["杜甫", "功盖三分国，名成八阵图。", "江流石不转，遗恨失吞吴。"], "img": false}, {"i": 44, "t": "宿建德江", "d": "", "a": "", "l": ["孟浩然 〔唐代〕", "移舟泊烟渚，日暮客愁新。", "野旷天低树，江清月近人。"], "img": false}, {"i": 45, "t": "春怨-打", "d": "", "a": "", "l": ["金昌绪 〔唐代〕", "打起黄莺儿，莫教枝上啼。", "啼时惊妾梦，不得到辽西。"], "img": false}, {"i": 46, "t": "江雪", "d": "", "a": "", "l": ["柳宗元 〔唐代〕", "![图片](https://image.keymemox.com/2025/02/20/c42622457ab04074994a7161190e523cphotoAsset0.png)", "千山鸟飞绝，万径人踪灭。", "孤舟蓑笠翁，独钓寒江雪。"], "img": true}, {"i": 47, "t": "秋夜寄邱员外", "d": "", "a": "", "l": ["韦应物 〔唐代〕", "怀君属秋夜，散步咏凉天。", "空山松子落，幽人应未眠。"], "img": false}, {"i": 48, "t": "终南望余雪", "d": "", "a": "", "l": ["祖咏 〔唐代〕", "终南阴岭秀，积雪浮云端。", "林表明霁色，城中增暮寒。"], "img": false}, {"i": 49, "t": "宫词二首·其一张祜 〔唐代〕", "d": "", "a": "", "l": ["张祜 唐代", "故国三千里，深宫二十年。", "一声何满子，双泪落君前。"], "img": false}, {"i": 50, "t": "崔九欲往南山马上口号与别", "d": "", "a": "", "l": ["裴迪 〔唐代〕", "归山深浅去，须尽丘壑美。", "莫学武陵人，暂游桃源里。"], "img": false}, {"i": 51, "t": "送灵澈上人", "d": "", "a": "", "l": ["刘长卿 〔唐代〕", "苍苍竹林寺，杳杳钟声晚。", "荷笠带斜阳，青山独归远。"], "img": false}, {"i": 52, "t": "送方外上人", "d": "", "a": "", "l": ["刘长卿 〔唐代〕", "孤云将野鹤，岂向人间住。", "莫买沃洲山，时人已知处。"], "img": false}, {"i": 53, "t": "听弹琴", "d": "", "a": "", "l": ["刘长卿 〔唐代〕", "泠泠七弦上，静听松风寒。", "古调虽自爱，今人多不弹。"], "img": false}, {"i": 54, "t": "玉台体", "d": "", "a": "", "l": ["权德舆 〔唐代〕", "昨夜裙带解，今朝蟢子飞。", "铅华不可弃，莫是藁砧归。", "“**铅华不可弃，莫是藁砧归**”出自唐代诗人权德舆的《玉台体》。这句诗的意思是：**要赶紧描眉擦粉梳妆打扮，莫非是我的丈夫快要回来了。**", "#### 诗句解析", "- **铅华**：指妇女化妆用的脂粉，此处代指梳妆打扮。", "- **藁砧**：古代对丈夫的隐语。相传古时犯人伏在藁草上受斩，藁砧即稿草和砧板，因“藁”与“夫”音近，故以藁砧代指丈夫。", "- **莫是**：莫不是，表示猜测。", "#### 全诗赏析", "《玉台体》全诗如下：", "昨夜裙带解，今朝蟢子飞。", "铅华不可弃，莫是藁砧归。", "- **前两句**：“昨夜裙带解，今朝蟢子飞”，描写了两种被认为是丈夫即将归来的喜兆。古代风俗认为，女子裙带自解和见到蟢子（长脚蜘蛛）飞，都是丈夫归家的预兆。", "- **后两句**：“铅华不可弃，莫是藁砧归”，表达了女主人公内心的激动和期盼。她猜测这些喜兆预示着丈夫即将归来，于是赶紧梳妆打扮，希望以最美的姿态迎接丈夫。", "#### 艺术特色", "- **心理刻画细腻**：诗人通过描写女主人公对喜兆的反应，生动地展现了她内心的喜悦、期盼和激动。", "- **语言质朴含蓄**：诗句语言平实，不事雕琢，却蕴含深情，耐人寻味。", "- **闺怨主题**：诗歌以闺中女子的情感为题材，表达了妻子对远行丈夫的思念和期盼，体现了唐代诗歌中常见的闺怨主题。", "#### 创作背景", "权德舆的《玉台体》模仿南朝徐陵编纂的《玉台新咏》的风格，属于言情纤艳之作。这类诗歌多以女性情感为题材，注重描写细腻的心理活动和日常生活场景。", "#### 总结", "“铅华不可弃，莫是藁砧归”这句诗通过描写女子梳妆待夫的情景，表达了深切的思念和期盼之情。全诗以质朴含蓄的语言，刻画了女主人公细腻的心理活动，展现了唐代闺怨诗的独特魅力。"], "img": false}, {"i": 55, "t": "芙蓉楼送辛渐", "d": "", "a": "", "l": ["王昌龄 〔唐代〕", "寒雨连江夜入吴，平明送客楚山孤。", "洛阳亲友如相问，一片冰心在玉壶。"], "img": false}, {"i": 56, "t": "闺怨", "d": "", "a": "", "l": ["王昌龄 〔唐代〕", "闺中少妇不知愁，春日凝妆上翠楼。", "忽见陌头杨柳色，悔教夫婿觅封侯。"], "img": false}, {"i": 57, "t": "春宫曲-昨夜", "d": "", "a": "", "l": ["王昌龄 〔唐代〕", "昨夜风开露井桃，未央前殿月轮高。", "平阳歌舞新承宠，帘外春寒赐锦袍。"], "img": false}, {"i": 58, "t": "凉州词-葡萄", "d": "", "a": "", "l": ["王翰 〔唐代〕", "葡萄美酒夜光杯，欲饮琵琶马上催。", "醉卧沙场君莫笑，古来征战几人回？"], "img": false}, {"i": 59, "t": "后宫词-泪", "d": "", "a": "", "l": ["白居易 〔唐代〕", "泪湿罗巾梦不成，夜深前殿按歌声。", "红颜未老恩先断，斜倚薰笼坐到明。"], "img": false}, {"i": 60, "t": "近试上张水部", "d": "", "a": "", "l": ["朱庆馀 〔唐代〕", "洞房昨夜停红烛，待晓堂前拜舅姑。", "妆罢低声问夫婿，画眉深浅入时无。"], "img": false}, {"i": 61, "t": "逢入京使", "d": "", "a": "", "l": ["岑参 〔唐代〕", "故园东望路漫漫，双袖龙钟泪不干。", "马上相逢无纸笔，凭君传语报平安。"], "img": false}, {"i": 62, "t": "夜上受降城闻笛", "d": "", "a": "", "l": ["李益 〔唐代〕", "回乐烽前沙似雪，受降城外月如霜。", "不知何处吹芦管，一夜征人尽望乡。"], "img": false}, {"i": 63, "t": "贾生", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "宣室求贤访逐臣，贾生才调更无伦。", "可怜夜半虚前席，不问苍生问鬼神。"], "img": false}, {"i": 64, "t": "隋宫", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "乘兴南游不戒严，九重谁省谏书函。", "春风举国裁宫锦，半作障泥半作帆。"], "img": false}, {"i": 65, "t": "瑶池", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "瑶池阿母绮窗开，黄竹歌声动地哀。", "八骏日行三万里，穆王何事不重来。"], "img": false}, {"i": 66, "t": "嫦娥", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "云母屏风烛影深，长河渐落晓星沉。", "嫦娥应悔偷灵药，碧海青天夜夜心。"], "img": false}, {"i": 67, "t": "夜雨寄北", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "君问归期未有期，巴山夜雨涨秋池。", "何当共剪西窗烛，却话巴山夜雨时。"], "img": false}, {"i": 68, "t": "寄令狐郎中", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "嵩云秦树久离居，双鲤迢迢一纸书。", "休问梁园旧宾客，茂陵秋雨病相如。"], "img": false}, {"i": 69, "t": "为有", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "为有云屏无限娇，凤城寒尽怕春宵。", "无端嫁得金龟婿，辜负香衾事早朝。"], "img": false}, {"i": 70, "t": "江南逢李龟年", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "岐王宅里寻常见，崔九堂前几度闻。", "正是江南好风景，落花时节又逢君。"], "img": false}, {"i": 71, "t": "赠别二首·其一杜牧 〔唐代〕", "d": "", "a": "", "l": ["杜牧  唐代", "娉娉袅袅十三余，豆蔻梢头二月初。", "春风十里扬州路，卷上珠帘总不如。"], "img": false}, {"i": 72, "t": "金谷园", "d": "", "a": "", "l": ["杜牧 〔唐代〕", "繁华事散逐香尘，流水无情草自春。", "日暮东风怨啼鸟，落花犹似坠楼人。"], "img": false}, {"i": 73, "t": "寄扬州韩绰判官", "d": "", "a": "", "l": ["杜牧 〔唐代〕", "青山隐隐水迢迢，秋尽江南草未凋。", "二十四桥明月夜，玉人何处教吹箫？"], "img": false}, {"i": 74, "t": "赤壁", "d": "", "a": "", "l": ["杜牧 〔唐代〕", "折戟沉沙铁未销，自将磨洗认前朝。", "东风不与周郎便，铜雀春深锁二乔。"], "img": false}, {"i": 75, "t": "遣怀", "d": "", "a": "", "l": ["杜牧 〔唐代〕", "落魄江湖载酒行，楚腰肠断掌中轻。", "十年一觉扬州梦，赢得青楼薄幸名。"], "img": false}, {"i": 76, "t": "秋夕", "d": "", "a": "", "l": ["杜牧 〔唐代〕", "银烛秋光冷画屏，轻罗小扇扑流萤。", "天阶夜色凉如水，卧看牵牛织女星。"], "img": false}, {"i": 77, "t": "关山月", "d": "", "a": "", "l": ["[唐代] 李白", "明月出天山，苍茫云海间。", "长风几万里，吹度玉门关。", "汉下白登道，胡窥青海湾。", "由来征战地，不见有人还。", "戍客望边邑，思归多苦颜。", "高楼当此夜，叹息未应闲。"], "img": false}, {"i": 78, "t": "劝学荀子〔先秦〕", "d": "", "a": "", "l": ["君子曰：学不可以已。青，取之于蓝，而青于蓝；冰，水为之，而寒于水。木直中绳，輮以为轮，其曲中规。虽有槁暴，不复挺者，輮使之然也。故木受绳则直，金就砺则利，君子博学而日参省乎己，则知明而行无过矣。", "故不登高山，不知天之高也；不临深溪，不知地之厚也；不闻先王之遗言，不知学问之大也。干、越、夷、貉之子，生而同声，长而异俗，教使之然也。诗曰：“嗟尔君子，无恒安息。靖共尔位，好是正直。神之听之，介尔景福。”神莫大于化道，福莫长于无祸。", "吾尝终日而思矣，不如须臾之所学也；吾尝跂而望矣，不如登高之博见也。登高而招，臂非加长也，而见者远；顺风而呼，声非加疾也，而闻者彰。假舆马者，非利足也，而致千里；假舟楫者，非能水也，而绝江河。君子性非异也，善假于物也。", "南方有鸟焉，名曰蒙鸠，以羽为巢，而编之以发，系之苇苕，风至苕折，卵破子死。巢非不完也，所系者然也。西方有木焉，名曰射干，茎长四寸，生于高山之上，而临百仞之渊，木茎非能长也，所立者然也。蓬生麻中，不扶而直；白沙在涅，与之俱黑。兰槐之根是为芷，其渐之滫，君子不近，庶人不服。其质非不美也，所渐者然也。故君子居必择乡，游必就士，所以防邪辟而近中正也。", "物类之起，必有所始。荣辱之来，必象其德。肉腐出虫，鱼枯生蠹。怠慢忘身，祸灾乃作。强自取柱，柔自取束。邪秽在身，怨之所构。施薪若一，火就燥也，平地若一，水就湿也。草木畴生，禽兽群焉，物各从其类也。是故质的张，而弓矢至焉；林木茂，而斧斤至焉；树成荫，而众鸟息焉。醯酸，而蜹聚焉。故言有招祸也，行有招辱也，君子慎其所立乎！", "积土成山，风雨兴焉；积水成渊，蛟龙生焉；积善成德，而神明自得，圣心备焉。故不积跬步，无以至千里；不积小流，无以成江海。骐骥一跃，不能十步；驽马十驾，功在不舍。锲而舍之，朽木不折；锲而不舍，金石可镂。蚓无爪牙之利，筋骨之强，上食埃土，下饮黄泉，用心一也。蟹六跪而二螯，非蛇鳝之穴无可寄托者，用心躁也。", "是故无冥冥之志者，无昭昭之明；无惛惛之事者，无赫赫之功。行衢道者不至，事两君者不容。目不能两视而明，耳不能两听而聪。螣蛇无足而飞，鼫鼠五技而穷。《诗》曰：“尸鸠在桑，其子七兮。淑人君子，其仪一兮。其仪一兮，心如结兮！”故君子结于一也。", "昔者瓠巴鼓瑟，而流鱼出听；伯牙鼓琴，而六马仰秣。故声无小而不闻，行无隐而不形 。玉在山而草木润，渊生珠而崖不枯。为善不积邪？安有不闻者乎？", "学恶乎始？恶乎终？曰：其数则始乎诵经，终乎读礼；其义则始乎为士，终乎为圣人， 真积力久则入，学至乎没而后止也。故学数有终，若其义则不可须臾舍也。为之，人也；舍 之，禽兽也。故书者，政事之纪也；诗者，中声之所止也；礼者，法之大分，类之纲纪也。 故学至乎礼而止矣。夫是之谓道德之极。礼之敬文也，乐之中和也，诗书之博也，春秋之微 也，在天地之间者毕矣。", "君子之学也，入乎耳，箸乎心，布乎四体，形乎动静。端而言，蝡而动，一可以为法则。小人之学也，入乎耳，出乎口；口耳之间，则四寸耳，曷足以美七尺之躯哉！古之学者为己，今之学者为人。君子之学也，以美其身；小人之学也，以为禽犊。故不问而告谓之傲，问一而告二谓之囋。傲、非也，囋、非也；君子如向矣。", "学莫便乎近其人。礼乐法而不说，诗书故而不切，春秋约而不速。方其人之习君子之说，则尊以遍矣，周于世矣。故曰：学莫便乎近其人。", "学之经莫速乎好其人，隆礼次之。上不能好其人，下不能隆礼，安特将学杂识志，顺诗书而已耳。则末世穷年，不免为陋儒而已。将原先王，本仁义，则礼正其经纬蹊径也。若挈裘领，诎五指而顿之，顺者不可胜数也。不道礼宪，以诗书为之，譬之犹以指测河也，以戈舂黍也，以锥餐壶也，不可以得之矣。故隆礼，虽未明，法士也；不隆礼，虽察辩，散儒也。", "问楛者，勿告也；告楛者，勿问也；说楛者，勿听也。有争气者，勿与辩也。故必由其道至，然后接之；非其道则避之。故礼恭，而后可与言道之方；辞顺，而后可与言道之理；色从而后可与言道之致。故未可与言而言，谓之傲；可与言而不言，谓之隐；不观气色而言，谓瞽。故君子不傲、不隐、不瞽，谨顺其身。诗曰：“匪交匪舒，天子所予。”此之谓也。", "百发失一，不足谓善射；千里蹞步不至，不足谓善御；伦类不通，仁义不一，不足谓善学。学也者，固学一之也。一出焉，一入焉，涂巷之人也；其善者少，不善者多，桀纣盗跖也；全之尽之，然后学者也。", "君子知夫不全不粹之不足以为美也，故诵数以贯之，思索以通之，为其人以处之，除其害者以持养之。使目非是无欲见也，使耳非是无欲闻也，使口非是无欲言也，使心非是无欲虑也。及至其致好之也，目好之五色，耳好之五声，口好之五味，心利之有天下。是故权利不能倾也，群众不能移也，天下不能荡也。生乎由是，死乎由是，夫是之谓德操。德操然后能定，能定然后能应。能定能应，夫是之谓成人。天见其明，地见其光，君子贵其全也。"], "img": false}, {"i": 79, "t": "将赴吴兴登乐游原一绝", "d": "", "a": "", "l": ["杜牧 〔唐代〕", "清时有味是无能，闲爱孤云静爱僧。", "欲把一麾江海去，乐游原上望昭陵。"], "img": false}, {"i": 80, "t": "征怨", "d": "", "a": "", "l": ["柳中庸 〔唐代〕", "岁岁金河复玉关，朝朝马策与刀环。", "三春白雪归青冢，万里黄河绕黑山。"], "img": false}, {"i": 81, "t": "金陵图", "d": "", "a": "", "l": ["韦庄 〔唐代〕", "谁谓伤心画不成，画人心逐世人情。", "君看六幅南朝事，老木寒云满故城。"], "img": false}, {"i": 82, "t": "滁州西涧", "d": "", "a": "", "l": ["韦应物 〔唐代〕", "独怜幽草涧边生，上有黄鹂深树鸣。", "春潮带雨晚来急，野渡无人舟自横。"], "img": false}, {"i": 83, "t": "桃花溪", "d": "", "a": "", "l": ["张旭 〔唐代〕", "隐隐飞桥隔野烟，石矶西畔问渔船。", "桃花尽日随流水，洞在清溪何处边。"], "img": false}, {"i": 84, "t": "寄人", "d": "", "a": "", "l": ["张泌 〔唐代〕", "别梦依依到谢家，小廊回合曲阑斜。", "多情只有春庭月，犹为离人照落花。"], "img": false}, {"i": 85, "t": "题金陵渡", "d": "", "a": "", "l": ["张祜 〔唐代〕", "金陵津渡小山楼，一宿行人自可愁。", "潮落夜江斜月里，两三星火是瓜洲。"], "img": false}, {"i": 86, "t": "赠内人", "d": "", "a": "", "l": ["张祜 〔唐代〕", "禁门宫树月痕过，媚眼惟看宿鹭窠。", "斜拔玉钗灯影畔，剔开红焰救飞蛾。"], "img": false}, {"i": 87, "t": "集灵台·其一", "d": "", "a": "", "l": ["张祜 〔唐代〕", "日光斜照集灵台，红树花迎晓露开。", "昨夜上皇新授箓，太真含笑入帘来。"], "img": false}, {"i": 88, "t": "集灵台·其二", "d": "", "a": "", "l": ["张祜 〔唐代〕", "虢国夫人承主恩，平明骑马入宫门。", "却嫌脂粉污颜色，淡扫蛾眉朝至尊。"], "img": false}, {"i": 89, "t": "枫桥夜泊", "d": "", "a": "", "l": ["张继 〔唐代〕", "月落乌啼霜满天，江枫渔火对愁眠。", "姑苏城外寒山寺，夜半钟声到客船。"], "img": false}, {"i": 90, "t": "陇西行四首·誓扫", "d": "", "a": "", "l": ["陈陶 〔唐代〕", "誓扫匈奴不顾身，五千貂锦丧胡尘。", "可怜无定河边骨，犹是春闺梦里人！"], "img": false}, {"i": 91, "t": "杂诗-近", "d": "", "a": "", "l": ["佚名 〔唐代〕", "近寒食雨草萋萋，著麦苗风柳映堤。", "等是有家归未得，杜鹃休向耳边啼。"], "img": false}, {"i": 92, "t": "回乡偶书", "d": "", "a": "", "l": ["贺知章 〔唐代〕", "少小离家老大回，乡音无改鬓毛衰。", "儿童相见不相识，笑问客从何处来。"], "img": false}, {"i": 93, "t": "瑶瑟怨", "d": "", "a": "", "l": ["温庭筠 〔唐代〕", "冰簟银床梦不成，碧天如水夜云轻。", "雁声远过潇湘去，十二楼中月自明。"], "img": false}, {"i": 94, "t": "月夜", "d": "", "a": "", "l": ["刘方平 〔唐代〕", "更深月色半人家，北斗阑干南斗斜。", "今夜偏知春气暖，虫声新透绿窗纱。"], "img": false}, {"i": 95, "t": "春怨.纱窗", "d": "", "a": "", "l": ["刘方平 〔唐代〕", "纱窗日落渐黄昏，金屋无人见泪痕。", "寂寞空庭春欲晚，梨花满地不开门。"], "img": false}, {"i": 96, "t": "乌衣巷", "d": "", "a": "", "l": ["刘禹锡 〔唐代〕", "朱雀桥边野草花，乌衣巷口夕阳斜。", "旧时王谢堂前燕，飞入寻常百姓家。"], "img": false}, {"i": 97, "t": "和乐天春词", "d": "", "a": "", "l": ["刘禹锡 〔唐代〕", "新妆宜面下朱楼，深锁春光一院愁。", "行到中庭数花朵，蜻蜓飞上玉搔头。"], "img": false}, {"i": 98, "t": "马嵬坡", "d": "", "a": "", "l": ["郑畋 〔唐代〕", "玄宗回马杨妃死，云雨难忘日月新。", "终是圣明天子事，景阳宫井又何人。"], "img": false}, {"i": 99, "t": "寒食", "d": "", "a": "", "l": ["韩翃 〔唐代〕", "春城无处不飞花，寒食东风御柳斜。", "日暮汉宫传蜡烛，轻烟散入五侯家。"], "img": false}, {"i": 100, "t": "已凉", "d": "", "a": "", "l": ["韩偓 〔唐代〕", "碧阑干外绣帘垂，猩色屏风画折枝。", "八尺龙须方锦褥，已凉天气未寒时。"], "img": false}, {"i": 101, "t": "宫词.长乐宫", "d": "", "a": "", "l": ["顾况 〔唐代〕", "长乐宫连上苑春，玉楼金殿艳歌新。", "君门一入无由出，唯有宫莺得见人。"], "img": false}, {"i": 102, "t": "山房春事", "d": "", "a": "", "l": ["【唐・岑参】", "梁园日暮乱飞鸦，极目萧条三两家。", "庭树不知人去尽，春来还发旧时花。"], "img": false}, {"i": 103, "t": "渔歌子", "d": "唐", "a": "张志和", "l": ["西塞山前白鹭飞，桃花流水鳜鱼肥。", "青箬笠，绿蓑衣，斜风细雨不须归。"], "img": false}, {"i": 104, "t": "宫词.寂", "d": "", "a": "", "l": ["朱庆馀 〔唐代〕", "寂寂花时闭院门，美人相并立琼轩。", "含情欲说宫中事，鹦鹉前头不敢言。"], "img": false}, {"i": 105, "t": "送杜少府之任蜀州", "d": "", "a": "", "l": ["王勃 〔唐代〕", "城阙辅三秦，风烟望五津。", "与君离别意，同是宦游人。", "海内存知己，天涯若比邻。", "无为在歧路，儿女共沾巾。"], "img": false}, {"i": 106, "t": "送梓州李使君", "d": "", "a": "", "l": ["王维 〔唐代〕", "万壑树参天，千山响杜鹃。", "山中一夜雨，树杪百重泉。", "汉女输橦布，巴人讼芋田。", "文翁翻教授，不敢倚先贤。"], "img": false}, {"i": 107, "t": "汉江临泛", "d": "", "a": "", "l": ["王维 〔唐代〕", "楚塞三湘接，荆门九派通。", "江流天地外，山色有无中。", "郡邑浮前浦，波澜动远空。", "襄阳好风日，留醉与山翁。"], "img": false}, {"i": 108, "t": "终南别业", "d": "", "a": "", "l": ["王维 〔唐代〕", "中岁颇好道，晚家南山陲。", "兴来每独往，胜事空自知。", "行到水穷处，坐看云起时。", "偶然值林叟，谈笑无还期。"], "img": false}, {"i": 109, "t": "终南山", "d": "", "a": "", "l": ["王维 〔唐代〕", "太乙近天都，连山接海隅。", "白云回望合，青霭入看无。", "分野中峰变，阴晴众壑殊。", "欲投人处宿，隔水问樵夫。"], "img": false}, {"i": 110, "t": "酬张少府", "d": "", "a": "", "l": ["王维 〔唐代〕", "晚年唯好静，万事不关心。", "自顾无长策，空知返旧林。", "松风吹解带，山月照弹琴。", "君问穷通理，渔歌入浦深。"], "img": false}, {"i": 111, "t": "过香积寺", "d": "", "a": "", "l": ["王维 〔唐代〕", "不知香积寺，数里入云峰。", "古木无人径，深山何处钟。", "泉声咽危石，日色冷青松。", "薄暮空潭曲，安禅制毒龙。"], "img": false}, {"i": 112, "t": "辋川闲居赠裴秀才迪", "d": "", "a": "", "l": ["王维 〔唐代〕", "寒山转苍翠，秋水日潺湲。", "倚杖柴门外，临风听暮蝉。", "渡头馀落日，墟里上孤烟。", "复值接舆醉，狂歌五柳前。"], "img": false}, {"i": 113, "t": "山居秋暝", "d": "", "a": "", "l": ["王维 〔唐代〕", "空山新雨后，天气晚来秋。", "明月松间照，清泉石上流。", "竹喧归浣女，莲动下渔舟。", "随意春芳歇，王孙自可留。"], "img": false}, {"i": 114, "t": "归嵩山作", "d": "", "a": "", "l": ["王维 〔唐代〕", "清川带长薄，车马去闲闲。", "流水如有意，暮禽相与还。", "荒城临古渡，落日满秋山。", "迢递嵩高下，归来且闭关。"], "img": false}, {"i": 115, "t": "次北固山下", "d": "", "a": "", "l": ["王湾〔唐代〕", "客路青山外，行舟绿水前。", "潮平两岸阔，风正一帆悬。", "海日生残夜，江春入旧年。", "乡书何处达？归雁洛阳边。"], "img": false}, {"i": 116, "t": "云阳馆与韩绅宿别", "d": "", "a": "", "l": ["司空曙 〔唐代〕", "故人江海别，几度隔山川。", "乍见翻疑梦，相悲各问年。", "孤灯寒照雨，湿竹暗浮烟。", "更有明朝恨，离杯惜共传。"], "img": false}, {"i": 117, "t": "喜外弟卢纶见宿", "d": "", "a": "", "l": ["司空曙 〔唐代〕", "静夜四无邻，荒居旧业贫。", "雨中黄叶树，灯下白头人。", "以我独沉久，愧君相见频。", "平生自有分，况是蔡家亲。"], "img": false}, {"i": 118, "t": "贼平后送人北归", "d": "", "a": "", "l": ["司空曙 〔唐代〕", "世乱同南去，时清独北还。", "他乡生白发，旧国见青山。", "晓月过残垒，繁星宿故关。", "寒禽与衰草，处处伴愁颜。"], "img": false}, {"i": 119, "t": "赋得古原草送别", "d": "", "a": "", "l": ["白居易 〔唐代〕", "离离原上草，一岁一枯荣。", "野火烧不尽，春风吹又生。", "远芳侵古道，晴翠接荒城。", "又送王孙去，萋萋满别情。"], "img": false}, {"i": 120, "t": "题大庾岭北驿", "d": "", "a": "", "l": ["宋之问 〔唐代〕", "阳月南飞雁，传闻至此回。", "我行殊未已，何日复归来。", "江静潮初落，林昏瘴不开。", "明朝望乡处，应见陇头梅。"], "img": false}, {"i": 121, "t": "寄左省杜拾遗", "d": "", "a": "", "l": ["岑参 〔唐代〕", "联步趋丹陛，分曹限紫微。", "晓随天仗入，暮惹御香归。", "白发悲花落，青云羡鸟飞。", "圣朝无阙事，自觉谏书稀。"], "img": false}, {"i": 122, "t": "听蜀僧濬弹琴", "d": "", "a": "", "l": ["李白 〔唐代〕", "蜀僧抱绿绮，西下峨眉峰。", "为我一挥手，如听万壑松。", "客心洗流水，馀响入霜钟。", "不觉碧山暮，秋云暗几重。"], "img": false}, {"i": 123, "t": "夜泊牛渚怀古", "d": "", "a": "", "l": ["李白 〔唐代〕", "牛渚西江夜，青天无片云。", "登舟望秋月，空忆谢将军。", "余亦能高咏，斯人不可闻。", "明朝挂帆席，枫叶落纷纷。"], "img": false}, {"i": 124, "t": "赠孟浩然", "d": "", "a": "", "l": ["李白 〔唐代〕", "吾爱孟夫子，风流天下闻。", "红颜弃轩冕，白首卧松云。", "醉月频中圣，迷花不事君。", "高山安可仰，徒此揖清芬。"], "img": false}, {"i": 125, "t": "渡荆门送别", "d": "", "a": "", "l": ["李白 〔唐代〕", "渡远荆门外，来从楚国游。", "山随平野尽，江入大荒流。", "月下飞天镜，云生结海楼。", "仍怜故乡水，万里送行舟。"], "img": false}, {"i": 126, "t": "送友人", "d": "", "a": "", "l": ["李白 〔唐代〕", "青山横北郭，白水绕东城。", "此地一为别，孤蓬万里征。", "浮云游子意，落日故人情。", "挥手自兹去，萧萧班马鸣。"], "img": false}, {"i": 127, "t": "喜见外弟又言别", "d": "", "a": "", "l": ["李益 〔唐代〕", "十年离乱后，长大一相逢。", "问姓惊初见，称名忆旧容。", "别来沧海事，语罢暮天钟。", "明日巴陵道，秋山又几重。"], "img": false}, {"i": 128, "t": "凉思", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "客去波平槛，蝉休露满枝。", "永怀当此节，倚立自移时。", "北斗兼春远，南陵寓使迟。", "天涯占梦数，疑误有新知。"], "img": false}, {"i": 129, "t": "北青萝", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "残阳西入崦，茅屋访孤僧。", "落叶人何在，寒云路几层。", "独敲初夜磬，闲倚一枝藤。", "世界微尘里，吾宁爱与憎。"], "img": false}, {"i": 130, "t": "蝉", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "本以高难饱，徒劳恨费声。", "五更疏欲断，一树碧无情。", "薄宦梗犹泛，故园芜已平。", "烦君最相警，我亦举家清。"], "img": false}, {"i": 131, "t": "风雨", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "凄凉宝剑篇，羁泊欲穷年。", "黄叶仍风雨，青楼自管弦。", "新知遭薄俗，旧好隔良缘。", "心断新丰酒，销愁斗几千。"], "img": false}, {"i": 132, "t": "落花", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "高阁客竟去，小园花乱飞。", "参差连曲陌，迢递送斜晖。", "肠断未忍扫，眼穿仍欲归。", "芳心向春尽，所得是沾衣。"], "img": false}, {"i": 133, "t": "登岳阳楼", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "昔闻洞庭水，今上岳阳楼。", "吴楚东南坼，乾坤日夜浮。", "亲朋无一字，老病有孤舟。", "戎马关山北，凭轩涕泗流。"], "img": false}, {"i": 134, "t": "奉济驿重送严公四韵", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "远送从此别，青山空复情。", "几时杯重把，昨夜月同行。", "列郡讴歌惜，三朝出入荣。", "江村独归处，寂寞养残生。"], "img": false}, {"i": 135, "t": "别房太尉墓", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "他乡复行役，驻马别孤坟。", "近泪无干土，低空有断云。", "对棋陪谢傅，把剑觅徐君。", "唯见林花落，莺啼送客闻。"], "img": false}, {"i": 136, "t": "旅夜书怀", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "细草微风岸，危樯独夜舟。", "星垂平野阔，月涌大江流。", "名岂文章著，官应老病休。", "飘飘何所似，天地一沙鸥。"], "img": false}, {"i": 137, "t": "至德二载甫自京金光门出间道归凤翔乾元初从左拾遗移华州掾与亲故别因出此门有悲往事", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "此道昔归顺，西郊胡正繁。", "至今残破胆，应有未招魂。", "近侍归京邑，移官岂至尊。", "无才日衰老，驻马望千门。"], "img": false}, {"i": 138, "t": "月夜忆舍弟", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "戍鼓断人行，边秋一雁声。", "露从今夜白，月是故乡明。", "有弟皆分散，无家问死生。", "寄书长不达，况乃未休兵。"], "img": false}, {"i": 139, "t": "天末怀李白", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "凉风起天末，君子意如何。", "鸿雁几时到，江湖秋水多。", "文章憎命达，魑魅喜人过。", "应共冤魂语，投诗赠汨罗。"], "img": false}, {"i": 140, "t": "月夜-杜甫", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "今夜鄜州月，闺中只独看。", "遥怜小儿女，未解忆长安。", "香雾云鬟湿，清辉玉臂寒。", "何时倚虚幌，双照泪痕干。"], "img": false}, {"i": 141, "t": "春望", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "国破山河在，城春草木深。", "感时花溅泪，恨别鸟惊心。", "烽火连三月，家书抵万金。", "白头搔更短，浑欲不胜簪。"], "img": false}, {"i": 142, "t": "春宿左省", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "花隐掖(yè)垣(yuán)暮，啾(jiū)啾栖(qī)鸟过。", "星临万户动，月傍九霄多。", "不寝听金钥，因风想玉珂。", "明朝有封事，数问夜如何。"], "img": false}, {"i": 143, "t": "旅宿", "d": "", "a": "", "l": ["杜牧 〔唐代〕", "旅馆无良伴，凝情自悄然。", "寒灯思旧事，断雁警愁眠。", "远梦归侵晓，家书到隔年。", "沧江好烟月，门系钓鱼船。"], "img": false}, {"i": 144, "t": "春宫怨-早被", "d": "", "a": "", "l": ["杜荀鹤 〔唐代〕", "早被婵娟误，欲妆临镜慵。", "承恩不在貌，教妾若为容。", "风暖鸟声碎，日高花影重。", "年年越溪女，相忆采芙蓉。"], "img": false}, {"i": 145, "t": "和晋陵陆丞早春游望", "d": "", "a": "", "l": ["杜审言 〔唐代〕", "独有宦游人，偏惊物候新。", "云霞出海曙，梅柳渡江春。", "淑气催黄鸟，晴光转绿蘋。", "忽闻歌古调，归思欲沾巾。"], "img": false}, {"i": 146, "t": "杂诗三首·其三", "d": "", "a": "", "l": ["沈佺期 〔唐代〕", "闻道黄龙戍，频年不解兵。", "可怜闺里月，长在汉家营。", "少妇今春意，良人昨夜情。", "谁能将旗鼓，一为取龙城。"], "img": false}, {"i": 147, "t": "宿桐庐江寄广陵旧游", "d": "", "a": "", "l": ["孟浩然 〔唐代〕", "山暝听猿愁，沧江急夜流。", "风鸣两岸叶，月照一孤舟。", "建德非吾土，维扬忆旧游。", "还将两行泪，遥寄海西头。"], "img": false}, {"i": 148, "t": "留别王侍御维", "d": "", "a": "", "l": ["孟浩然 〔唐代〕", "寂寂竟何待，朝朝空自归。", "欲寻芳草去，惜与故人违。", "当路谁相假，知音世所稀。", "只应守寂寞，还掩故园扉。"], "img": false}, {"i": 149, "t": "早寒江上有怀", "d": "", "a": "", "l": ["孟浩然 〔唐代〕", "木落雁南度，北风江上寒。", "我家襄水曲，遥隔楚云端。", "乡泪客中尽，孤帆天际看。", "迷津欲有问，平海夕漫漫。"], "img": false}, {"i": 150, "t": "岁暮归南山", "d": "", "a": "", "l": ["孟浩然 〔唐代〕", "北阙休上书，南山归敝庐。", "不才明主弃，多病故人疏。", "白发催年老，青阳逼岁除。", "永怀愁不寐，松月夜窗虚。"], "img": false}, {"i": 151, "t": "过故人庄", "d": "", "a": "", "l": ["孟浩然 〔唐代〕", "故人具鸡黍，邀我至田家。", "绿树村边合，青山郭外斜。", "开轩面场圃，把酒话桑麻。", "待到重阳日，还来就菊花。"], "img": false}, {"i": 152, "t": "秦中感秋寄远上人", "d": "", "a": "", "l": ["孟浩然 〔唐代〕", "一丘常欲卧，三径苦无资。", "北土非吾愿，东林怀我师。", "黄金燃桂尽，壮志逐年衰。", "日夕凉风至，闻蝉但益悲。"], "img": false}, {"i": 153, "t": "望洞庭湖赠张丞相", "d": "", "a": "", "l": ["孟浩然 〔唐代〕", "八月湖水平，涵虚混太清。", "气蒸云梦泽，波撼岳阳城。", "欲济无舟楫，端居耻圣明。", "坐观垂钓者，徒有羡鱼情。"], "img": false}, {"i": 154, "t": "与诸子登岘山", "d": "", "a": "", "l": ["孟浩然 〔唐代〕", "人事有代谢，往来成古今。", "江山留胜迹，我辈复登临。", "水落鱼梁浅，天寒梦泽深。", "羊公碑尚在，读罢泪沾襟。"], "img": false}, {"i": 155, "t": "清明日宴梅道士房", "d": "", "a": "", "l": ["孟浩然 〔唐代〕", "林卧愁春尽，搴(qiān)帷(wéi)览物华。", "忽逢青鸟使，邀入赤松家。", "金灶初开火，仙桃正发花。", "童颜若可驻，何惜醉流霞。"], "img": false}, {"i": 156, "t": "章台夜思", "d": "", "a": "", "l": ["韦庄 〔唐代〕", "清瑟怨遥夜，绕弦风雨哀。", "孤灯闻楚角，残月下章台。", "芳草已云暮，故人殊未来。", "乡书不可寄，秋雁又南回。"], "img": false}, {"i": 157, "t": "淮上喜会梁州故人", "d": "", "a": "", "l": ["韦应物 〔唐代〕", "江汉曾为客，相逢每醉还。", "浮云一别后，流水十年间。", "欢笑情如旧，萧疏鬓已斑。", "何因不归去？淮上有秋山。"], "img": false}, {"i": 158, "t": "赋得暮雨送李胄", "d": "", "a": "", "l": ["韦应物 〔唐代〕", "楚江微雨里，建业暮钟时。", "漠漠帆来重，冥冥鸟去迟。", "海门深不见，浦树远含滋。", "相送情无限，沾襟比散丝。"], "img": false}, {"i": 159, "t": "经邹鲁祭孔子而叹之", "d": "", "a": "", "l": ["李隆基 〔唐代〕", "夫子何为者，栖栖一代中。", "地犹鄹氏邑，宅即鲁王宫。", "叹凤嗟身否，伤麟怨道穷。", "今看两楹奠，当与梦时同。"], "img": false}, {"i": 160, "t": "灞上秋居", "d": "", "a": "", "l": ["马戴 〔唐代〕", "灞原风雨定，晚见雁行频。", "落叶他乡树，寒灯独夜人。", "空园白露滴，孤壁野僧邻。", "寄卧郊扉久，何年致此身。"], "img": false}, {"i": 161, "t": "楚江怀古三首·其一", "d": "", "a": "", "l": ["马戴 〔唐代〕", "露气寒光集，微阳下楚丘。", "猿啼洞庭树，人在木兰舟。", "广泽生明月，苍山夹乱流。", "云中君不见，竟夕自悲秋。"], "img": false}, {"i": 162, "t": "巴山道中除夜书怀", "d": "", "a": "", "l": ["崔涂 〔唐代〕", "迢递三巴路，羁危万里身。", "乱山残雪夜，孤烛异乡人。", "渐与骨肉远，转于僮仆亲。", "那堪正飘泊，明日岁华新。"], "img": false}, {"i": 163, "t": "孤雁二首·其二", "d": "", "a": "", "l": ["崔涂 〔唐代〕", "几行归塞尽，念尔独何之。", "暮雨相呼失，寒塘欲下迟。", "渚云低暗度，关月冷相随。", "未必逢矰缴，孤飞自可疑。"], "img": false}, {"i": 164, "t": "题破山寺后禅院", "d": "", "a": "", "l": ["常建 〔唐代〕", "清晨入古寺，初日照高林。", "曲径通幽处，禅房花木深。", "山光悦鸟性，潭影空人心。", "万籁此都寂，惟余钟磬音。"], "img": false}, {"i": 165, "t": "望月怀远", "d": "", "a": "", "l": ["张九龄 〔唐代〕", "海上生明月，天涯共此时。", "情人怨遥夜，竟夕起相思。", "灭烛怜光满，披衣觉露滋。", "不堪盈手赠，还寝梦佳期。"], "img": false}, {"i": 166, "t": "书边事", "d": "", "a": "", "l": ["张乔 〔唐代〕", "调角断清秋，征人倚戍楼。", "春风对青冢，白日落梁州。", "大漠无兵阻，穷边有客游。", "蕃情似此水，长愿向南流。"], "img": false}, {"i": 167, "t": "没蕃故人", "d": "", "a": "", "l": ["张籍 〔唐代〕", "前年戍月支，城下没全师。", "蕃汉断消息，死生长别离。", "无人收废帐，归马识残旗。", "欲祭疑君在，天涯哭此时。"], "img": false}, {"i": 168, "t": "秋日赴阙题潼关驿楼", "d": "", "a": "", "l": ["许浑 〔唐代〕", "红叶晚萧萧，长亭酒一瓢。", "残云归太华，疏雨过中条。", "树色随山迥，河声入海遥。", "帝乡明日到，犹自梦渔樵。"], "img": false}, {"i": 169, "t": "早秋三首·遥夜", "d": "", "a": "", "l": ["许浑 〔唐代〕", "遥夜泛清瑟，西风生翠萝。", "残萤委玉露，早雁拂金河。", "高树晓还密，远山晴更多。", "淮南一叶下，自觉洞庭波。"], "img": false}, {"i": 170, "t": "送人东游", "d": "", "a": "", "l": ["温庭筠 〔唐代〕", "荒戍落黄叶，浩然离故关。", "高风汉阳渡，初日郢门山。", "江上几人在，天涯孤棹还。", "何当重相见，樽酒慰离颜。"], "img": false}, {"i": 171, "t": "寻陆鸿渐不遇", "d": "", "a": "", "l": ["皎然 〔唐代〕", "移家虽带郭，野径入桑麻。", "近种篱边菊，秋来未著花。", "扣门无犬吠，欲去问西家。", "报道山中去，归时每日斜。"], "img": false}, {"i": 172, "t": "寻南溪常山道人隐居", "d": "", "a": "", "l": ["刘长卿 〔唐代〕", "一路经行处，莓苔见履痕。", "白云依静渚，春草闭闲门。", "过雨看松色，随山到水源。", "溪花与禅意，相对亦忘言。"], "img": false}, {"i": 173, "t": "新年作", "d": "", "a": "", "l": ["刘长卿 〔唐代〕", "乡心新岁切，天畔独潸然。", "老至居人下，春归在客先。", "岭猿同旦暮，江柳共风烟。", "已似长沙傅，从今又几年。"], "img": false}, {"i": 174, "t": "秋日登吴公台上寺远眺", "d": "", "a": "", "l": ["刘长卿 〔唐代〕", "古台摇落后，秋日望乡心。", "野寺来人少，云峰隔水深。", "夕阳依旧垒，寒磬满空林。", "惆怅南朝事，长江独至今。"], "img": false}, {"i": 175, "t": "送李中丞之襄州", "d": "", "a": "", "l": ["刘长卿 〔唐代〕", "流落征南将，曾驱十万师。", "罢归无旧业，老去恋明时。", "独立三边静，轻生一剑知。", "茫茫江汉上，日暮欲何之。"], "img": false}, {"i": 176, "t": "饯别王十一南游", "d": "", "a": "", "l": ["刘长卿 〔唐代〕", "望君烟水阔，挥手泪沾巾。", "飞鸟没何处，青山空向人。", "长江一帆远，落日五湖春。", "谁见汀洲上，相思愁白蘋。"], "img": false}, {"i": 177, "t": "蜀先主庙", "d": "", "a": "", "l": ["刘禹锡 〔唐代〕", "天地英雄气，千秋尚凛然。", "势分三足鼎，业复五铢钱。", "得相能开国，生儿不象贤。", "凄凉蜀故妓，来舞魏宫前。"], "img": false}, {"i": 178, "t": "阙题.道由", "d": "", "a": "", "l": ["刘昚shèn虚 〔唐代〕", "道由白云尽，春与青溪长。", "时有落花至，远随流水香。", "闲门向山路，深柳读书堂。", "幽映每白日，清辉照衣裳。"], "img": false}, {"i": 179, "t": "李端公", "d": "", "a": "", "l": ["卢纶 〔唐代〕", "故关衰草遍，离别自堪悲。", "路出寒云外，人归暮雪时。", "少孤为客早，多难识君迟。", "掩泪空相向，风尘何处期。"], "img": false}, {"i": 180, "t": "送僧归日本", "d": "", "a": "", "l": ["钱起 〔唐代〕", "上国随缘住，来途若梦行。", "浮天沧海远，去世法舟轻。", "水月通禅寂，鱼龙听梵声。", "惟怜一灯影，万里眼中明。"], "img": false}, {"i": 181, "t": "谷口书斋寄杨补阙", "d": "", "a": "", "l": ["钱起 〔唐代〕", "泉壑(hè)带茅茨(cí)，", "云霞生薜(bì)帷。", "竹怜新雨后，山爱夕阳时。", "闲鹭栖常早，秋花落更迟。", "家僮扫萝径，昨与故人期。"], "img": false}, {"i": 182, "t": "在狱咏蝉", "d": "", "a": "", "l": ["骆宾王 〔唐代〕", "西陆蝉声唱，南冠客思深。(客思深 一作：客思侵)", "那堪玄鬓影，来对白头吟。(那堪 一作：不堪)", "露重飞难进，风多响易沉。", "无人信高洁，谁为表予心？"], "img": false}, {"i": 183, "t": "客夜与故人偶集", "d": "", "a": "", "l": ["戴叔伦 〔唐代〕", "天秋月又满，城阙夜千重。", "还作江南会，翻疑梦里逢。", "风枝惊暗鹊，露草泣寒蛩。", "羁旅长堪醉，相留畏晓钟。"], "img": false}, {"i": 184, "t": "酬程延秋夜即事见赠", "d": "", "a": "", "l": ["韩翃 〔唐代〕", "长簟迎风早，空城澹月华。", "星河秋一雁，砧杵夜千家。", "节候看应晚，心期卧亦赊。", "向来吟秀句，不觉已鸣鸦。"], "img": false}, {"i": 185, "t": "遣悲怀三首·其一", "d": "", "a": "", "l": ["元稹 〔唐代〕", "谢公最小偏怜女，自嫁黔(qián)娄(lóu)百事乖。", "顾我无衣搜(jìn)箧(qiè)，泥他沽酒拔金钗。", "野蔬充膳甘长藿，落叶添薪仰古槐。", "今日俸钱过十万，与君营奠复营斋。"], "img": false}, {"i": 186, "t": "遣悲怀三首·其二", "d": "", "a": "", "l": ["元稹 〔唐代〕", "昔日戏言身后意，今朝都到眼前来。", "衣裳已施行看尽，针线犹存未忍开。", "尚想旧情怜婢仆，也曾因梦送钱财。", "诚知此恨人人有，贫贱夫妻百事哀。"], "img": false}, {"i": 187, "t": "遣悲怀三首·其三", "d": "", "a": "", "l": ["元稹 〔唐代〕", "闲坐悲君亦自悲，百年都是几多时。", "邓攸无子寻知命，潘岳悼亡犹费词。", "同穴窅(yǎo)冥何所望，他生缘会更难期。", "惟将终夜长开眼，报答平生未展眉。"], "img": false}, {"i": 188, "t": "酬郭给事", "d": "", "a": "", "l": ["王维〔唐代〕", "洞门高阁霭馀辉，桃李阴阴柳絮飞。", "禁里疏钟官舍晚，省中啼鸟吏人稀。", "晨摇玉佩趋金殿，夕奉天书拜琐闱。", "强欲从君无那老，将因卧病解朝衣。"], "img": false}, {"i": 189, "t": "和贾舍人早朝大明宫之作", "d": "", "a": "", "l": ["王维〔唐代〕", "绛帻鸡人报晓筹，尚衣方进翠云裘。", "九天阊阖开宫殿，万国衣冠拜冕旒。", "日色才临仙掌动，香烟欲傍衮龙浮。", "朝罢须裁五色诏，佩声归到凤池头。"], "img": false}, {"i": 190, "t": "奉和圣制从蓬莱向兴庆阁道中留春雨中春望之作应制", "d": "", "a": "", "l": ["王维〔唐代〕", "渭水自萦秦塞曲，黄山旧绕汉宫斜。", "銮舆迥出千门柳，阁道回看上苑花。", "云里帝城双凤阙，雨中春树万人家。", "为乘阳气行时令，不是宸游玩物华。"], "img": false}, {"i": 191, "t": "积雨辋川庄作", "d": "", "a": "", "l": ["王维〔唐代〕", "积雨空林烟火迟，蒸藜炊黍饷东菑。", "漠漠水田飞白鹭，阴阴夏木啭黄鹂。", "山中习静观朝槿，松下清斋折露葵。", "野老与人争席罢，海鸥何事更相疑。"], "img": false}, {"i": 192, "t": "望月有感", "d": "", "a": "", "l": ["白居易〔唐代〕", "时难年荒世业空，弟兄羁旅各西东。", "田园寥落干戈后，骨肉流离道路中。", "吊影分为千里雁，辞根散作九秋蓬。", "共看明月应垂泪，一夜乡心五处同。"], "img": false}, {"i": 193, "t": "登金陵凤凰台", "d": "", "a": "", "l": ["李白 〔唐代〕", "凤凰台上凤凰游，凤去台空江自流。", "吴宫花草埋幽径，晋代衣冠成古丘。", "三山半落青天外，二水中分白鹭洲。", "总为浮云能蔽日，长安不见使人愁。"], "img": false}, {"i": 194, "t": "无题·重帏", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "重帏深下莫愁堂，卧后清宵细细长。", "神女生涯原是梦，小姑居处本无郎。", "风波不信菱枝弱，月露谁教桂叶香。", "直道相思了无益，未妨惆怅是清狂。"], "img": false}, {"i": 195, "t": "无题·凤尾", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "凤尾香罗薄几重，碧文圆顶夜深缝。", "扇裁月魄羞难掩，车走雷声语未通。", "曾是寂寥金烬暗，断无消息石榴红。", "斑骓只系垂杨岸，何处西南任好风。"], "img": false}, {"i": 196, "t": "无题·相见", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "相见时难别亦难，东风无力百花残。", "春蚕到死丝方尽，蜡炬成灰泪始干。", "晓镜但愁云鬓改，夜吟应觉月光寒。", "蓬山此去无多路，青鸟殷勤为探看。"], "img": false}, {"i": 197, "t": "无题·来是", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "来是空言去绝踪，月斜楼上五更钟。", "梦为远别啼难唤，书被催成墨未浓。", "蜡照半笼金翡翠，麝熏微度绣芙蓉。", "刘郎已恨蓬山远，更隔蓬山一万重！"], "img": false}, {"i": 198, "t": "无题·飒飒", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "飒飒东风细雨来，芙蓉塘外有轻雷。", "金蟾啮锁烧香入，玉虎牵丝汲井回。", "贾氏窥帘韩掾少，宓妃留枕魏王才。", "春心莫共花争发，一寸相思一寸灰！"], "img": false}, {"i": 199, "t": "无题二首·昨夜", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "昨夜星辰昨夜风，画楼西畔桂堂东。", "身无彩凤双飞翼，心有灵犀一点通。", "隔座送钩春酒暖，分曹射覆蜡灯红。", "嗟余听鼓应官去，走马兰台类转蓬。"], "img": false}, {"i": 200, "t": "春雨-怅卧", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "怅卧新春白袷衣，白门寥落意多违。", "红楼隔雨相望冷，珠箔飘灯独自归。", "远路应悲春晼晚，残宵犹得梦依稀。", "玉珰缄札何由达，万里云罗一雁飞。"], "img": false}, {"i": 201, "t": "筹笔驿", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "猿鸟犹疑畏简书，风云常为护储胥。", "徒令上将挥神笔，终见降王走传车。", "管乐有才原不忝，关张无命欲何如？", "他年锦里经祠庙，梁父吟成恨有余。"], "img": false}, {"i": 202, "t": "锦瑟", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "锦瑟无端五十弦，一弦一柱思华年。", "庄生晓梦迷蝴蝶，望帝春心托杜鹃。", "沧海月明珠有泪，蓝田日暖玉生烟。", "此情可待成追忆，只是当时已惘然。"], "img": false}, {"i": 203, "t": "隋宫", "d": "", "a": "", "l": ["李商隐 〔唐代〕", "紫泉宫殿锁烟霞，欲取芜城作帝家。", "玉玺不缘归日角，锦帆应是到天涯。", "于今腐草无萤火，终古垂杨有暮鸦。", "地下若逢陈后主，岂宜重问后庭花。"], "img": false}, {"i": 204, "t": "送魏万之京", "d": "", "a": "", "l": ["李颀 〔唐代〕", "朝闻游子唱离歌，昨夜微霜初渡河。", "鸿雁不堪愁里听，云山况是客中过。", "关城树色催寒近，御苑砧声向晚多。", "莫见长安行乐处，空令岁月易蹉跎。"], "img": false}, {"i": 205, "t": "咏怀古迹五首·支离", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "支离东北风尘际，漂泊西南天地间。", "三峡楼台淹日月，五溪衣服共云山。", "羯胡事主终无赖，词客哀时且未还。", "庾信平生最萧瑟，暮年诗赋动江关。"], "img": false}, {"i": 206, "t": "咏怀古迹五首·摇落", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "摇落深知宋玉悲，风流儒雅亦吾师。", "怅望千秋一洒泪，萧条异代不同时。", "江山故宅空文藻，云雨荒台岂梦思。", "最是楚宫俱泯灭，舟人指点到今疑。"], "img": false}, {"i": 207, "t": "咏怀古迹五首·群山", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "群山万壑赴荆门，生长明妃尚有村。", "一去紫台连朔漠，独留青冢向黄昏。", "画图省识春风面，环珮空归夜月魂。", "千载琵琶作胡语，分明怨恨曲中论。"], "img": false}, {"i": 208, "t": "咏怀古迹五首·蜀主", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "蜀主窥吴幸三峡，崩年亦在永安宫。", "翠华想像空山里，玉殿虚无野寺中。", "古庙杉松巢水鹤，岁时伏腊走村翁。", "武侯祠屋常邻近，一体君臣祭祀同。"], "img": false}, {"i": 209, "t": "咏怀古迹五首·诸葛", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "诸葛大名垂宇宙，宗臣遗像肃清高。", "三分割据纡筹策，万古云霄一羽毛。", "伯仲之间见伊吕，指挥若定失萧曹。", "运移汉祚终难复，志决身歼军务劳。"], "img": false}, {"i": 210, "t": "宿府", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "清秋幕府井梧寒，独宿江城蜡炬残。", "永夜角声悲自语，中天月色好谁看。", "风尘荏苒音书绝，关塞萧条行路难。", "已忍伶俜十年事，强移栖息一枝安。"], "img": false}, {"i": 211, "t": "阁夜", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "岁暮阴阳催短景(yǐng)，天涯霜雪霁寒宵。", "五更鼓角声悲壮，三峡星河影动摇。", "野哭千家闻战伐，夷歌数处起渔樵。", "卧龙跃马终黄土，人事音书漫寂寥。"], "img": false}, {"i": 212, "t": "闻官军收河南河北", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "剑外忽传收蓟北，初闻涕泪满衣裳。", "却看妻子愁何在，漫卷诗书喜欲狂。", "白日放歌须纵酒，青春作伴好还乡。", "即从巴峡穿巫峡，便下襄阳向洛阳。"], "img": false}, {"i": 213, "t": "登高", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "风急天高猿啸哀，渚清沙白鸟飞回。", "无边落木萧萧下，不尽长江滚滚来。", "万里悲秋常作客，百年多病独登台。", "艰难苦恨繁霜鬓，潦倒新停浊酒杯。"], "img": false}, {"i": 214, "t": "登楼", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "花近高楼伤客心，万方多难此登临。", "锦江春色来天地，玉垒浮云变古今。", "北极朝廷终不改，西山寇盗莫相侵。", "可怜后主还祠庙，日暮聊为《梁甫吟》。"], "img": false}, {"i": 215, "t": "蜀相", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "丞相祠堂何处寻？锦官城外柏森森。", "映阶碧草自春色，隔叶黄鹂空好音。", "三顾频烦天下计，两朝开济老臣心。", "出师未捷身先死，长使英雄泪满襟。"], "img": false}, {"i": 216, "t": "客至", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "舍南舍北皆春水，但见群鸥日日来。", "花径不曾缘客扫，蓬门今始为君开。", "盘飧市远无兼味，樽酒家贫只旧醅。", "肯与邻翁相对饮，隔篱呼取尽余杯。"], "img": false}, {"i": 217, "t": "野望", "d": "", "a": "", "l": ["杜甫 〔唐代〕", "西山白雪三城戍，南浦清江万里桥。", "海内风尘诸弟隔，天涯涕泪一身遥。", "惟将迟暮供多病，未有涓埃答圣朝。", "跨马出郊时极目，不堪人事日萧条。"], "img": false}, {"i": 218, "t": "登柳州城楼寄漳汀封连四州", "d": "", "a": "", "l": ["柳宗元 〔唐代〕", "城上高楼接大荒，海天愁思正茫茫。", "惊风乱飐芙蓉水，密雨斜侵薜荔墙。", "岭树重遮千里目，江流曲似九回肠。", "共来百越文身地，犹自音书滞一乡。"], "img": false}, {"i": 219, "t": "春思-莺", "d": "", "a": "", "l": ["皇甫冉 〔唐代〕", "莺啼燕语报新年，马邑龙堆路几千。", "家住秦城临汉苑，心随明月到胡天。", "机中锦字论长恨，楼上花枝笑独眠。", "为问元戎窦车骑，何时返旆勒燕然。"], "img": false}, {"i": 220, "t": "寄李儋元锡", "d": "", "a": "", "l": ["韦应物〔唐代〕", "去年花里逢君别，今日花开又一年。", "世事茫茫难自料，春愁黯黯独成眠。", "身多疾病思田里，邑有流亡愧俸钱。", "闻道欲来相问讯，西楼望月几回圆。"], "img": false}, {"i": 221, "t": "望蓟门", "d": "", "a": "", "l": ["祖咏〔唐代〕", "燕台一望客心惊，笳鼓喧喧汉将营。", "万里寒光生积雪，三边曙色动危旌。", "沙场烽火连胡月，海畔云山拥蓟城。", "少小虽非投笔吏，论功还欲请长缨。"], "img": false}, {"i": 222, "t": "贫女", "d": "", "a": "", "l": ["秦韬玉〔唐代〕", "蓬门未识绮罗香，拟托良媒益自伤。", "谁爱风流高格调，共怜时世俭梳妆。", "敢将十指夸针巧，不把双眉斗画长。", "苦恨年年压金线，为他人作嫁衣裳。"], "img": false}, {"i": 223, "t": "送李少府贬峡中王少府贬长沙", "d": "", "a": "", "l": ["高适〔唐代〕", "嗟君此别意何如，驻马衔杯问谪居。", "巫峡啼猿数行泪，衡阳归雁几封书。", "青枫江上秋帆远，白帝城边古木疏。", "圣代即今多雨露，暂时分手莫踌躇。"], "img": false}, {"i": 224, "t": "九日登望仙台呈刘明府", "d": "", "a": "", "l": ["崔曙〔唐代〕", "汉文皇帝有高台，此日登临曙色开。", "三晋云山皆北向，二陵风雨自东来。", "关门令尹谁能识，河上仙翁去不回。", "且欲近寻彭泽宰，陶然共醉菊花杯。"], "img": false}, {"i": 225, "t": "行经华阴", "d": "", "a": "", "l": ["崔颢〔唐代〕", "岧峣太华俯咸京，天外三峰削不成。", "武帝祠前云欲散，仙人掌上雨初晴。", "河山北枕秦关险，驿路西连汉畤平。", "借问路旁名利客，何如此处学长生。"], "img": false}, {"i": 226, "t": "利州南渡", "d": "", "a": "", "l": ["温庭筠〔唐代〕", "澹然空水带斜晖，曲岛苍茫接翠微。", "波上马嘶看棹去，柳边人歇待船归。", "数丛沙草群鸥散，万顷江田一鹭飞。", "谁解乘舟寻范蠡，五湖烟水独忘机。"], "img": false}, {"i": 227, "t": "苏武庙", "d": "", "a": "", "l": ["温庭筠〔唐代〕", "苏武魂销汉使前，古祠高树两茫然。", "云边雁断胡天月，陇上羊归塞草烟。", "回日楼台非甲帐，去时冠剑是丁年。", "茂陵不见封侯印，空向秋波哭逝川。"], "img": false}, {"i": 228, "t": "江州重别薛六柳八二员外", "d": "", "a": "", "l": ["刘长卿〔唐代〕", "生涯岂料承优诏，世事空知学醉歌。", "江上月明胡雁过，淮南木落楚山多。", "寄身且喜沧洲近，顾影无如白发何。", "今日龙钟人共弃，愧君犹遣慎风波。"], "img": false}, {"i": 229, "t": "长沙过贾谊宅", "d": "", "a": "", "l": ["刘长卿〔唐代〕", "三年谪宦此栖迟，万古惟留楚客悲。", "秋草独寻人去后，寒林空见日斜时。", "汉文有道恩犹薄，湘水无情吊岂知？", "寂寂江山摇落处，怜君何事到天涯！"], "img": false}, {"i": 230, "t": "自夏口至鹦鹉洲夕望岳阳寄源中丞", "d": "", "a": "", "l": ["刘长卿〔唐代〕", "汀洲无浪复无烟，楚客相思益渺然。", "汉口夕阳斜渡鸟，洞庭秋水远连天。", "孤城背岭寒吹角，独树临江夜泊船。", "贾谊上书忧汉室，长沙谪去古今怜。"], "img": false}, {"i": 231, "t": "西塞山怀古", "d": "", "a": "", "l": ["刘禹锡〔唐代〕", "王濬楼船下益州，金陵王气黯然收。", "千寻铁锁沉江底，一片降幡出石头。", "人世几回伤往事，山形依旧枕寒流。", "今逢四海为家日，故垒萧萧芦荻秋。"], "img": false}, {"i": 232, "t": "晚次鄂州", "d": "", "a": "", "l": ["卢纶〔唐代〕", "云开远见汉阳城，犹是孤帆一日程。", "估客昼眠知浪静，舟人夜语觉潮生。", "三湘衰鬓逢秋色，万里归心对月明。", "旧业已随征战尽，更堪江上鼓鼙声。"], "img": false}, {"i": 233, "t": "赠阙下裴舍人", "d": "", "a": "", "l": ["钱起〔唐代〕", "二月黄莺飞上林，春城紫禁晓阴阴。", "长乐钟声花外尽，龙池柳色雨中深。", "阳和不散穷途恨，霄汉长怀捧日心。", "献赋十年犹未遇，羞将白发对华簪。"], "img": false}, {"i": 234, "t": "宫词-十二楼", "d": "", "a": "", "l": ["薛逢〔唐代〕", "十二楼中尽晓妆，望仙楼上望君王。", "锁衔金兽连环冷，水滴铜龙昼漏长。", "云髻罢梳还对镜，罗衣欲换更添香。", "遥窥正殿帘开处，袍袴(kù)宫人扫御床。"], "img": false}, {"i": 235, "t": "同题仙游观", "d": "", "a": "", "l": ["韩翃〔唐代〕", "仙台初见五城楼，风物凄凄宿雨收。", "山色遥连秦树晚，砧声近报汉宫秋。", "疏松影落空坛静，细草香闲小洞幽。", "何用别寻方外去，人间亦自有丹丘。"], "img": false}, {"i": 236, "t": "贼退示官吏", "d": "", "a": "", "l": ["元结〔唐代〕", "癸卯岁，西原贼入道县，焚烧杀掠，几尽而去。", "明年，贼又攻永破邵，不犯此州边鄙而退。", "岂力能制敌与？盖蒙其伤怜而已。", "诸使何为忍苦征敛，故作诗一篇以示官吏。", "昔岁逢太平，山林二十年。", "泉源在庭户，洞壑当门前。", "井税有常期，日晏犹得眠。", "忽然遭世变，数岁亲戎旃。", "今来典斯郡，山夷又纷然。", "城小贼不屠，人贫伤可怜。", "是以陷邻境，此州独见全。", "使臣将王命，岂不如贼焉？", "今彼征敛者，迫之如火煎。", "谁能绝人命，以作时世贤！", "思欲委符节，引竿自刺船。", "将家就鱼麦，归老江湖边。"], "img": false}, {"i": 237, "t": "同从弟南斋玩月忆山阴崔少府", "d": "", "a": "", "l": ["王昌龄〔唐代〕", "高卧南斋时，开帷月初吐。", "清辉澹水木，演漾在窗户。", "冉冉几盈虚，澄澄变今古。", "美人清江畔，是夜越吟苦。", "千里共如何，微风吹兰杜。"], "img": false}, {"i": 238, "t": "渭川田家", "d": "", "a": "", "l": ["王维〔唐代〕", "斜阳照墟落，穷巷牛羊归。", "野老念牧童，倚杖候荆扉。", "雉雊麦苗秀，蚕眠桑叶稀。", "田夫荷锄至，相见语依依。", "即此羡闲逸，怅然吟式微。"], "img": false}, {"i": 239, "t": "西施咏", "d": "", "a": "", "l": ["王维〔唐代〕", "艳色天下重，西施宁久微。", "朝为越溪女，暮作吴宫妃。", "贱日岂殊众，贵来方悟稀。", "邀人傅脂粉，不自著罗衣。", "君宠益娇态，君怜无是非。", "当时浣纱伴，莫得同车归。", "持谢邻家子，效颦安可希。"], "img": false}, {"i": 240, "t": "送别", "d": "", "a": "", "l": ["王维〔唐代〕", "下马饮君酒，问君何所之？", "君言不得意，归卧南山陲。", "但去莫复问，白云无尽时。"], "img": false}, {"i": 241, "t": "送綦毋潜落第还乡", "d": "", "a": "", "l": ["王维〔唐代〕", "圣代无隐者，英灵尽来归。", "遂令东山客，不得顾采薇。", "既至金门远，孰云吾道非。", "江淮度寒食，京洛缝春衣。", "置酒长安道，同心与我违。", "行当浮桂棹，未几拂荆扉。", "远树带行客，孤村当落晖。", "吾谋适不用，勿谓知音稀。"], "img": false}, {"i": 242, "t": "青溪", "d": "", "a": "", "l": ["王维〔唐代〕", "言入黄花川，每逐青溪水。", "随山将万转，趣途无百里。", "声喧乱石中，色静深松里。", "漾漾泛菱荇，澄澄映葭苇。", "我心素已闲，清川澹如此。", "请留磐石上，垂钓将已矣。"], "img": false}, {"i": 243, "t": "与高适薛据同登慈恩寺浮图", "d": "", "a": "", "l": ["岑参〔唐代〕", "塔势如涌出，孤高耸天宫。", "登临出世界，磴道盘虚空。", "突兀压神州，峥嵘如鬼工。", "四角碍白日，七层摩苍穹。", "下窥指高鸟，俯听闻惊风。", "连山若波涛，奔凑似朝东。", "青槐夹驰道，宫馆何玲珑。", "秋色从西来，苍然满关中。", "五陵北原上，万古青濛濛。", "净理了可悟，胜因夙所宗。", "誓将挂冠去，觉道资无穷。"], "img": false}, {"i": 244, "t": "下终南山过斛 (hú) 斯山人宿置酒", "d": "", "a": "", "l": ["李白〔唐代〕", "暮从碧山下，山月随人归。", "却顾所来径，苍苍横翠微。", "相携及田家，童稚开荆扉。", "绿竹入幽径，青萝拂行衣。", "欢言得所憩(qì)，美酒聊共挥。", "长歌吟松风，曲尽河星稀。", "我醉君复乐，陶然共忘机。"], "img": false}, {"i": 245, "t": "月下独酌·其一", "d": "", "a": "", "l": ["李白〔唐代〕", "花间一壶酒，独酌无相亲。", "举杯邀明月，对影成三人。", "月既不解饮，影徒随我身。", "暂伴月将影，行乐须及春。", "我歌月徘徊，我舞影零乱。", "醒时同交欢，醉后各分散。", "永结无情游，相期邈云汉。"], "img": false}, {"i": 246, "t": "春思", "d": "", "a": "", "l": ["李白〔唐代〕", "燕草如碧丝，秦桑低绿枝。", "当君怀归日，是妾断肠时。", "春风不相识，何事入罗帏。"], "img": false}, {"i": 247, "t": "梦李白二首·死别", "d": "", "a": "", "l": ["杜甫〔唐代〕", "死别已吞声，生别常恻恻。", "江南瘴疠地，逐客无消息。", "故人入我梦，明我长相忆。", "君今在罗网，何以有羽翼？", "恐非平生魂，路远不可测。", "魂来枫林青，魂返关塞黑。", "落月满屋梁，犹疑照颜色。", "水深波浪阔，无使蛟龙得。"], "img": false}, {"i": 248, "t": "梦李白二首·其二", "d": "", "a": "", "l": ["杜甫〔唐代〕", "浮云终日行，游子久不至。", "三夜频梦君，情亲见君意。", "告归常局促，苦道来不易。", "江湖多风波，舟楫恐失坠。", "出门搔白首，若负平生志。", "冠盖满京华，斯人独憔悴。", "孰云网恢恢，将老身反累。", "千秋万岁名，寂寞身后事。"], "img": false}, {"i": 249, "t": "赠卫八处士", "d": "", "a": "", "l": ["杜甫〔唐代〕", "人生不相见，动如参与商。", "今夕复何夕，共此灯烛光。", "少壮能几时，鬓发各已苍。", "访旧半为鬼，惊呼热中肠。", "焉知二十载，重上君子堂。", "昔别君未婚，儿女忽成行。", "怡然敬父执，问我来何方。", "问答乃未已，驱儿罗酒浆。", "夜雨剪春韭，新炊间黄粱。", "主称会面难，一举累十觞。", "十觞亦不醉，感子故意长。", "明日隔山岳，世事两茫茫。"], "img": false}, {"i": 250, "t": "佳人", "d": "", "a": "", "l": ["杜甫〔唐代〕", "绝代有佳人，幽居在空谷。", "自云良家子，零落依草木。", "关中昔丧乱，兄弟遭杀戮。", "官高何足论，不得收骨肉。", "世情恶衰歇，万事随转烛。", "夫婿轻薄儿，新人美如玉。", "合昏尚知时，鸳鸯不独宿。", "但见新人笑，那闻旧人哭。", "在山泉水清，出山泉水浊。", "侍婢卖珠回，牵萝补茅屋。", "摘花不插发，采柏动盈掬。", "天寒翠袖薄，日暮倚修竹。"], "img": false}, {"i": 251, "t": "秋登兰山寄张五", "d": "", "a": "", "l": ["孟浩然〔唐代〕", "北山白云里，隐者自怡悦。", "相望试登高，心随雁飞灭。", "愁因薄暮起，兴是清秋发。", "时见归村人，沙行渡头歇。", "天边树若荠，江畔洲如月。", "何当载酒来，共醉重阳节。"], "img": false}, {"i": 252, "t": "夏日南亭怀辛大", "d": "", "a": "", "l": ["孟浩然〔唐代〕", "山光忽西落，池月渐东上。", "散发乘夕凉，开轩卧闲敞。", "荷风送香气，竹露滴清响。", "欲取鸣琴弹，恨无知音赏。", "感此怀故人，终宵劳梦想。"], "img": false}, {"i": 253, "t": "宿业师山房期丁大不至", "d": "", "a": "", "l": ["孟浩然〔唐代〕", "夕阳度西岭，群壑倏已暝。", "松月生夜凉，风泉满清听。", "樵人归欲尽，烟鸟栖初定。", "之子期宿来，孤琴候萝径。"], "img": false}, {"i": 254, "t": "寻西山隐者不遇", "d": "", "a": "", "l": ["丘为〔唐代〕", "绝顶一茅茨，直上三十里。", "扣关无僮仆，窥室唯案几。", "若非巾柴车，应是钓秋水。", "差池不相见，黾勉空仰止。", "草色新雨中，松声晚窗里。", "及兹契幽绝，自足荡心耳。", "虽无宾主意，颇得清净理。", "兴尽方下山，何必待之子。"], "img": false}, {"i": 255, "t": "晨诣超师院读禅经", "d": "", "a": "", "l": ["柳宗元〔唐代〕", "汲井漱寒齿，清心拂尘服。", "闲持贝叶书，步出东斋读。", "真源了无取，妄迹世所逐。", "遗言冀可冥，缮性何由熟。", "道人庭宇静，苔色连深竹。", "日出雾露馀，青松如膏沐。", "澹然离言说，悟悦心自足。"], "img": false}, {"i": 256, "t": "溪居", "d": "", "a": "", "l": ["柳宗元〔唐代〕", "久为簪组累，幸此南夷谪。", "闲依农圃邻，偶似山林客。", "晓耕翻露草，夜榜响溪石。", "来往不逢人，长歌楚天碧。"], "img": false}, {"i": 257, "t": "送杨氏女", "d": "", "a": "", "l": ["韦应物〔唐代〕", "永日方戚戚，出行复悠悠。", "女子今有行，大江溯轻舟。", "尔辈苦无恃，抚念益慈柔。", "幼为长所育，两别泣不休。", "对此结中肠，义往难复留。", "自小阙内训，事姑贻我忧。", "赖兹托令门，任恤庶无尤。", "贫俭诚所尚，资从岂待周。", "孝恭遵妇道，容止顺其猷。", "别离在今晨，见尔当何秋。", "居闲始自遣，临感忽难收。", "归来视幼女，零泪缘缨流。"], "img": false}, {"i": 258, "t": "长安遇冯著", "d": "", "a": "", "l": ["韦应物〔唐代〕", "客从东方来，衣上灞陵雨。", "问客何为来，采山因买斧。", "冥冥花正开，飏飏燕新乳。", "昨别今已春，鬓丝生几缕。"], "img": false}, {"i": 259, "t": "夕次盱眙（xū yí）县", "d": "", "a": "", "l": ["韦应物〔唐代〕", "落帆逗淮镇，停舫临孤驿。", "浩浩风起波，冥冥日沉夕。", "人归山郭暗，雁下芦洲白。", "独夜忆秦关，听钟未眠客。"], "img": false}, {"i": 260, "t": "东郊", "d": "", "a": "", "l": ["韦应物〔唐代〕", "吏舍跼终年，出郊旷清曙。", "杨柳散和风，青山澹吾虑。", "依丛适自憩，缘涧还复去。", "微雨霭芳原，春鸠鸣何处。", "乐幽心屡止，遵事迹犹遽。", "终罢斯结庐，慕陶直可庶。"], "img": false}, {"i": 261, "t": "郡斋雨中与诸文士燕集", "d": "", "a": "", "l": ["韦应物〔唐代〕", "兵卫森画戟，宴寝凝清香。", "海上风雨至，逍遥池阁凉。", "烦疴近消散，嘉宾复满堂。", "自惭居处崇，未睹斯民康。", "理会是非遣，性达形迹忘。", "鲜肥属时禁，蔬果幸见尝。", "俯饮一杯酒，仰聆金玉章。", "神欢体自轻，意欲凌风翔。", "吴中盛文史，群彦今汪洋。", "方知大藩地，岂曰财赋疆。"], "img": false}, {"i": 262, "t": "初发扬子寄元大校书", "d": "", "a": "", "l": ["韦应物〔唐代〕", "凄凄去亲爱，泛泛入烟雾。", "归棹洛阳人，残钟广陵树。", "今朝此为别，何处还相遇。", "世事波上舟，沿洄安得住。"], "img": false}, {"i": 263, "t": "寄全椒山中道士", "d": "", "a": "", "l": ["韦应物〔唐代〕", "今朝郡斋冷，忽念山中客。", "涧底束荆薪，归来煮白石。", "欲持一瓢酒，远慰风雨夕。", "落叶满空山，何处寻行迹。"], "img": false}, {"i": 264, "t": "宿王昌龄隐居", "d": "", "a": "", "l": ["常建〔唐代〕", "清溪深不测，隐处唯孤云。", "松际露微月，清光犹为君。", "茅亭宿花影，药院滋苔纹。", "余亦谢时去，西山鸾鹤群。"], "img": false}, {"i": 265, "t": "感遇十二首·孤鸿", "d": "", "a": "", "l": ["张九龄〔唐代〕", "孤鸿海上来，池潢不敢顾。", "侧见双翠鸟，巢在三珠树。", "矫矫珍木巅，得无金丸惧？", "美服患人指，高明逼神恶。", "今我游冥冥，弋者何所慕！"], "img": false}, {"i": 266, "t": "感遇十二首·兰叶", "d": "", "a": "", "l": ["张九龄〔唐代〕", "兰叶春葳蕤，桂华秋皎洁。", "欣欣此生意，自尔为佳节。", "谁知林栖者，闻风坐相悦。", "草木有本心，何求美人折！"], "img": false}, {"i": 267, "t": "感遇十二首·幽人", "d": "", "a": "", "l": ["张九龄〔唐代〕", "幽人归独卧，滞虑洗孤清。", "持此谢高鸟，因之传远情。", "日夕怀空意，人谁感至精？", "飞沉理自隔，何所慰吾诚？"], "img": false}, {"i": 268, "t": "感遇十二首·江南", "d": "", "a": "", "l": ["张九龄〔唐代〕", "江南有丹橘，经冬犹绿林。", "岂伊地气暖？自有岁寒心。", "可以荐嘉客，奈何阻重深。", "运命惟所遇，循环不可寻。", "徒言树桃李，此木岂无阴？"], "img": false}, {"i": 269, "t": "春泛若耶溪", "d": "", "a": "", "l": ["綦毋潜〔唐代〕", "幽意无断绝，此去随所偶。", "晚风吹行舟，花路入溪口。", "际夜转西壑，隔山望南斗。", "潭烟飞溶溶，林月低向后。", "生事且弥漫，愿为持竿叟。"], "img": false}, {"i": 270, "t": "石鱼湖上醉歌", "d": "", "a": "", "l": ["元结〔唐代〕", "漫叟以公田米酿酒，因休暇，则载酒于湖上，时取一醉。欢醉中，据湖岸，引臂向鱼取酒，使舫载之，遍饮坐者。意疑倚巴丘酌于君山之上，诸子环洞庭而坐，酒舫泛泛然触波涛。而往来者，乃作歌以长之。", "石鱼湖，似洞庭，夏水欲满君山青。", "山为樽，水为沼，酒徒历历坐洲岛。", "长风连日作大浪，不能废人运酒舫。", "我持长瓢坐巴丘，酌饮四坐以散愁。舫(fǎng)"], "img": false}, {"i": 271, "t": "长恨歌", "d": "", "a": "", "l": ["白居易〔唐代〕", "汉皇重色思倾国，御宇多年求不得。", "杨家有女初长成，养在深闺人未识。", "天生丽质难自弃，一朝选在君王侧。", "回眸一笑百媚生，六宫粉黛无颜色。", "春寒赐浴华清池，温泉水滑洗凝脂。", "侍儿扶起娇无力，始是新承恩泽时。", "云鬓花颜金步摇，芙蓉帐暖度春宵。", "春宵苦短日高起，从此君王不早朝。", "承欢侍宴无闲暇，春从春游夜专夜。", "后宫佳丽三千人，三千宠爱在一身。", "金屋妆成娇侍夜，玉楼宴罢醉和春。", "姊妹弟兄皆列土，可怜光彩生门户。", "遂令天下父母心，不重生男重生女。", "骊宫高处入青云，仙乐风飘处处闻。", "缓歌慢舞凝丝竹，尽日君王看不足。", "渔阳鼙鼓动地来，惊破霓裳羽衣曲。", "九重城阙烟尘生，千乘万骑西南行。", "翠华摇摇行复止，西出都门百余里。", "六军不发无奈何，宛转蛾眉马前死。", "花钿委地无人收，翠翘金雀玉搔头。", "君王掩面救不得，回看血泪相和流。", "黄埃散漫风萧索，云栈萦纡登剑阁。", "峨嵋山下少人行，旌旗无光日色薄。", "蜀江水碧蜀山青，圣主朝朝暮暮情。", "行宫见月伤心色，夜雨闻铃肠断声。", "天旋地转回龙驭，到此踌躇不能去。(地转 一作：日转)", "马嵬坡下泥土中，不见玉颜空死处。", "君臣相顾尽沾衣，东望都门信马归。", "归来池苑皆依旧，太液芙蓉未央柳。", "芙蓉如面柳如眉，对此如何不泪垂？", "春风桃李花开日，秋雨梧桐叶落时。", "西宫南内多秋草，落叶满阶红不扫。(南内 一作：南苑)", "梨园弟子白发新，椒房阿监青娥老。", "夕殿萤飞思悄然，孤灯挑尽未成眠。", "迟迟钟鼓初长夜，耿耿星河欲曙天。", "鸳鸯瓦冷霜华重，翡翠衾寒谁与共？", "悠悠生死别经年，魂魄不曾来入梦。", "临邛道士鸿都客，能以精诚致魂魄。", "为感君王辗转思，遂教方士殷勤觅。", "排空驭气奔如电，升天入地求之遍。", "上穷碧落下黄泉，两处茫茫皆不见。", "忽闻海上有仙山，山在虚无缥缈间。", "楼阁玲珑五云起，其中绰约多仙子。", "中有一人字太真，雪肤花貌参差是。", "金阙西厢叩玉扃，转教小玉报双成。", "闻道汉家天子使，九华帐里梦魂惊。", "揽衣推枕起徘徊，珠箔银屏迤逦开。", "云鬓半偏新睡觉，花冠不整下堂来。(云鬓 一作：云髻)", "风吹仙袂飘飖举，犹似霓裳羽衣舞。(飘飖 一作：飘飘)", "玉容寂寞泪阑干，梨花一枝春带雨。(阑 通：栏)", "含情凝睇谢君王，一别音容两渺茫。", "昭阳殿里恩爱绝，蓬莱宫中日月长。", "回头下望人寰处，不见长安见尘雾。", "惟将旧物表深情，钿合金钗寄将去。", "钗留一股合一扇，钗擘黄金合分钿。", "但令心似金钿坚，天上人间会相见。(但令 一作：但教)", "临别殷勤重寄词，词中有誓两心知。", "七月七日长生殿，夜半无人私语时。", "在天愿作比翼鸟，在地愿为连理枝。", "天长地久有时尽，此恨绵绵无绝期。"], "img": false}, {"i": 272, "t": "琵琶行", "d": "", "a": "", "l": ["元和十年，予左迁九江郡司马。明年秋，送客湓浦口，闻舟中夜弹琵琶者，听其音，铮铮然有京都声。问其人，本长安倡女，尝学琵琶于穆、曹二善才，年长色衰，委身为贾人妇。遂命酒，使快弹数曲。曲罢悯然，自叙少小时欢乐事，今漂沦憔悴，转徙于江湖间。予出官二年，恬然自安，感斯人言，是夕始觉有迁谪意。因为长句，歌以赠之，凡六百一十六言，命曰《琵琶行》。", "浔阳江头夜送客，枫叶荻花秋瑟瑟。", "主人下马客在船，举酒欲饮无管弦。", "醉不成欢惨将别，别时茫茫江浸月。", "忽闻水上琵琶声，主人忘归客不发。", "寻声暗问弹者谁，琵琶声停欲语迟。", "移船相近邀相见，添酒回灯重开宴。", "千呼万唤始出来，犹抱琵琶半遮面。", "转轴拨弦三两声，未成曲调先有情。", "弦弦掩抑声声思，似诉平生不得志。", "低眉信手续续弹，说尽心中无限事。", "轻拢慢捻抹复挑，初为《霓裳》后《六幺》。(六幺 一作：绿腰)", "大弦嘈嘈如急雨，小弦切切如私语。", "嘈嘈切切错杂弹，大珠小珠落玉盘。", "间关莺语花底滑，幽咽泉流冰下难。", "冰泉冷涩弦凝绝，凝绝不通声暂歇。(暂歇 一作：渐歇)", "别有幽愁暗恨生，此时无声胜有声。", "银瓶乍破水浆迸，铁骑突出刀枪鸣。", "曲终收拨当心画，四弦一声如裂帛。", "东船西舫悄无言，唯见江心秋月白。", "沉吟放拨插弦中，整顿衣裳起敛容。", "自言本是京城女，家在虾蟆陵下住。", "十三学得琵琶成，名属教坊第一部。", "曲罢曾教善才服，妆成每被秋娘妒。(服 一作：伏)", "五陵年少争缠头，一曲红绡不知数。", "钿头银篦击节碎，血色罗裙翻酒污。(银篦 一作：云篦)", "今年欢笑复明年，秋月春风等闲度。", "弟走从军阿姨死，暮去朝来颜色故。", "门前冷落鞍马稀，老大嫁作商人妇。", "商人重利轻别离，前月浮梁买茶去。", "去来江口守空船，绕船月明江水寒。", "夜深忽梦少年事，梦啼妆泪红阑干。", "我闻琵琶已叹息，又闻此语重唧唧。", "同是天涯沦落人，相逢何必曾相识！", "我从去年辞帝京，谪居卧病浔阳城。", "浔阳地僻无音乐，终岁不闻丝竹声。", "住近湓江地低湿，黄芦苦竹绕宅生。", "其间旦暮闻何物？杜鹃啼血猿哀鸣。", "春江花朝秋月夜，往往取酒还独倾。", "岂无山歌与村笛，呕哑嘲哳难为听。", "今夜闻君琵琶语，如听仙乐耳暂明。", "莫辞更坐弹一曲，为君翻作《琵琶行》。", "感我此言良久立，却坐促弦弦转急。", "凄凄不似向前声，满座重闻皆掩泣。", "座中泣下谁最多？江州司马青衫湿。"], "img": false}, {"i": 273, "t": "走马川行奉送封大夫出师西征", "d": "", "a": "", "l": ["岑参〔唐代〕", "君不见走马川行雪海边，平沙莽莽黄入天。", "轮台九月风夜吼，一川碎石大如斗，随风满地石乱走。", "匈奴草黄马正肥，金山西见烟尘飞，汉家大将西出师。", "将军金甲夜不脱，半夜军行戈相拨，风头如刀面如割。", "马毛带雪汗气蒸，五花连钱旋作冰，幕中草檄砚水凝。", "虏骑闻之应胆慑，料知短兵不敢接，车师西门伫献捷。"], "img": false}, {"i": 274, "t": "轮台歌奉送封大夫出师西征", "d": "", "a": "", "l": ["岑参〔唐代〕", "轮台城头夜吹角，轮台城北旄头落。", "羽书昨夜过渠黎，单于已在金山西。", "戍楼西望烟尘黑，汉军屯在轮台北。", "上将拥旄西出征，平明吹笛大军行。", "四边伐鼓雪海涌，三军大呼阴山动。", "虏塞兵气连云屯，战场白骨缠草根。", "剑河风急雪片阔，沙口石冻马蹄脱。", "亚相勤王甘苦辛，誓将报主静边尘。", "古来青史谁不见，今见功名胜古人。"], "img": false}, {"i": 275, "t": "白雪歌送武判官归京", "d": "", "a": "", "l": ["岑参〔唐代〕", "北风卷地白草折，胡天八月即飞雪。", "忽如一夜春风来，千树万树梨花开。", "散入珠帘湿罗幕，狐裘不暖锦衾薄。", "将军角弓不得控，都护铁衣冷难着。", "瀚海阑干百丈冰，愁云惨淡万里凝。", "中军置酒饮归客，胡琴琵琶与羌笛。", "纷纷暮雪下辕门，风掣红旗冻不翻。", "轮台东门送君去，去时雪满天山路。", "山回路转不见君，雪上空留马行处。"], "img": false}, {"i": 276, "t": "宣州谢朓楼饯别校书叔云", "d": "", "a": "", "l": ["李白〔唐代〕", "弃我去者，昨日之日不可留；", "乱我心者，今日之日多烦忧。", "长风万里送秋雁，对此可以酣高楼。", "蓬莱文章建安骨，中间小谢又清发。", "俱怀逸兴壮思飞，欲上青天揽明月。", "抽刀断水水更流，举杯消愁愁更愁。", "人生在世不称意，明朝散发弄扁舟。"], "img": false}, {"i": 277, "t": "庐山谣寄卢侍御虚舟", "d": "", "a": "", "l": ["李白〔唐代〕", "我本楚狂人，凤歌笑孔丘。", "手持绿玉杖，朝别黄鹤楼。", "五岳寻仙不辞远，一生好入名山游。", "庐山秀出南斗傍，屏风九叠云锦张，影落明湖青黛光。", "金阙前开二峰长，银河倒挂三石梁。", "香炉瀑布遥相望，回崖沓嶂凌苍苍。", "翠影红霞映朝日，鸟飞不到吴天长。", "登高壮观天地间，大江茫茫去不还。", "黄云万里动风色，白波九道流雪山。", "好为庐山谣，兴因庐山发。", "闲窥石镜清我心，谢公行处苍苔没。", "早服还丹无世情，琴心三叠道初成。", "遥见仙人彩云里，手把芙蓉朝玉京。", "先期汗漫九垓上，愿接卢敖游太清。"], "img": false}, {"i": 278, "t": "梦游天姥吟留别", "d": "", "a": "", "l": ["李白〔唐代〕", "海客谈瀛洲，烟涛微茫信难求；", "越人语天姥，云霞明灭或可睹。", "天姥连天向天横，势拔五岳掩赤城。", "天台四万八千丈，对此欲倒东南倾。", "我欲因之梦吴越，一夜飞度镜湖月。", "湖月照我影，送我至剡溪。", "谢公宿处今尚在，渌水荡漾清猿啼。", "脚著谢公屐，身登青云梯。", "半壁见海日，空中闻天鸡。", "千岩万转路不定，迷花倚石忽已暝。", "熊咆龙吟殷岩泉，栗深林兮惊层巅。", "云青青兮欲雨，水澹澹兮生烟。", "列缺霹雳，丘峦崩摧。", "洞天石扉，訇然中开。", "青冥浩荡不见底，日月照耀金银台。", "霓为衣兮风为马，云之君兮纷纷而来下。", "虎鼓瑟兮鸾回车，仙之人兮列如麻。", "忽魂悸以魄动，恍惊起而长嗟。", "惟觉时之枕席，失向来之烟霞。", "世间行乐亦如此，古来万事东流水。", "别君去兮何时还？且放白鹿青崖间，须行即骑访名山。", "安能摧眉折腰事权贵，使我不得开心颜！"], "img": false}, {"i": 279, "t": "金陵酒肆留别", "d": "", "a": "", "l": ["李白〔唐代〕", "风吹柳花满店香，吴姬压酒劝客尝。(劝客 一作：唤客)", "金陵子弟来相送，欲行不行各尽觞。", "请君试问东流水，别意与之谁短长？"], "img": false}, {"i": 280, "t": "韩碑", "d": "", "a": "", "l": ["李商隐〔唐代〕", "元和天子神武姿，彼何人哉轩与羲。", "誓将上雪列圣耻，坐法宫中朝四夷。", "淮西有贼五十载，封狼生貙貙生罴。", "不据山河据平地，长戈利矛日可麾。", "帝得圣相相曰度，贼斫不死神扶持。", "腰悬相印作都统，阴风惨澹天王旗。", "愬武古通作牙爪，仪曹外郎载笔随。", "行军司马智且勇，十四万众犹虎貔。", "入蔡缚贼献太庙，功无与让恩不訾。", "帝曰汝度功第一，汝从事愈宜为辞。", "愈拜稽首蹈且舞，金石刻画臣能为。", "古者世称大手笔，此事不系于职司。", "当仁自古有不让，言讫屡颔天子颐。", "公退斋戒坐小阁，濡染大笔何淋漓。", "点窜《尧典》《舜典》字，涂改《清庙》《生民》诗。", "文成破体书在纸，清晨再拜铺丹墀。", "表曰臣愈昧死上，咏神圣功书之碑。", "碑高三丈字如斗，负以灵鳌蟠以螭。", "句奇语重喻者少，谗之天子言其私。", "长绳百尺拽碑倒，粗砂大石相磨治。", "公之斯文若元气，先时已入人肝脾。", "汤盘孔鼎有述作，今无其器存其辞。", "呜呼圣王及圣相，相与烜赫流淳熙。", "公之斯文不示后，曷与三五相攀追。", "愿书万本诵万遍，口角流沫右手胝。", "传之七十有二代，以为封禅玉检明堂基。"], "img": false}, {"i": 281, "t": "听董大弹胡笳声兼寄语弄房给事", "d": "", "a": "", "l": ["李颀〔唐代〕", "蔡女昔造胡笳声，一弹一十有八拍。", "胡人落泪沾边草，汉使断肠对归客。", "古戍苍苍烽火寒，大荒沉沉飞雪白。", "先拂商弦后角羽，四郊秋叶惊摵摵。", "董夫子，通神明，深山窃听来妖精。", "言迟更速皆应手，将往复旋如有情。", "空山百鸟散还合，万里浮云阴且晴。", "嘶酸雏雁失群夜，断绝胡儿恋母声。", "川为静其波，鸟亦罢其鸣。", "乌孙部落家乡远，逻娑沙尘哀怨生。", "幽音变调忽飘洒，长风吹林雨堕瓦。", "迸泉飒飒飞木末，野鹿呦呦走堂下。", "长安城连东掖垣，凤凰池对青琐门。", "高才脱略名与利，日夕望君抱琴至。"], "img": false}, {"i": 282, "t": "听安万善吹觱篥歌", "d": "", "a": "", "l": ["李颀〔唐代〕", "南山截竹为觱篥，此乐本自龟兹出。", "流传汉地曲转奇，凉州胡人为我吹。", "傍邻闻者多叹息，远客思乡皆泪垂。", "世人解听不解赏，长飙风中自来往。", "枯桑老柏寒飕飗，九雏鸣凤乱啾啾。", "龙吟虎啸一时发，万籁百泉相与秋。", "忽然更作渔阳掺，黄云萧条白日暗。", "变调如闻杨柳春，上林繁花照眼新。", "岁夜高堂列明烛，美酒一杯声一曲。"], "img": false}, {"i": 283, "t": "古意", "d": "", "a": "", "l": ["李颀〔唐代〕", "男儿事长征，少小幽燕客。", "赌胜马蹄下，由来轻七尺。", "杀人莫敢前，须如猬毛磔。", "黄云陇底白云飞，未得报恩不得归。", "辽东小妇年十五，惯弹琵琶解歌舞。", "今为羌笛出塞声，使我三军泪如雨。"], "img": false}, {"i": 284, "t": "送陈章甫", "d": "", "a": "", "l": ["李颀〔唐代〕", "四月南风大麦黄，枣花未落桐阴长。", "青山朝别暮还见，嘶马出门思旧乡。", "陈侯立身何坦荡，虬须虎眉仍大颡。", "腹中贮书一万卷，不肯低头在草莽。", "东门酤酒饮我曹，心轻万事如鸿毛。", "醉卧不知白日暮，有时空望孤云高。", "长河浪头连天黑，津口停舟渡不得。", "郑国游人未及家，洛阳行子空叹息。", "闻道故林相识多，罢官昨日今如何。"], "img": false}, {"i": 285, "t": "琴歌", "d": "", "a": "", "l": ["李颀〔唐代〕", "主人有酒欢今夕，请奏鸣琴广陵客。", "月照城头乌半飞，霜凄万树风入衣。", "铜炉华烛烛增辉，初弹渌水后楚妃。", "一声已动物皆静，四座无言星欲稀。", "清淮奉使千余里，敢告云山从此始。"], "img": false}, {"i": 286, "t": "古柏行", "d": "", "a": "", "l": ["杜甫〔唐代〕", "孔明庙前有老柏，柯如青铜根如石。", "霜皮溜雨四十围，黛色参天二千尺。", "君臣已与时际会，树木犹为人爱惜。", "云来气接巫峡长，月出寒通雪山白。", "忆昨路绕锦亭东，先主武侯同閟宫。", "崔嵬枝干郊原古，窈窕丹青户牖空。", "落落盘踞虽得地，冥冥孤高多烈风。", "扶持自是神明力，正直原因造化工。", "大厦如倾要梁栋，万牛回首丘山重。", "不露文章世已惊，未辞翦伐谁能送？", "苦心岂免容蝼蚁，香叶终经宿鸾凤。", "志士幽人莫怨嗟：古来材大难为用。"], "img": false}, {"i": 287, "t": "观公孙大娘弟子舞剑器行", "d": "", "a": "", "l": ["杜甫〔唐代〕大历二年十月十九日，夔夔(kuí)府别驾元持宅，见临颍yǐng李十二娘舞剑器，壮其蔚跂(qí)，问其所师，曰：“余公孙大娘弟子也。” 开元五载，余尚童稚，记于郾(yǎn)城观公孙氏，舞剑器浑脱，浏漓顿挫，独出冠时，自高头宜春梨园二伎坊内人洎外供奉舞女，晓是舞者，圣文神武皇帝初，公孙一人而已。玉貌锦衣，况余白首，今兹弟子，亦非盛颜。既辨其由来，知波澜莫二，抚事慷慨，聊为《剑器行》。昔者吴人张旭，善草书帖，数(shuò)常于邺(yè)县见公孙大娘舞西河剑器，自此草书长进，豪荡感激，即公孙可知矣。", "昔有佳人公孙氏，一舞剑器动四方。", "观者如山色沮丧，天地为之久低昂。", "㸌如羿射九日落，矫如群帝骖龙翔。", "来如雷霆收震怒，罢如江海凝清光。", "绛唇珠袖两寂寞，晚有弟子传芬芳。", "临颍美人在白帝，妙舞此曲神扬扬。", "与余问答既有以，感时抚事增惋伤。", "先帝侍女八千人，公孙剑器初第一。", "五十年间似反掌，风尘澒洞昏王室。", "梨园弟子散如烟，女乐余姿映寒日。", "金粟堆前木已拱，瞿唐石城草萧瑟。", "玳筵急管曲复终，乐极哀来月东出。", "老夫不知其所往，足茧荒山转愁疾。"], "img": false}, {"i": 288, "t": "韦讽录事宅观曹将军画马图", "d": "", "a": "", "l": ["杜甫〔唐代〕", "国初已来画鞍马，神妙独数江都王。", "将军得名三十载，人间又见真乘黄。", "曾貌先帝照夜白，龙池十日飞霹雳。", "内府殷红玛瑙盘，婕妤传诏才人索。", "盘赐将军拜舞归，轻纨细绮相追飞。", "贵戚权门得笔迹，始觉屏障生光辉。", "昔日太宗拳毛騧，近时郭家狮子花。", "今之新图有二马，复令识者久叹嗟。", "此皆骑战一敌万，缟素漠漠开风沙。", "其余七匹亦殊绝，迥若寒空动烟雪。", "霜蹄蹴踏长楸间，马官厮养森成列。", "可怜九马争神骏，顾视清高气深稳。", "借问苦心爱者谁，后有韦讽前支遁。", "忆昔巡幸新丰宫，翠华拂天来向东。", "腾骧磊落三万匹，皆与此图筋骨同。", "自从献宝朝河宗，无复射蛟江水中。", "君不见金粟堆前松柏里，龙媒去尽鸟呼风。"], "img": false}, {"i": 289, "t": "丹青引赠曹将军霸", "d": "", "a": "", "l": ["杜甫〔唐代〕", "将军魏武之子孙，于今为庶为清门。", "英雄割据虽已矣，文采风流今尚存。", "学书初学卫夫人，但恨无过王右军。", "丹青不知老将至，富贵于我如浮云。", "开元之中常引见，承恩数上南薰殿。", "凌烟功臣少颜色，将军下笔开生面。", "良相头上进贤冠，猛将腰间大羽箭。", "褒公鄂公毛发动，英姿飒爽来酣战。", "先帝天马玉花骢，画工如山貌不同。", "是日牵来赤墀下，迥立阊阖生长风。", "诏谓将军拂绢素，意匠惨澹经营中。", "斯须九重真龙出，一洗万古凡马空。", "玉花却在御榻上，榻上庭前屹相向。", "至尊含笑催赐金，圉人太仆皆惆怅。", "弟子韩干早入室，亦能画马穷殊相。", "干惟画肉不画骨，忍使骅骝气凋丧。", "将军画善盖有神，必逢佳士亦写真。", "即今漂泊干戈际，屡貌寻常行路人。", "途穷反遭俗眼白，世上未有如公贫。", "但看古来盛名下，终日坎壈缠其身。"], "img": false}, {"i": 290, "t": "寄韩谏议注", "d": "", "a": "", "l": ["杜甫〔唐代〕", "今我不乐思岳阳，身欲奋飞病在床。", "美人娟娟隔秋水，濯足洞庭望八荒。", "鸿飞冥冥日月白，青枫叶赤天雨霜。", "玉京群帝集北斗，或骑麒麟翳凤凰。", "芙蓉旌旗烟雾落，影动倒景摇潇湘。", "星宫之君醉琼浆，羽人稀少不在旁。", "似闻昨者赤松子，恐是汉代韩张良。", "昔随刘氏定长安，帷幄未改神惨伤。", "国家成败吾岂敢，色难腥腐餐枫香。", "周南留滞古所惜，南极老人应寿昌。", "美人胡为隔秋水，焉得置之贡玉堂。"], "img": false}, {"i": 291, "t": "夜归鹿门山歌", "d": "", "a": "", "l": ["孟浩然〔唐代〕", "山寺钟鸣昼已昏，渔梁渡头争渡喧。", "人随沙岸向江村，余亦乘舟归鹿门。", "鹿门月照开烟树，忽到庞公栖隐处。", "岩扉松径长寂寥，惟有幽人自来去。"], "img": false}, {"i": 292, "t": "渔翁", "d": "", "a": "", "l": ["柳宗元〔唐代〕", "渔翁夜傍西岩宿，晓汲清湘燃楚竹。", "烟销日出不见人，欸乃一声山水绿。", "回看天际下中流，岩上无心云相逐。"], "img": false}, {"i": 293, "t": "登幽州台歌", "d": "", "a": "", "l": ["陈子昂〔唐代〕", "前不见古人，后不见来者。", "念天地之悠悠，独怆(chuàng)然而涕下！"], "img": false}, {"i": 294, "t": "石鼓歌", "d": "", "a": "", "l": ["韩愈〔唐代〕", "张生手持石鼓文，劝我试作石鼓歌。", "少陵无人谪仙死，才薄将奈石鼓何。", "周纲凌迟四海沸，宣王愤起挥天戈。", "大开明堂受朝贺，诸侯剑佩鸣相磨。", "蒐于岐阳骋雄俊，万里禽兽皆遮罗。", "镌功勒成告万世，凿石作鼓隳嵯峨。", "从臣才艺咸第一，拣选撰刻留山阿。", "雨淋日炙野火燎，鬼物守护烦撝呵。", "公从何处得纸本，毫发尽备无差讹。", "辞严义密读难晓，字体不类隶与蝌。", "年深岂免有缺画，快剑斫断生蛟鼍。", "鸾翔凤翥众仙下，珊瑚碧树交枝柯。", "金绳铁索锁钮壮，古鼎跃水龙腾梭。", "陋儒编诗不收入，二雅褊迫无委蛇。", "孔子西行不到秦，掎摭星宿遗羲娥。", "嗟余好古生苦晚，对此涕泪双滂沱。", "忆昔初蒙博士征，其年始改称元和。", "故人从军在右辅，为我度量掘臼科。", "濯冠沐浴告祭酒，如此至宝存岂多。", "毡包席裹可立致，十鼓只载数骆驼。", "荐诸太庙比郜鼎，光价岂止百倍过。", "圣恩若许留太学，诸生讲解得切磋。", "观经鸿都尚填咽，坐见举国来奔波。", "剜苔剔藓露节角，安置妥帖平不颇。", "大厦深檐与盖覆，经历久远期无佗。", "中朝大官老于事，讵肯感激徒媕婀。", "牧童敲火牛砺角，谁复著手为摩挲。", "日销月铄就埋没，六年西顾空吟哦。", "羲之俗书趁姿媚，数纸尚可博白鹅。", "继周八代争战罢，无人收拾理则那。", "方今太平日无事，柄任儒术崇丘轲。", "安能以此尚论列，愿借辩口如悬河。", "石鼓之歌止于此，呜呼吾意其蹉跎。"], "img": false}, {"i": 295, "t": "山石", "d": "", "a": "", "l": ["韩愈〔唐代〕", "山石荦确行径微，黄昏到寺蝙蝠飞。", "升堂坐阶新雨足，芭蕉叶大栀子肥。", "僧言古壁佛画好，以火来照所见稀。", "铺床拂席置羹饭，疏粝亦足饱我饥。", "夜深静卧百虫绝，清月出岭光入扉。", "天明独去无道路，出入高下穷烟霏。", "山红涧碧纷烂漫，时见松枥皆十围。", "当流赤足踏涧石，水声激激风吹衣。", "人生如此自可乐，岂必局束为人鞿？", "嗟哉吾党二三子，安得至老不更归。"], "img": false}, {"i": 296, "t": "八月十五夜赠张功曹", "d": "", "a": "", "l": ["韩愈〔唐代〕", "纤云四卷天无河，清风吹空月舒波。", "沙平水息声影绝，一杯相属君当歌。", "君歌声酸辞且苦，不能听终泪如雨。", "洞庭连天九疑高，蛟龙出没猩鼯号。", "十生九死到官所，幽居默默如藏逃。", "下床畏蛇食畏药，海气湿蛰熏腥臊。", "昨者州前捶大鼓，嗣皇继圣登夔皋。", "赦书一日行万里，罪从大辟皆除死。", "迁者追回流者还，涤瑕荡垢清朝班。", "州家申名使家抑，坎轲只得移荆蛮。", "判司卑官不堪说，未免捶楚尘埃间。", "同时辈流多上道，天路幽险难追攀。", "君歌且休听我歌，我歌今与君殊科。", "一年明月今宵多，人生由命非由他。", "有酒不饮奈明何。"], "img": false}, {"i": 297, "t": "谒衡岳庙遂宿岳寺题门楼", "d": "", "a": "", "l": ["韩愈〔唐代〕", "五岳祭秩皆三公，四方环镇嵩当中。", "火维地荒足妖怪，天假神柄专其雄。", "喷云泄雾藏半腹，虽有绝顶谁能穷？", "我来正逢秋雨节，阴气晦昧无清风。", "潜心默祷若有应，岂非正直能感通！", "须臾静扫众峰出，仰见突兀撑青空。", "紫盖连延接天柱，石廪腾掷堆祝融。", "森然魄动下马拜，松柏一径趋灵宫。", "粉墙丹柱动光彩，鬼物图画填青红。", "升阶伛偻荐脯酒，欲以菲薄明其衷。", "庙令老人识神意，睢盱侦伺能鞠躬。", "手持杯珓导我掷，云此最吉余难同。", "窜逐蛮荒幸不死，衣食才足甘长终。", "侯王将相望久绝，神纵欲福难为功。", "夜投佛寺上高阁，星月掩映云曈昽。", "猿鸣钟动不知曙，杲杲寒日生于东。"], "img": false}, {"i": 298, "t": "凉州词二首·黄河", "d": "", "a": "", "l": ["王之涣〔唐代〕", "黄河远上白云间，一片孤城万仞山。", "羌笛何须怨杨柳，春风不度玉门关。"], "img": false}, {"i": 299, "t": "出塞", "d": "", "a": "", "l": ["王昌龄〔唐代〕", "秦时明月汉时关，万里长征人未还。", "但使龙城飞将在，不教胡马度阴山。"], "img": false}, {"i": 300, "t": "塞上曲·蝉鸣", "d": "", "a": "", "l": ["王昌龄〔唐代〕", "蝉鸣空桑林，八月萧关道。", "出塞入塞寒，处处黄芦草。", "从来幽并客，皆共尘沙老。", "莫学游侠儿，矜夸紫骝好。", "紫骝：紫红色的骏马。"], "img": false}, {"i": 301, "t": "塞下曲.饮马", "d": "", "a": "", "l": ["王昌龄〔唐代〕", "饮马渡秋水，水寒风似刀。", "平沙日未没，黯黯见临洮。", "昔日长城战，咸言意气高。", "黄尘足今古，白骨乱蓬蒿。"], "img": false}, {"i": 302, "t": "长信怨", "d": "", "a": "", "l": ["王昌龄〔唐代〕", "金井梧桐秋叶黄，珠帘不卷夜来霜。", "熏笼玉枕无颜色，卧听南宫清漏长。", "高殿秋砧响夜阑，霜深犹忆御衣寒。", "银灯青琐裁缝歇，还向金城明主看。", "奉帚平明金殿开，暂将团扇共徘徊。", "玉颜不及寒鸦色，犹带昭阳日影来。", "真成薄命久寻思，梦见君王觉后疑。", "火照西宫知夜饮，分明复道奉恩时。", "长信宫中秋月明，昭阳殿下捣衣声。", "白露堂中细草迹，红罗帐里不胜情。"], "img": false}, {"i": 303, "t": "送元二使安西", "d": "", "a": "", "l": ["王维〔唐代〕", "渭城朝雨浥轻尘，客舍青青柳色新。", "劝君更尽一杯酒，西出阳关无故人。"], "img": false}, {"i": 304, "t": "秋夜曲", "d": "", "a": "", "l": ["王维〔唐代〕", "桂魄初生秋露微，轻罗已薄未更衣。", "银筝夜久殷勤弄，心怯空房不忍归。", "桂魄：古代传说月中有桂，故为月的别称"], "img": false}, {"i": 305, "t": "洛阳女儿行", "d": "", "a": "", "l": ["王维〔唐代〕", "洛阳女儿对门居，才可颜容十五余。", "良人玉勒乘骢马，侍女金盘脍鲤鱼。", "画阁朱楼尽相望，红桃绿柳垂檐向。", "罗帷送上七香车，宝扇迎归九华帐。", "狂夫富贵在青春，意气骄奢剧季伦。", "自怜碧玉亲教舞，不惜珊瑚持与人。", "春窗曙灭九微火，九微片片飞花琐。", "戏罢曾无理曲时，妆成祗是熏香坐。", "城中相识尽繁华，日夜经过赵李家。", "谁怜越女颜如玉，贫贱江头自浣纱。"], "img": false}, {"i": 306, "t": "老将行", "d": "", "a": "", "l": ["王维〔唐代〕", "少年十五二十时，步行夺得胡马骑。", "射杀山中白额虎，肯数邺下黄须儿！", "一身转战三千里，一剑曾当百万师。", "汉兵奋迅如霹雳，虏骑崩腾畏蒺藜。", "卫青不败由天幸，李广无功缘数奇。", "自从弃置便衰朽，世事蹉跎成白首。", "昔时飞箭无全目，今日垂杨生左肘。", "路旁时卖故侯瓜，门前学种先生柳。", "苍茫古木连穷巷，寥落寒山对虚牖。", "誓令疏勒出飞泉，不似颍川空使酒。", "贺兰山下阵如云，羽檄交驰日夕闻。", "节使三河募年少，诏书五道出将军。", "试拂铁衣如雪色，聊持宝剑动星文。", "愿得燕弓射大将，耻令越甲鸣吾君。", "莫嫌旧日云中守，犹堪一战取功勋。"], "img": false}, {"i": 307, "t": "桃源行", "d": "", "a": "", "l": ["王维〔唐代〕", "渔舟逐水爱山春，两岸桃花夹古津。", "坐看红树不知远，行尽青溪不见人。", "山口潜行始隈隩，山开旷望旋平陆。", "遥看一处攒云树，近入千家散花竹。", "樵客初传汉姓名，居人未改秦衣服。", "居人共住武陵源，还从物外起田园。", "月明松下房栊静，日出云中鸡犬喧。", "惊闻俗客争来集，竞引还家问都邑。", "平明闾巷扫花开，薄暮渔樵乘水入。", "初因避地去人间，及至成仙遂不还。", "峡里谁知有人事，世中遥望空云山。", "不疑灵境难闻见，尘心未尽思乡县。", "出洞无论隔山水，辞家终拟长游衍。", "自谓经过旧不迷，安知峰壑今来变。", "当时只记入山深，青溪几度到云林。", "春来遍是桃花水，不辨仙源何处寻。"], "img": false}, {"i": 308, "t": "清平调·云想", "d": "", "a": "", "l": ["李白〔唐代〕", "云想衣裳花想容，春风拂槛露华浓。", "若非群玉山头见，会向瑶台月下逢。"], "img": false}, {"i": 309, "t": "清平调·一枝", "d": "", "a": "", "l": ["李白〔唐代〕", "一枝秾(nóng)艳露凝香，云雨巫山枉断肠。", "借问汉宫谁得似，可怜飞燕倚新妆。"], "img": false}, {"i": 310, "t": "清平调·名花", "d": "", "a": "", "l": ["李白〔唐代〕", "名花倾国两相欢，常得君王带笑看。", "解释春风无限恨，沉香亭北倚阑干。"], "img": false}, {"i": 311, "t": "行路难·金", "d": "", "a": "", "l": ["李白〔唐代〕", "金樽清酒斗十千，玉盘珍羞直万钱。(羞 同：馐；直 同：值)", "停杯投箸不能食，拔剑四顾心茫然。", "欲渡黄河冰塞川，将登太行雪满山。(雪满山 一作：雪暗天)", "闲来垂钓碧溪上，忽复乘舟梦日边。(碧 一作：坐)", "行路难，行路难，多歧路，今安在？", "长风破浪会有时，直挂云帆济沧海。", "箸(zhù)：投箸：丢下筷子"], "img": false}, {"i": 312, "t": "行路难·大道", "d": "", "a": "", "l": ["李白〔唐代〕", "大道如青天，我独不得出。", "羞逐长安社中儿，赤鸡白雉赌梨栗。", "弹剑作歌奏苦声，曳裾王门不称情。", "淮阴市井笑韩信，汉朝公卿忌贾生。", "君不见昔时燕家重郭隗，拥篲折节无嫌猜。", "剧辛乐毅感恩分，输肝剖胆效英才。", "昭王白骨萦蔓草，谁人更扫黄金台？", "行路难，归去来！"], "img": false}, {"i": 313, "t": "行路难·有耳", "d": "", "a": "", "l": ["李白〔唐代〕", "有耳莫洗颍川水，有口莫食首阳蕨。", "含光混世贵无名，何用孤高比云月？", "吾观自古贤达人，功成不退皆殒身。", "子胥既弃吴江上，屈原终投湘水滨。", "陆机雄才岂自保？李斯税驾苦不早。", "华亭鹤唳讵可闻？上蔡苍鹰何足道？", "君不见吴中张翰称达生，秋风忽忆江东行。", "且乐生前一杯酒，何须身后千载名？"], "img": false}, {"i": 314, "t": "玉阶怨", "d": "", "a": "", "l": ["李白〔唐代〕", "玉阶生白露，夜久侵罗袜。", "却下水晶帘，玲珑望秋月。"], "img": false}, {"i": 315, "t": "长相思·长相思，在长安", "d": "", "a": "", "l": ["李白〔唐代〕", "长相思，在长安。", "络纬秋啼金井阑，微霜凄凄簟色寒。", "孤灯不明思欲绝，卷帷望月空长叹。", "美人如花隔云端！", "上有青冥之长天，下有渌水之波澜。", "天长路远魂飞苦，梦魂不到关山难。", "长相思，摧心肝！"], "img": false}, {"i": 316, "t": "长相思·日色", "d": "", "a": "", "l": ["李白〔唐代〕", "日色欲尽花含烟，月明如素愁不眠。", "赵瑟初停凤凰柱，蜀琴欲奏鸳鸯弦。", "此曲有意无人传，愿随春风寄燕然。", "忆君迢迢隔青天。", "昔日横波目，今作流泪泉。", "不信妾肠断，归来看取明镜前。", "赵瑟：相传古代赵国的人善弹瑟"], "img": false}, {"i": 317, "t": "长干行·妾发", "d": "", "a": "", "l": ["李白〔唐代〕", "妾发初覆额，折花门前剧。", "郎骑竹马来，绕床弄青梅。", "同居长干里，两小无嫌猜。", "十四为君妇，羞颜未尝开。", "低头向暗壁，千唤不一回。", "十五始展眉，愿同尘与灰。", "常存抱柱信，岂上望夫台。", "十六君远行，瞿塘滟滪堆。", "五月不可触，猿声天上哀。(猿声 一作：猿鸣)", "门前迟行迹，一一生绿苔。(迟 一作：旧)", "苔深不能扫，落叶秋风早。", "八月蝴蝶来，双飞西园草。(蝴蝶来 一作：蝴蝶黄)", "感此伤妾心，坐愁红颜老。", "早晚下三巴，预将书报家。", "相迎不道远，直至长风沙。"], "img": false}, {"i": 318, "t": "蜀道难", "d": "", "a": "", "l": ["李白〔唐代〕", "噫吁嚱，危乎高哉！", "蜀道之难，难于上青天！", "蚕丛及鱼凫，开国何茫然！", "尔来四万八千岁，不与秦塞通人烟。", "西当太白有鸟道，可以横绝峨眉巅。", "地崩山摧壮士死，然后天梯石栈相钩连。", "上有六龙回日之高标，下有冲波逆折之回川。", "黄鹤之飞尚不得过，猿猱欲度愁攀援。", "青泥何盘盘，百步九折萦岩峦。", "扪参历井仰胁息，以手抚膺坐长叹。", "问君西游何时还？畏途巉岩不可攀。", "但见悲鸟号古木，雄飞雌从绕林间。", "又闻子规啼夜月，愁空山。", "蜀道之难，难于上青天，使人听此凋朱颜！", "连峰去天不盈尺，枯松倒挂倚绝壁。", "飞湍瀑流争喧豗，砯崖转石万壑雷。", "其险也如此，嗟尔远道之人胡为乎来哉！", "剑阁峥嵘而崔嵬，一夫当关，万夫莫开。", "所守或匪亲，化为狼与豺。", "朝避猛虎，夕避长蛇，磨牙吮血，杀人如麻。", "锦城虽云乐，不如早还家。", "蜀道之难，难于上青天，侧身西望长咨嗟！"], "img": false}, {"i": 319, "t": "江南曲", "d": "", "a": "", "l": ["李益〔唐代〕", "嫁得瞿塘贾，朝朝误妾期。", "早知潮有信，嫁与弄潮儿。"], "img": false}, {"i": 320, "t": "古从军行", "d": "", "a": "", "l": ["李颀〔唐代〕", "白日登山望烽火，黄昏饮马傍交河。", "行人刁斗风沙暗，公主琵琶幽怨多。", "野云万里无城郭，雨雪纷纷连大漠。", "胡雁哀鸣夜夜飞，胡儿眼泪双双落。", "闻道玉门犹被遮，应将性命逐轻车。", "年年战骨埋荒外，空见蒲桃入汉家。"], "img": false}, {"i": 321, "t": "哀王孙", "d": "", "a": "", "l": ["杜甫〔唐代〕", "长安城头头白乌，夜飞延秋门上呼。", "又向人家啄大屋，屋底达官走避胡。", "金鞭断折九马死，骨肉不得同驰驱。", "腰下宝玦青珊瑚，可怜王孙泣路隅。", "问之不肯道姓名，但道困苦乞为奴。", "已经百日窜荆棘，身上无有完肌肤。", "高帝子孙尽隆准，龙种自与常人殊。", "豺狼在邑龙在野，王孙善保千金躯。", "不敢长语临交衢，且为王孙立斯须。", "昨夜东风吹血腥，东来橐驼满旧都。", "朔方健儿好身手，昔何勇锐今何愚。", "窃闻天子已传位，圣德北服南单于。", "花门剺面请雪耻，慎勿出口他人狙。", "哀哉王孙慎勿疏，五陵佳气无时无。"], "img": false}, {"i": 322, "t": "兵车行", "d": "", "a": "", "l": ["杜甫〔唐代〕", "车辚辚，马萧萧，行人弓箭各在腰。", "爷娘妻子走相送，尘埃不见咸阳桥。", "牵衣顿足拦道哭，哭声直上干云霄。", "道旁过者问行人，行人但云点行频。", "或从十五北防河，便至四十西营田。", "去时里正与裹头，归来头白还戍边。", "边庭流血成海水，武皇开边意未已。", "君不闻汉家山东二百州，千村万落生荆杞。", "纵有健妇把锄犁，禾生陇亩无东西。", "况复秦兵耐苦战，被驱不异犬与鸡。", "长者虽有问，役夫敢申恨？", "且如今年冬，未休关西卒。", "县官急索租，租税从何出？", "信知生男恶，反是生女好。", "生女犹得嫁比邻，生男埋没随百草。", "君不见，青海头，古来白骨无人收。", "新鬼烦冤旧鬼哭，天阴雨湿声啾啾！"], "img": false}, {"i": 323, "t": "丽人行", "d": "", "a": "", "l": ["杜甫〔唐代〕", "三月三日天气新，长安水边多丽人。", "态浓意远淑且真，肌理细腻骨肉匀。", "绣罗衣裳照暮春，蹙金孔雀银麒麟。", "头上何所有？翠微匎叶垂鬓唇。", "背后何所见？珠压腰衱稳称身。", "就中云幕椒房亲，赐名大国虢与秦。", "紫驼之峰出翠釜，水精之盘行素鳞。", "犀箸厌饫久未下，鸾刀缕切空纷纶。", "黄门飞鞚不动尘，御厨络绎送八珍。", "箫鼓哀吟感鬼神，宾从杂遝实要津。", "后来鞍马何逡巡，当轩下马入锦茵。", "杨花雪落覆白苹，青鸟飞去衔红巾。", "炙手可热势绝伦，慎莫近前丞相嗔！"], "img": false}, {"i": 324, "t": "哀江头", "d": "", "a": "", "l": ["杜甫〔唐代〕", "少陵野老吞声哭，春日潜行曲江曲。", "江头宫殿锁千门，细柳新蒲为谁绿？", "忆昔霓旌下南苑，苑中万物生颜色。", "昭阳殿里第一人，同辇随君侍君侧。", "辇前才人带弓箭，白马嚼啮黄金勒。", "翻身向天仰射云，一笑正坠双飞翼。", "明眸皓齿今何在？血污游魂归不得。", "清渭东流剑阁深，去住彼此无消息。", "人生有情泪沾臆，江水江花岂终极！", "黄昏胡骑尘满城，欲往城南望城北。", "霓旌：云霓般的彩旗，指天子之旗"], "img": false}, {"i": 325, "t": "金缕衣", "d": "", "a": "", "l": ["杜秋娘〔唐代〕-佚名", "劝君莫惜金缕衣，劝君惜取少年时。", "花开堪折直须折，莫待无花空折枝。"], "img": false}, {"i": 326, "t": "独不见", "d": "", "a": "", "l": ["沈佺期〔唐代〕", "卢家少妇郁金堂，海燕双栖玳瑁梁。", "九月寒砧催木叶，十年征戍忆辽阳。", "白狼河北音书断，丹凤城南秋夜长。", "谁为含愁独不见，更教明月照流黄。"], "img": false}, {"i": 327, "t": "烈女操", "d": "", "a": "", "l": ["孟郊〔唐代〕", "梧桐相待老，鸳鸯会双死。", "贞女贵殉夫，舍生亦如此。", "波澜誓不起，妾心古井水。"], "img": false}, {"i": 328, "t": "游子吟", "d": "", "a": "", "l": ["孟郊〔唐代〕", "慈母手中线，游子身上衣。", "临行密密缝，意恐迟迟归。", "谁言寸草心，报得三春晖。"], "img": false}, {"i": 329, "t": "燕歌行(并序)", "d": "", "a": "", "l": ["高适〔唐代〕开元二十六年，客有从元戎出塞而还者，作《燕歌行》以示，适感征戍之事，因而和焉。", "汉家烟尘在东北，汉将辞家破残贼。", "男儿本自重横行，天子非常赐颜色。", "摐(chuāng)金伐鼓下榆关，旌旆逶迤碣石间。", "校尉羽书飞瀚海，单于猎火照狼山。", "山川萧条极边土，胡骑凭陵杂风雨。", "战士军前半死生，美人帐下犹歌舞。", "大漠穷秋塞草腓，孤城落日斗兵稀。", "身当恩遇常轻敌，力尽关山未解围。", "铁衣远戍辛勤久，玉箸应啼别离后。", "少妇城南欲断肠，征人蓟北空回首。", "边庭飘飖那可度，绝域苍茫无所有。", "杀气三时作阵云，寒声一夜传刁斗。", "相看白刃血纷纷，死节从来岂顾勋！", "君不见沙场征战苦，至今犹忆李将军。"], "img": false}, {"i": 330, "t": "长干行·君家", "d": "", "a": "", "l": ["崔颢〔唐代〕", "君家何处住，妾住在横塘。", "停船暂借问，或恐是同乡。"], "img": false}, {"i": 331, "t": "长干行·家临", "d": "", "a": "", "l": ["崔颢〔唐代〕", "家临九江水，来去九江侧。", "同是长干人，生小不相识。"], "img": false}, {"i": 332, "t": "和张仆射塞下曲·鹫翎", "d": "", "a": "", "l": ["卢纶〔唐代〕", "鹫翎金仆姑，燕尾绣蝥弧。", "独立扬新令，千营共一呼。"], "img": false}, {"i": 333, "t": "和张仆射塞下曲·林暗", "d": "", "a": "", "l": ["卢纶〔唐代〕", "林暗草惊风，将军夜引弓。", "平明寻白羽，没在石棱中。"], "img": false}, {"i": 334, "t": "和张仆射塞下曲·野幕", "d": "", "a": "", "l": ["卢纶〔唐代〕", "野幕敞琼筵，羌戎贺劳旋。", "醉和金甲舞，雷鼓动山川。", "琼(qióng)筵(yán)"], "img": false}, {"i": 335, "t": "塞下曲.月黑", "d": "", "a": "", "l": ["卢纶〔唐代〕", "月黑雁飞高，单于夜遁逃。", "欲将轻骑逐，大雪满弓刀。"], "img": false}, {"i": 336, "t": "江南-江南可", "d": "", "a": "", "l": ["汉乐府〔两汉〕", "江南可采莲，莲叶何田田。", "鱼戏莲叶间。", "鱼戏莲叶东，鱼戏莲叶西，鱼戏莲叶南，鱼戏莲叶北。"], "img": false}, {"i": 337, "t": "画", "d": "", "a": "", "l": ["王维〔唐代〕", "远看山有色，近听水无声。", "春去花还在，人来鸟不惊。"], "img": false}, {"i": 338, "t": "咏鹅", "d": "", "a": "", "l": ["骆宾王〔唐代〕", "鹅，鹅，鹅，曲项向天歌。", "白毛浮绿水，红掌拨清波。"], "img": false}, {"i": 339, "t": "人之初", "d": "", "a": "", "l": ["王应麟〔宋代〕", "人之初，性本善。", "性相近，习相远。", "苟不教，性乃迁。", "教之道，贵以专。", "子不学，非所宜。", "幼不学，老何为。", "玉不琢，不成器。", "人不学，不知义。"], "img": false}, {"i": 340, "t": "池上", "d": "", "a": "", "l": ["白居易〔唐代〕", "小娃撑小艇，偷采白莲回。", "不解藏踪迹，浮萍一道开。"], "img": false}, {"i": 341, "t": "悯农二首·其二", "d": "", "a": "", "l": ["李绅〔唐代〕", "锄禾日当午，汗滴禾下土。", "谁知盘中餐，粒粒皆辛苦？"], "img": false}, {"i": 342, "t": "风", "d": "", "a": "", "l": ["李峤〔唐代〕", "解落三秋叶，能开二月花。", "过江千尺浪，入竹万竿斜。"], "img": false}, {"i": 343, "t": "小池-泉眼", "d": "", "a": "", "l": ["杨万里〔宋代〕", "泉眼无声惜细流，树阴照水爱晴柔。", "小荷才露尖尖角，早有蜻蜓立上头。"], "img": false}, {"i": 344, "t": "春晓", "d": "", "a": "", "l": ["孟浩然〔唐代〕", "春眠不觉晓，处处闻啼鸟。", "夜来风雨声，花落知多少。"], "img": false}, {"i": 345, "t": "赠汪伦", "d": "", "a": "", "l": ["李白〔唐代〕", "李白乘舟将欲行，忽闻岸上踏歌声。", "桃花潭水深千尺，不及汪伦送我情。"], "img": false}, {"i": 346, "t": "寻隐者不遇", "d": "", "a": "", "l": ["贾岛〔唐代〕", "松下问童子，言师采药去。", "只在此山中，云深不知处。"], "img": false}, {"i": 347, "t": "望庐山瀑布", "d": "", "a": "", "l": ["李白〔唐代〕", "日照香炉生紫烟，遥看瀑布挂前川。", "飞流直下三千尺，疑是银河落九天。"], "img": false}, {"i": 348, "t": "夜宿山寺", "d": "", "a": "", "l": ["李白〔唐代〕", "危楼高百尺，手可摘星辰。", "不敢高声语，恐惊天上人。"], "img": false}, {"i": 349, "t": "敕勒歌", "d": "", "a": "", "l": ["乐府诗集〔南北朝〕", "敕勒川，阴山下。", "天似穹庐，笼盖四野，天苍苍，野茫茫，风吹草低见牛羊。"], "img": false}, {"i": 350, "t": "登鹳雀楼", "d": "", "a": "", "l": ["王之涣〔唐代〕", "白日依山尽，黄河入海流。", "欲穷千里目，更上一层楼。"], "img": false}, {"i": 351, "t": "梅花", "d": "", "a": "", "l": ["王安石〔宋代〕", "墙角数枝梅，凌寒独自开。", "遥知不是雪，为有暗香来。"], "img": false}, {"i": 352, "t": "小儿垂钓", "d": "", "a": "", "l": ["胡令能〔唐代〕", "蓬头稚子学垂纶，侧坐莓苔草映身。", "路人借问遥招手，怕得鱼惊不应人。"], "img": false}, {"i": 353, "t": "村居.高鼎", "d": "", "a": "", "l": ["高鼎〔清代〕", "草长莺飞二月天，拂堤杨柳醉春烟。", "儿童散学归来早，忙趁东风放纸鸢。"], "img": false}, {"i": 354, "t": "咏柳", "d": "", "a": "", "l": ["贺知章〔唐代〕", "碧玉妆成一树高，万条垂下绿丝绦。", "不知细叶谁裁出，二月春风似剪刀。"], "img": false}, {"i": 355, "t": "晓出净慈寺送林子方", "d": "", "a": "", "l": ["杨万里〔宋代〕", "毕竟西湖六月中，风光不与四时同。", "接天莲叶无穷碧，映日荷花别样红。"], "img": false}, {"i": 356, "t": "绝句.两个", "d": "", "a": "", "l": ["杜甫〔唐代〕", "两个黄鹂鸣翠柳，一行白鹭上青天。", "窗含西岭千秋雪，门泊东吴万里船。"], "img": false}, {"i": 357, "t": "悯农二首·春种", "d": "", "a": "", "l": ["李绅〔唐代〕", "春种一粒粟，秋收万颗子。", "四海无闲田，农夫犹饿死。"], "img": false}, {"i": 358, "t": "舟夜书所见", "d": "", "a": "", "l": ["查慎行〔清代〕", "月黑见渔灯，孤光一点萤。", "微微风簇浪，散作满河星。"], "img": false}, {"i": 359, "t": "山行", "d": "", "a": "", "l": ["杜牧〔唐代〕", "远上寒山石径斜，白云生处有人家。", "停车坐爱枫林晚，霜叶红于二月花。"], "img": false}, {"i": 360, "t": "赠刘景文", "d": "", "a": "", "l": ["苏轼〔宋代〕", "荷尽已无擎雨盖，菊残犹有傲霜枝。", "一年好景君须记，最是橙黄橘绿时。"], "img": false}, {"i": 361, "t": "夜书所见", "d": "", "a": "", "l": ["叶绍翁〔宋代〕", "萧萧梧叶送寒声，江上秋风动客情。", "知有儿童挑促织，夜深篱落一灯明。"], "img": false}, {"i": 362, "t": "望天门山", "d": "", "a": "", "l": ["李白〔唐代〕", "天门中断楚江开，碧水东流至此回。", "两岸青山相对出，孤帆一片日边来。"], "img": false}, {"i": 363, "t": "饮湖上初晴后雨二首·水光", "d": "", "a": "", "l": ["苏轼〔宋代〕", "水光潋滟晴方好，山色空蒙雨亦奇。", "欲把西湖比西子，淡妆浓抹总相宜。"], "img": false}, {"i": 364, "t": "望洞庭", "d": "", "a": "", "l": ["刘禹锡〔唐代〕", "湖光秋月两相和，潭面无风镜未磨。", "遥望洞庭山水翠，白银盘里一青螺。(山水翠 一作：山水色)"], "img": false}, {"i": 365, "t": "所见", "d": "", "a": "", "l": ["袁枚〔清代〕", "牧童骑黄牛，歌声振林樾。", "意欲捕鸣蝉，忽然闭口立。"], "img": false}, {"i": 366, "t": "早发白帝城", "d": "", "a": "", "l": ["李白〔唐代〕", "朝辞白帝彩云间，千里江陵一日还。", "两岸猿声啼不住，轻舟已过万重山。"], "img": false}, {"i": 367, "t": "采莲曲", "d": "", "a": "", "l": ["王昌龄〔唐代〕", "荷叶罗裙一色裁，芙蓉向脸两边开。", "乱入池中看不见，闻歌始觉有人来。"], "img": false}, {"i": 368, "t": "绝句.迟日", "d": "", "a": "", "l": ["杜甫〔唐代〕", "迟日江山丽，春风花草香。", "泥融飞燕子，沙暖睡鸳鸯。", "江碧鸟逾白，山青花欲燃。", "今春看又过，何日是归年。"], "img": false}, {"i": 369, "t": "惠崇春江晚景", "d": "", "a": "", "l": ["苏轼〔宋代〕", "竹外桃花三两枝，春江水暖鸭先知。", "蒌蒿满地芦芽短，正是河豚欲上时。"], "img": false}, {"i": 370, "t": "三衢道中", "d": "", "a": "", "l": ["曾几〔宋代〕", "梅子黄时日日晴，小溪泛尽却山行。", "绿阴不减来时路，添得黄鹂四五声。"], "img": false}, {"i": 371, "t": "清明", "d": "", "a": "", "l": ["杜牧〔唐代〕", "清明时节雨纷纷，路上行人欲断魂。", "借问酒家何处有？牧童遥指杏花村。"], "img": false}, {"i": 372, "t": "九月九日忆山东兄弟", "d": "", "a": "", "l": ["王维〔唐代〕", "独在异乡为异客，每逢佳节倍思亲。", "遥知兄弟登高处，遍插茱萸少一人。"], "img": false}, {"i": 373, "t": "暮江吟", "d": "", "a": "", "l": ["白居易〔唐代〕", "一道残阳铺水中，半江瑟瑟半江红。", "可怜九月初三夜，露似真珠月似弓。"], "img": false}, {"i": 374, "t": "题西林壁", "d": "", "a": "", "l": ["苏轼〔宋代〕", "横看成岭侧成峰，远近高低各不同。", "不识庐山真面目，只缘身在此山中。"], "img": false}, {"i": 375, "t": "夏日绝句", "d": "", "a": "", "l": ["李清照〔宋代〕", "生当作人杰，死亦为鬼雄。", "至今思项羽，不肯过江东。"], "img": false}, {"i": 376, "t": "别董大", "d": "", "a": "", "l": ["高适〔唐代〕", "千里黄云白日曛，北风吹雁雪纷纷。", "莫愁前路无知己，天下谁人不识君。"], "img": false}, {"i": 377, "t": "四时田园杂兴·梅子", "d": "", "a": "", "l": ["范成大〔宋代〕", "梅子金黄杏子肥，麦花雪白菜花稀。", "日长篱落无人过，惟有蜻蜓蛱蝶飞。"], "img": false}, {"i": 378, "t": "宿新市徐公店", "d": "", "a": "", "l": ["杨万里〔宋代〕", "篱落疏疏一径深，树头新绿未成阴。", "儿童急走追黄蝶，飞入菜花无处寻。"], "img": false}, {"i": 379, "t": "清平乐·村居", "d": "", "a": "", "l": ["辛弃疾〔宋代〕", "茅檐低小，溪上青青草。醉里吴音相媚好，白发谁家翁媪？大儿锄豆溪东，中儿正织鸡笼。最喜小儿亡赖，溪头卧剥莲蓬。"], "img": false}, {"i": 380, "t": "墨梅", "d": "", "a": "", "l": ["王冕〔元代〕", "我家洗砚池头树，朵朵花开淡墨痕。", "不要人夸颜色好，只留清气满乾坤。"], "img": false}, {"i": 381, "t": "卜算子·咏梅.毛泽东", "d": "", "a": "", "l": ["读陆游咏梅词，反其意而用之。", "风雨送春归，飞雪迎春到。已是悬崖百丈冰，犹有花枝俏。", "俏也不争春，只把春来报。待到山花烂漫时，她在丛中笑。"], "img": false}, {"i": 382, "t": "江畔独步寻花", "d": "", "a": "", "l": ["杜甫〔唐代〕", "黄师塔前江水东，春光懒困倚微风。", "桃花一簇开无主，可爱深红爱浅红？"], "img": false}, {"i": 383, "t": "蜂", "d": "", "a": "", "l": ["罗隐〔唐代〕", "不论平地与山尖，无限风光尽被占。", "采得百花成蜜后，为谁辛苦为谁甜？"], "img": false}, {"i": 384, "t": "独坐敬亭山", "d": "", "a": "", "l": ["李白〔唐代〕", "众鸟高飞尽，孤云独去闲。", "相看两不厌，只有敬亭山。"], "img": false}, {"i": 385, "t": "示儿", "d": "", "a": "", "l": ["陆游〔宋代〕", "死去元知万事空，但悲不见九州同。", "王师北定中原日，家祭无忘告乃翁。"], "img": false}, {"i": 386, "t": "题临安邸", "d": "", "a": "", "l": ["林升〔宋代〕", "山外青山楼外楼，西湖歌舞几时休？", "暖风熏得游人醉，直把杭州作汴州。", "汴(biàn)州：即汴京，今河南开封市"], "img": false}, {"i": 387, "t": "己亥杂诗", "d": "", "a": "", "l": ["龚自珍〔清代〕", "九州生气恃风雷，万马齐喑究可哀。", "我劝天公重抖擞，不拘一格降人材。"], "img": false}, {"i": 388, "t": "少年中国说(节选)", "d": "", "a": "", "l": ["梁启超〔近现代〕", "故今日之责任，不在他人，而全在我少年。", "少年智则国智，少年富则国富；", "少年强则国强，少年独立则国独立；", "少年自由则国自由；少年进步则国进步；", "少年胜于欧洲，则国胜于欧洲；", "少年雄于地球，则国雄于地球。", "红日初升，其道大光。", "河出伏流，一泻汪洋。", "潜龙腾渊，鳞爪飞扬。", "乳虎啸谷，百兽震惶。", "鹰隼试翼，风尘翕张。", "奇花初胎，矞矞皇皇。", "干将发硎，有作其芒。", "天戴其苍，地履其黄。", "纵有千古，横有八荒。", "前途似海，来日方长。", "美哉我少年中国，与天不老！", "壮哉我中国少年，与国无疆！"], "img": false}, {"i": 389, "t": "古人谈读书", "d": "", "a": "", "l": ["朱熹〔宋代〕", "敏而好学，不耻下问。知之为知之，不知为不知，是知也。默而识之，学而不厌，诲人不倦。", "余尝谓读书有三到，谓心到、眼到、口到。心不在此，则眼不看仔细，心眼既不专一，却只漫浪诵读，决不能记，记亦不能久也。三到之中，心到最急。心既到矣，眼口岂不到乎？（来自朱熹）", "盖士人读书，第一要有志，第二要有识，第三要有恒。有志则断不甘为下流；有识则知学问无尽，不敢以一得自足，如河伯之观海，如井蛙之窥天，皆无识者也；有恒则断无不成之事。此三者缺一不可。（来自曾国藩）"], "img": false}, {"i": 390, "t": "蝉", "d": "", "a": "", "l": ["虞世南〔唐代〕", "垂緌饮清露，流响出疏桐。", "居高声自远，非是藉秋风。"], "img": false}, {"i": 391, "t": "乞巧", "d": "", "a": "", "l": ["林杰〔唐代〕", "七夕今宵看碧霄，牵牛织女渡河桥。", "家家乞巧望秋月，穿尽红丝几万条。"], "img": false}, {"i": 392, "t": "观书有感·半亩", "d": "", "a": "", "l": ["朱熹〔宋代〕", "半亩方塘一鉴开，天光云影共徘徊。", "问渠哪得清如许？为有源头活水来。"], "img": false}, {"i": 393, "t": "观书有感·昨夜", "d": "", "a": "", "l": ["朱熹〔宋代〕", "昨夜江边春水生，蒙冲巨舰一毛轻。", "向来枉费推移力，此日中流自在行。"], "img": false}, {"i": 394, "t": "四时田园杂兴·昼出", "d": "", "a": "", "l": ["范成大〔宋代〕", "昼出耘田夜绩麻，村庄儿女各当家。", "童孙未解供耕织，也傍桑阴学种瓜。"], "img": false}, {"i": 395, "t": "稚子弄冰", "d": "", "a": "", "l": ["杨万里〔宋代〕", "稚子金盆脱晓冰，彩丝穿取当银钲。(银钲 一作：银铮)", "敲成玉磬穿林响，忽作玻璃碎地声。(玻璃 一作：玻瓈)"], "img": false}, {"i": 396, "t": "村晚", "d": "", "a": "", "l": ["雷震〔宋代〕", "草满池塘水满陂，山衔落日浸寒漪。", "牧童归去横牛背，短笛无腔信口吹。"], "img": false}, {"i": 397, "t": "从军行七首·青海", "d": "", "a": "", "l": ["王昌龄〔唐代〕", "青海长云暗雪山，孤城遥望玉门关。", "黄沙百战穿金甲，不破楼兰终不还。"], "img": false}, {"i": 398, "t": "秋夜将晓出篱门迎凉有感", "d": "", "a": "", "l": ["陆游〔宋代〕", "三万里河东入海，五千仞岳上摩天。", "遗民泪尽胡尘里，南望王师又一年。"], "img": false}, {"i": 399, "t": "鸟鸣涧", "d": "", "a": "", "l": ["王维〔唐代〕", "人闲桂花落，夜静春山空。", "月出惊山鸟，时鸣春涧中。"], "img": false}, {"i": 400, "t": "乡村四月", "d": "", "a": "", "l": ["翁卷〔宋代〕", "绿遍山原白满川，子规声里雨如烟。", "乡村四月闲人少，才了蚕桑又插田。"], "img": false}, {"i": 401, "t": "六月二十七日望湖楼醉书", "d": "", "a": "", "l": ["苏轼〔宋代〕", "黑云翻墨未遮山，白雨跳珠乱入船。", "卷地风来忽吹散，望湖楼下水如天。"], "img": false}, {"i": 402, "t": "西江月·夜行黄沙道中", "d": "", "a": "", "l": ["辛弃疾〔宋代〕", "明月别枝惊鹊，清风半夜鸣蝉。", "稻花香里说丰年，听取蛙声一片。", "七八个星天外，两三点雨山前。", "旧时茅店社林边，路转溪桥忽见。"], "img": false}, {"i": 403, "t": "七律·长征", "d": "", "a": "", "l": ["毛泽东〔近现代〕", "红军不怕远征难，万水千山只等闲。", "五岭逶迤腾细浪，乌蒙磅礴走泥丸。", "金沙水拍云崖暖，大渡桥横铁索寒。", "更喜岷山千里雪，三军过后尽开颜。"], "img": false}, {"i": 404, "t": "浪淘沙·九曲", "d": "", "a": "", "l": ["刘禹锡〔唐代〕", "九曲黄河万里沙，浪淘风簸自天涯。", "如今直上银河去，同到牵牛织女家。"], "img": false}, {"i": 405, "t": "江南春. 千", "d": "", "a": "", "l": ["杜牧〔唐代〕", "千里莺啼绿映红，水村山郭酒旗风。", "南朝四百八十寺，多少楼台烟雨中。"], "img": false}, {"i": 406, "t": "书湖阴先生壁", "d": "", "a": "", "l": ["王安石〔宋代〕", "茅檐长扫净无苔，花木成畦手自栽。", "一水护田将绿绕，两山排闼送青来。"], "img": false}, {"i": 407, "t": "春日", "d": "", "a": "", "l": ["朱熹〔宋代〕", "胜日寻芳泗水滨，无边光景一时新。", "等闲识得东风面，万紫千红总是春。"], "img": false}, {"i": 408, "t": "十五夜望月", "d": "", "a": "", "l": ["王建〔唐代〕", "中庭地白树栖鸦，冷露无声湿桂花。", "今夜月明人尽望，不知秋思落谁家。"], "img": false}, {"i": 409, "t": "石灰吟", "d": "", "a": "", "l": ["于谦〔明代〕", "千锤万凿出深山，烈火焚烧若等闲。", "粉骨碎身浑不怕，要留清白在人间。"], "img": false}, {"i": 410, "t": "竹石", "d": "", "a": "", "l": ["郑燮xiè〔清代〕郑板桥", "咬定青山不放松，立根原在破岩中。", "千磨万击还坚劲，任尔东西南北风。"], "img": false}, {"i": 411, "t": "长歌行.青青", "d": "", "a": "", "l": ["汉乐府〔两汉〕", "青青园中葵，朝露待日晞。", "阳春布德泽，万物生光辉。", "常恐秋节至，焜黄华叶衰。", "百川东到海，何时复西归？", "少壮不努力，老大徒伤悲！", "焜(kūn)"], "img": false}, {"i": 412, "t": "春夜喜雨", "d": "", "a": "", "l": ["杜甫〔唐代〕", "好雨知时节，当春乃发生。", "随风潜入夜，润物细无声。", "野径云俱黑，江船火独明。", "晓看红湿处，花重锦官城。"], "img": false}, {"i": 413, "t": "早春呈水部张十八员外", "d": "", "a": "", "l": ["韩愈〔唐代〕", "天街小雨润如酥，草色遥看近却无。", "最是一年春好处，绝胜烟柳满皇都。"], "img": false}, {"i": 414, "t": "泊船瓜洲", "d": "", "a": "", "l": ["王安石〔宋代〕", "京口瓜洲一水间，钟山只隔数重山。", "春风又绿江南岸，明月何时照我还。"], "img": false}, {"i": 415, "t": "游园不值", "d": "", "a": "", "l": ["叶绍翁〔宋代〕", "应怜屐齿印苍苔，小扣柴扉久不开。", "春色满园关不住，一枝红杏出墙来。"], "img": false}, {"i": 416, "t": "卜算子·送鲍浩然之浙东", "d": "", "a": "", "l": ["王观〔宋代〕", "水是眼波横，山是眉峰聚。欲问行人去那边？眉眼盈盈处。", "才始送春归，又送君归去。若到江南赶上春，千万和春住。"], "img": false}, {"i": 417, "t": "浣溪沙·游蕲水清泉寺", "d": "", "a": "", "l": ["苏轼〔宋代〕", "游蕲水清泉寺，寺临兰溪，溪水西流。山下兰芽短浸溪，松间沙路净无泥，萧萧暮雨子规啼。(萧萧 一作：潇潇)", "谁道人生无再少？门前流水尚能西！休将白发唱黄鸡。"], "img": false}, {"i": 418, "t": "清平乐·春归何处", "d": "", "a": "", "l": ["黄庭坚〔宋代〕", "春归何处？寂寞无行路。若有人知春去处，唤取归来同住。", "春无踪迹谁知？除非问取黄鹂。百啭无人能解，因风飞过蔷薇。"], "img": false}, {"i": 419, "t": "观沧海", "d": "", "a": "", "l": ["曹操〔两汉〕", "东临碣石，以观沧海。", "水何澹澹，山岛竦峙。", "树木丛生，百草丰茂。", "秋风萧瑟，洪波涌起。", "日月之行，若出其中；", "星汉灿烂，若出其里。", "幸甚至哉，歌以咏志。"], "img": false}, {"i": 420, "t": "闻王昌龄左迁龙标遥有此寄", "d": "", "a": "", "l": ["李白〔唐代〕", "杨花落尽子规啼，闻道龙标过五溪。", "我寄愁心与明月，随君直到夜郎西。(随君 一作：随风)"], "img": false}, {"i": 421, "t": "天净沙·秋思", "d": "", "a": "", "l": ["马致远〔元代〕", "枯藤老树昏鸦，小桥流水人家，古道西风瘦马。夕阳西下，断肠人在天涯。"], "img": false}, {"i": 422, "t": "诫子书", "d": "", "a": "", "l": ["诸葛亮〔两汉〕", "夫君子之行，静以修身，俭以养德。非淡泊无以明志，非宁静无以致远。夫学须静也，才须学也，非学无以广才，非志无以成学。淫慢则不能励精，险躁则不能治性。年与时驰，意与日去，遂成枯落，多不接世，悲守穷庐，将复何及！ (淡泊 一作：澹泊；淫慢 一作：慆慢；治性 一作：冶性）"], "img": false}, {"i": 423, "t": "峨眉山月歌", "d": "", "a": "", "l": ["李白〔唐代〕", "峨眉山月半轮秋，影入平羌江水流。", "夜发清溪向三峡，思君不见下渝州。"], "img": false}, {"i": 424, "t": "行军九日思长安故园", "d": "", "a": "", "l": ["岑参〔唐代〕", "强欲登高去，无人送酒来。", "遥怜故园菊，应傍战场开。"], "img": false}, {"i": 425, "t": "秋词二首·自古", "d": "", "a": "", "l": ["刘禹锡〔唐代〕", "自古逢秋悲寂寥，我言秋日胜春朝。", "晴空一鹤排云上，便引诗情到碧霄。"], "img": false}, {"i": 426, "t": "十一月四日风雨大作·其二", "d": "", "a": "", "l": ["陆游〔宋代〕", "僵卧孤村不自哀，尚思为国戍轮台。", "夜阑卧听风吹雨，铁马冰河入梦来。"], "img": false}, {"i": 427, "t": "潼关", "d": "", "a": "", "l": ["谭嗣同〔清代〕", "终古高云簇此城，秋风吹散马蹄声。", "河流大野犹嫌束，山入潼关不解平。"], "img": false}, {"i": 428, "t": "陋室铭", "d": "", "a": "", "l": ["刘禹锡〔唐代〕", "山不在高，有仙则名。", "水不在深，有龙则灵。", "斯是陋室，惟吾德馨。", "苔痕上阶绿，草色入帘青。", "谈笑有鸿儒，往来无白丁。", "可以调素琴，阅金经。", "无丝竹之乱耳，无案牍之劳形。", "南阳诸葛庐，西蜀子云亭。", "孔子云：何陋之有？"], "img": false}, {"i": 429, "t": "爱莲说", "d": "", "a": "", "l": ["周敦颐〔宋代〕", "水陆草木之花，可爱者甚蕃。晋陶渊明独爱菊。自李唐来，世人甚爱牡丹。予独爱莲之出
