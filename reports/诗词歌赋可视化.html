  '<span><b>'+DATA.stats.lines+'</b> 行</span>'+
  '<span><b>'+(Object.keys(DATA.stats.dyn).length-1)+'</b> 朝代</span>'+
  '<span><b>'+POEMS.filter(p=>p.a).length+'</b> 有名氏</span>';

// ---- overview list (build once, filter by display) ----
const plist=document.getElementById('plist');
POEMS.forEach(p=>{
  const row=document.createElement('div');
  row.className='prow';
  row.dataset.idx=p.i;
  const pmeta=(p.d?p.d+' ':'')+(p.a?p.a:'');
  let html='<div class="pt">《'+esc(p.t)+'》</div>'+
    '<div class="pm">'+(pmeta||'（未标注）')+(p.img?' <span class="imgdot">🖼</span>':'')+'</div>'+
    '<div class="pc">'+p.l.length+' 行</div>';
  row.innerHTML=html;
  row.addEventListener('click',()=>openReader(p.i));
  plist.appendChild(row);
});
function applyFilter(f){
  f=f.trim();
  let n=0;
  POEMS.forEach(p=>{
    const row=plist.children[p.i];
    const hay=(p.t+' '+(p.a||'')+' '+(p.d||'')+' '+p.l.join(' '));
    const show=!f||hay.includes(f);
    row.style.display=show?'flex':'none';
    if(show)n++;
  });
  document.getElementById('ovCount').textContent='共 '+n+' 首';
}
document.getElementById('search').addEventListener('input',e=>applyFilter(e.target.value));
applyFilter('');

// ---- stats ----
function barRow(lab,val,max,unit){
  const w=max>0?Math.max(3,Math.round(val/max*100)):0;
  return '<div class="bar"><div class="lab">'+esc(lab)+'</div>'+
    '<div class="track"><div class="fill" style="width:'+w+'%"></div></div>'+
    '<div class="val">'+val+(unit||'')+'</div></div>';
}
function renderStats(){
  const s=DATA.stats;
  // dynasty (labeled only)
  const dynEntries=Object.entries(s.dyn).filter(([k,v])=>k!=='未标注');
  const dynMax=Math.max(...dynEntries.map(e=>e[1]),1);
  let dynHtml='<div class="card"><h3>朝代分布</h3>';
  dynEntries.sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>dynHtml+=barRow(k,v,dynMax,''));
  dynHtml+='<div class="note">另有 '+s.dyn['未标注']+' 首未标注朝代（源文件仅含标题与正文）。</div></div>';
  // authors top
  const auth=DATA.stats.authors.filter(a=>a[0]!=='佚名').slice(0,12);
  const aMax=Math.max(...auth.map(a=>a[1]),1);
  let authHtml='<div class="card"><h3>作者榜（有名氏）</h3>';
  auth.forEach(([k,v])=>authHtml+=barRow(k,v,aMax,' 首'));
  authHtml+='<div class="note">共 '+POEMS.filter(p=>p.a).length+' 首有名氏，其余 '+POEMS.filter(p=>!p.a).length+' 首佚名。</div></div>';
  // length buckets
  const order=['1行','2行','3行','4行','5-7行','8行以上'];
  const bk=s.buckets; const bMax=Math.max(...order.map(o=>bk[o]||0),1);
  let bHtml='<div class="card"><h3>篇幅分布</h3>';
  order.forEach(o=>bHtml+=barRow(o,bk[o]||0,bMax,' 首'));
  bHtml+='</div>';
  document.getElementById('statGrid').innerHTML=dynHtml+authHtml+bHtml;
}
renderStats();

// ---- authors ----
function renderAuthChips(){
  const m={};
  POEMS.forEach(p=>{const a=p.a||'佚名';m[a]=(m[a]||0)+1;});
  const arr=Object.entries(m).sort((a,b)=>b[1]-a[1]);
  const box=document.getElementById('authChips');box.innerHTML='';
  arr.forEach(([a,c])=>{
    const c2=document.createElement('div');c2.className='chip';
    c2.innerHTML=esc(a)+' <b>'+c+'</b>';
    c2.addEventListener('click',()=>showAuthor(a));
    box.appendChild(c2);
  });
}
function showAuthor(a){
  const list=POEMS.filter(p=>(p.a||'佚名')===a);
  const box=document.getElementById('authList');
  let html='<div class="back" id="authBack">‹ 返回作者列表</div><div class="plist">';
  list.forEach(p=>{html+='<div class="prow" data-idx="'+p.i+'"><div class="pt">《'+esc(p.t)+'》</div><div class="pm">'+(p.d||'未标注')+'</div><div class="pc">'+p.l.length+' 行</div></div>';});
  html+='</div>';
  box.innerHTML=html;
  box.querySelectorAll('.prow').forEach(r=>r.addEventListener('click',()=>openReader(+r.dataset.idx)));
  document.getElementById('authBack').addEventListener('click',()=>{box.innerHTML='';});
  box.scrollTop=0;
}
renderAuthChips();

// ---- dynasties ----
function renderDynChips(){
  const m={};
  POEMS.forEach(p=>{const d=p.d||'未标注';m[d]=(m[d]||0)+1;});
  const arr=Object.entries(m).sort((a,b)=>b[1]-a[1]);
  const box=document.getElementById('dynChips');box.innerHTML='';
  arr.forEach(([d,c])=>{
    const c2=document.createElement('div');c2.className='chip';
    c2.innerHTML='<span class="badge" style="background:'+(COL[d]||'#888')+'">'+esc(d)+'</span> <b>'+c+'</b>';
    c2.addEventListener('click',()=>showDyn(d));
    box.appendChild(c2);
  });
}
function showDyn(d){
  const list=POEMS.filter(p=>(p.d||'未标注')===d);
  const box=document.getElementById('dynList');
  let html='<div class="back" id="dynBack">‹ 返回朝代列表</div><div class="plist">';
  list.forEach(p=>{html+='<div class="prow" data-idx="'+p.i+'"><div class="pt">《'+esc(p.t)+'》</div><div class="pm">'+(p.a||'佚名')+'</div><div class="pc">'+p.l.length+' 行</div></div>';});
  html+='</div>';
  box.innerHTML=html;
  box.querySelectorAll('.prow').forEach(r=>r.addEventListener('click',()=>openReader(+r.dataset.idx)));
  document.getElementById('dynBack').addEventListener('click',()=>{box.innerHTML='';});
  box.scrollTop=0;
}
renderDynChips();

// ---- reader ----
let vertical=false;
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function openReader(i){
  const p=POEMS[i];
  document.getElementById('rTitle').textContent='《'+p.t+'》';
  const cat=document.getElementById('rCat');
  const label=p.d||'未标注';
  cat.textContent=label; cat.style.background=COL[p.d]||'#888';
  document.getElementById('rMeta').textContent=(p.d?p.d+' · ':'')+(p.a?p.a:'佚名');
  const body=document.getElementById('rBody');
  body.className='rbody'+(vertical?' vert':'');
  body.innerHTML='';
  p.l.forEach(line=>{
    const imgM=line.match(/^!\[[^\]]*\]\((https?:\/\/[^)]+)\)$/);
    if(imgM){
      const im=document.createElement('img');im.src=imgM[1];body.appendChild(im);
    }else{
      const pp=document.createElement('p');pp.textContent=line;body.appendChild(pp);
    }
  });
  document.getElementById('reader').classList.add('show');
}
function closeReader(){document.getElementById('reader').classList.remove('show');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeReader();});
document.getElementById('vBtn').addEventListener('click',()=>{
  vertical=!vertical;
  const cur=document.querySelector('#reader.show');
  if(cur){const body=document.getElementById('rBody');body.classList.toggle('vert',vertical);}
});

// ---- tabs ----
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.v).classList.add('active');
  });
});
// random
document.getElementById('randBtn').addEventListener('click',()=>{
  const i=Math.floor(Math.random()*POEMS.length);
  openReader(i);
});
</script>
