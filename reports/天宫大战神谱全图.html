const svg = document.getElementById("graph");
const W = svg.clientWidth || 900, H = svg.clientHeight || 640;
const ns = "http://www.w3.org/2000/svg";
const BIG = new Set(["core","abka39","ole42","xiu28","bana","donghai","amita","hebu","tuohu"]);
let nodes = NODES.map((n,i)=>({...n,
  x:W/2+Math.cos(i)*240+Math.random()*20, y:H/2+Math.sin(i*1.7)*220+Math.random()*20,
  vx:0, vy:0}));
const idmap = {}; nodes.forEach(n=>idmap[n.id]=n);
let edges = EDGES.map(([s,t,r])=>({s:idmap[s], t:idmap[t], r}));
const neigh = {}; nodes.forEach(n=>neigh[n.id]=new Set());
edges.forEach(e=>{neigh[e.s.id].add(e.t.id);neigh[e.t.id].add(e.s.id);});

const nodeG = document.createElementNS(ns,"g");
const edgeG = document.createElementNS(ns,"g");
svg.appendChild(edgeG); svg.appendChild(nodeG);

const edgeEls = edges.map(e=>{
  const l = document.createElementNS(ns,"line");
  l.setAttribute("class","edge"); edgeG.appendChild(l); return l;
});
const nodeEls = nodes.map(n=>{
  const g = document.createElementNS(ns,"g"); g.setAttribute("class","node");
  const c = document.createElementNS(ns,"circle");
  const r = n.group==="core"?16 : n.group==="evil"?14 : BIG.has(n.group)?12 : 10;
  c.setAttribute("r",r);
  c.style.fill = getComputedStyle(document.documentElement)
                 .getPropertyValue(GROUPS[n.group].color.replace("var(","").replace(")",""));
  const t = document.createElementNS(ns,"text");
  t.setAttribute("text-anchor","middle"); t.setAttribute("dy", r+12); t.textContent = n.label;
  g.appendChild(c); g.appendChild(t); nodeG.appendChild(g); return {g,c,t};
});

let fixed=null;
function step(){
  const k=0.02, rep=1700, damp=0.85;
  nodes.forEach(a=>{ if(a===fixed) return;
    let fx=0, fy=0;
    nodes.forEach(b=>{ if(a===b) return;
      let dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy+0.01, d=Math.sqrt(d2);
      let f=rep/d2; fx+=dx/d*f; fy+=dy/d*f; });
    edges.forEach(e=>{ if(e.s===a||e.t===a){ const b=e.s===a?e.t:e.s;
      let dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)+0.01;
      let f=k*(d-110); fx+=dx/d*f; fy+=dy/d*f; }});
    fx += (W/2-a.x)*0.003; fy += (H/2-a.y)*0.003;
    a.vx=(a.vx+fx)*damp; a.vy=(a.vy+fy)*damp;
    a.x+=a.vx; a.y+=a.vy;
    a.x=Math.max(40,Math.min(W-40,a.x)); a.y=Math.max(40,Math.min(H-40,a.y));
  });
}
function render(){
  edges.forEach((e,i)=>{ const l=edgeEls[i];
    l.setAttribute("x1",e.s.x); l.setAttribute("y1",e.s.y);
    l.setAttribute("x2",e.t.x); l.setAttribute("y2",e.t.y); });
  nodes.forEach((n,i)=> nodeEls[i].g.setAttribute("transform",`translate(${n.x},${n.y})`));
}
let raf;
function loop(){ for(let i=0;i<4;i++) step(); render(); raf=requestAnimationFrame(loop); }
loop();
setTimeout(()=>{cancelAnimationFrame(raf);}, 3200);

function colorOf(g){ return getComputedStyle(document.documentElement)
    .getPropertyValue(GROUPS[g].color.replace("var(","").replace(")","")); }

nodeEls.forEach((obj,i)=>{
  const n=nodes[i];
  obj.g.addEventListener("click", ev=>{ ev.stopPropagation(); select(n); });
  obj.g.addEventListener("mousedown", ev=>{ ev.stopPropagation(); fixed=n;
     const move=ev2=>{ const r=svg.getBoundingClientRect();
        n.x=ev2.clientX-r.left; n.y=ev2.clientY-r.top; };
     const up=()=>{ fixed=null; window.removeEventListener("mousemove",move);
                    window.removeEventListener("mouseup",up); raf=requestAnimationFrame(loop);
                    setTimeout(()=>cancelAnimationFrame(raf),1500); };
     window.addEventListener("mousemove",move); window.addEventListener("mouseup",up);
  });
});
function select(n){
  const keep = new Set([n.id, ...neigh[n.id]]);
  nodes.forEach((m,i)=> nodeEls[i].g.classList.toggle("dim", !keep.has(m.id)));
  edges.forEach((e,i)=>{ const on=(e.s.id===n.id||e.t.id===n.id);
     edgeEls[i].classList.toggle("hl",on); edgeEls[i].classList.toggle("dim",!on); });
  showDetail(n);
}
function clearSel(){
  nodes.forEach((m,i)=> nodeEls[i].g.classList.remove("dim"));
  edges.forEach((e,i)=>{ edgeEls[i].classList.remove("hl"); edgeEls[i].classList.remove("dim"); });
}
svg.addEventListener("click", clearSel);
function showDetail(n){
  const d=document.getElementById("detail");
  const links = n.srcs.map(s=>`<a href="${BASE+encodeURIComponent(s)}" target="_blank">📄 ${s.replace('.md','')}</a>`).join("");
  d.innerHTML = `<h2>${n.label}</h2>
    <span class="tag" style="background:${colorOf(n.group)}">${GROUPS[n.group].name}</span>
    <div class="row"><span class="k">对应现代星座：</span>${n.modern}</div>
    <div class="row"><span class="k">职能 / 神格：</span><br>${n.role}</div>
    ${n.note?`<div class="row"><span class="k">备注：</span><br>${n.note}</div>`:""}
    <div class="row"><span class="k">出处素材（点击打开）：</span>${links}</div>`;
}
const search=document.getElementById("search");
search.addEventListener("input", ()=>{
  const q=search.value.trim().toLowerCase();
  if(!q){ clearSel(); return; }
  const hit=new Set();
  nodes.forEach((n,i)=>{ const ok=(n.label+n.modern+n.role+(n.note||"")).toLowerCase().includes(q);
     nodeEls[i].g.classList.toggle("dim",!ok); if(ok) hit.add(n.id); });
  edges.forEach((e,i)=> edgeEls[i].classList.toggle("dim", !(hit.has(e.s.id)&&hit.has(e.t.id))));
});
const legend=document.getElementById("legend");
const offGroups=new Set();
Object.entries(GROUPS).forEach(([k,v])=>{
  const el=document.createElement("div"); el.className="lg";
  el.innerHTML=`<span class="dot" style="background:${v.color}"></span>${v.name}`;
  el.addEventListener("click", ()=>{
    if(offGroups.has(k)){ offGroups.delete(k); el.classList.remove("off"); }
    else { offGroups.add(k); el.classList.add("off"); }
    nodes.forEach((n,i)=> nodeEls[i].g.style.display = offGroups.has(n.group)?"none":"");
    edges.forEach((e,i)=> e.style.display =
       (offGroups.has(e.s.group)||offGroups.has(e.t.group))?"none":"");
  });
  legend.appendChild(el);
});
