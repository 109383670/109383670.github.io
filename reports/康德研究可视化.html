  cats.map(c=>`<div class="row"><span class="dot" style="background:${COLORS[c]}"></span>${c}</div>`).join('');

// ================= READER (click to read content) =================
function inlineMD(s){
  s=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s=s.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
  s=s.replace(/`(.+?)`/g,'<code>$1</code>');
  return s;
}
function renderMD(text){
  const lines=text.split('\n');
  let html='',inList=false,listType='';
  const closeList=()=>{if(inList){html+=listType==='ol'?'</ol>':'</ul>';inList=false;}};
  for(let raw of lines){
    const line=raw.replace(/\s+$/,'');
    if(!line.trim()){closeList();continue;}
    let mm;
    if(mm=line.match(/^(#{1,4})\s+(.*)$/)){
      closeList();
      const lv=Math.min(4,mm[1].length+1);
      html+=`<h${lv}>${inlineMD(mm[2])}</h${lv}>`;
    } else if(mm=line.match(/^[-*]\s+(.*)$/)){
      if(!inList||listType!=='ul'){closeList();html+='<ul>';inList=true;listType='ul';}
      html+=`<li>${inlineMD(mm[1])}</li>`;
    } else if(mm=line.match(/^(\d+)[.、)]\s+(.*)$/)){
      if(!inList||listType!=='ol'){closeList();html+='<ol>';inList=true;listType='ol';}
      html+=`<li>${inlineMD(mm[2])}</li>`;
    } else if(mm=line.match(/^(>+)\s?(.*)$/)){
      closeList(); html+=`<p style="color:var(--muted)">${inlineMD(mm[2])}</p>`;
    } else if(/^---+$/.test(line.trim())){
      closeList(); html+='<hr>';
    } else {
      closeList(); html+=`<p>${inlineMD(line)}</p>`;
    }
  }
  closeList();
  return html;
}
function openReader(file){
  const n=byId[file]; if(!n)return;
  document.getElementById('readerTitle').textContent=n.title+(n.isIndex?'（索引卡）':'');
  const cat=document.getElementById('readerCat');
  cat.textContent=n.cat; cat.style.background=n.color;
  document.getElementById('readerBody').innerHTML=renderMD(n.content||'（暂无正文）');
  document.getElementById('reader').classList.add('show');
}
function closeReader(){document.getElementById('reader').classList.remove('show');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeReader();});

// ================= CONTENT LIST (default) =================
function listHTML(filter=''){
  const f=filter.trim();
  let ns=DATA.nodes.slice().sort((a,b)=>a.order-b.order|| a.file.localeCompare(b.file));
  if(f){ns=ns.filter(n=>(n.title+n.cat+n.concepts.join('')+n.id).includes(f));}
  let h=`<table class="ctable"><thead><tr><th>#</th><th>标题</th><th>类别</th><th>字数</th><th>概念标签</th><th></th></tr></thead><tbody>`;
  ns.forEach((n,i)=>{
    h+=`<tr onclick='openReader(${JSON.stringify(n.file)})'><td>${i+1}</td><td class="tt">${n.title}${n.isIndex?'　📌':''}</td>`+
       `<td><span class="badge" style="background:${n.color}">${n.cat}</span></td>`+
       `<td>${n.cn}</td>`+
       `<td><div class="tags">${n.concepts.map(c=>`<span class="tag">${c}</span>`).join('')}</div></td>`+
       `<td class="open">读正文 ▸</td></tr>`;
  });
  h+='</tbody></table>';
  return h;
}
function renderList(){document.getElementById('listBody').innerHTML=listHTML(document.getElementById('search').value);
  document.getElementById('listCount').textContent='共 '+DATA.nodes.length+' 张卡片（点行看正文）';}
document.getElementById('search').addEventListener('input',renderList);
renderList();

// ================= NETWORK (fixed: init on open, reseed+restart) =================
const cv = document.getElementById('netCanvas');
const ctx = cv.getContext('2d');
let W=0,H=0,DPR=1,netReady=false,netLoopOn=false;
function resize(){
  DPR = window.devicePixelRatio||1;
  const r = cv.parentElement.getBoundingClientRect();
  W=r.width||800; H=r.height||600;
  cv.width=W*DPR; cv.height=H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
const catList = cats;
const anchor = {};
function setAnchors(){
  catList.forEach((c,i)=>{
    const ang=(i/catList.length)*Math.PI*2-Math.PI/2;
    anchor[c]={x:W/2+Math.cos(ang)*Math.min(W,H)*0.32,y:H/2+Math.sin(ang)*Math.min(W,H)*0.30};
  });
}
const nodes = DATA.nodes.map(n=>({
  id:n.file,title:n.title,cat:n.cat,color:n.color,cn:n.cn,
  concepts:n.concepts,isIndex:n.isIndex,
  x:0,y:0,vx:0,vy:0,r:6+Math.sqrt(n.cn)/5}));
const id2n={}; nodes.forEach(n=>id2n[n.id]=n);
const edges = DATA.edges.map(e=>({s:id2n[e.s],t:id2n[e.t],w:e.w,shared:e.shared}));
let alpha=1;
function seed(){
  setAnchors();
  nodes.forEach(n=>{const a=anchor[n.cat];
    n.x=a.x+(Math.random()-.5)*120; n.y=a.y+(Math.random()-.5)*120; n.vx=0; n.vy=0;});
  alpha=1;
}
function tick(){
  for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
    const a=nodes[i],b=nodes[j];
    let dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy+0.01, d=Math.sqrt(d2);
    let f=2200/d2; a.vx+=dx/d*f; a.vy+=dy/d*f; b.vx-=dx/d*f; b.vy-=dy/d*f;
  }
  edges.forEach(e=>{
    const a=e.s,b=e.t; let dx=b.x-a.x, dy=b.y-a.y, d=Math.sqrt(dx*dx+dy*dy)+0.01;
    let L=120-e.w*6, f=(d-L)*0.02;
    a.vx+=dx/d*f; a.vy+=dy/d*f; b.vx-=dx/d*f; b.vy-=dy/d*f;
  });
  nodes.forEach(n=>{
    const a=anchor[n.cat];
    n.vx+=(a.x-n.x)*0.012; n.vy+=(a.y-n.y)*0.012;
    n.vx+=(W/2-n.x)*0.001; n.vy+=(H/2-n.y)*0.001;
    n.vx*=0.86; n.vy*=0.86;
    n.x+=n.vx*alpha; n.y+=n.vy*alpha;
    n.x=Math.max(20,Math.min(W-20,n.x)); n.y=Math.max(20,Math.min(H-20,n.y));
  });
  if(alpha>0.02)alpha*=0.992;
}
function draw(){
  ctx.clearRect(0,0,W,H);
  edges.forEach(e=>{
    const hi=hover&&(hover===e.s||hover===e.t);
    ctx.strokeStyle=hi?'rgba(56,189,248,.9)':'rgba(148,163,184,.18)';
    ctx.lineWidth=hi?2.2:Math.min(3,0.6+e.w*0.4);
    ctx.beginPath();ctx.moveTo(e.s.x,e.s.y);ctx.lineTo(e.t.x,e.t.y);ctx.stroke();
  });
  nodes.forEach(n=>{
    const dim=hover&&hover!==n.id&&!neighbors(hover).has(n.id);
    ctx.globalAlpha=dim?0.25:1;
    ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,7);ctx.fillStyle=n.color;ctx.fill();
    if(n.isIndex){ctx.lineWidth=2;ctx.strokeStyle='#fff';ctx.stroke();}
    if(!dim||n.r>9){ctx.globalAlpha=dim?0.3:1;ctx.fillStyle='#cbd5e1';
      ctx.font=(n.isIndex?'700 ':'')+'11px sans-serif';ctx.textAlign='center';
      ctx.fillText(n.title,n.x,n.y+n.r+11);}
    ctx.globalAlpha=1;
  });
}
function neighbors(id){const s=new Set();edges.forEach(e=>{if(e.s.id===id)s.add(e.t.id);if(e.t.id===id)s.add(e.s.id);});return s;}
let hover=null;
function loop(){tick();draw();requestAnimationFrame(loop);}
function pos(ev){const r=cv.getBoundingClientRect();const t=ev.touches?ev.touches[0]:ev;return{x:t.clientX-r.left,y:t.clientY-r.top};}
function pick(p){for(let i=nodes.length-1;i>=0;i--){const n=nodes[i];if((p.x-n.x)**2+(p.y-n.y)**2<(n.r+4)**2)return n;}}
let drag=null;
cv.addEventListener('mousemove',ev=>{
  const p=pos(ev);
  if(drag){drag.x=p.x;drag.y=p.y;drag.vx=0;drag.vy=0;alpha=Math.max(alpha,0.2);return;}
  const n=pick(p);hover=n?n.id:null;cv.style.cursor=n?'pointer':'grab';
  if(n)showDetail(n);
});
cv.addEventListener('mousedown',ev=>{const n=pick(pos(ev));if(n)drag=n;});
window.addEventListener('mouseup',()=>drag=null);
cv.addEventListener('click',ev=>{const n=pick(pos(ev));if(n)openReader(n.id);});
function showDetail(n){
  const d=document.getElementById('detail');
  d.innerHTML=`<h3 onclick='openReader(${JSON.stringify(n.id)})' title="点标题读正文">${n.title}</h3>
    <span class="cat" style="background:${n.color};color:#06283d">${n.cat}</span>
    <div class="meta">文件：<code>${n.id}.md</code><br>中文字数：${n.cn}　${n.isIndex?'（索引卡）':''}</div>
    <div style="color:var(--muted);font-size:12px;margin-bottom:6px">概念标签：</div>
    <div class="tags">${n.concepts.map(c=>`<span class="tag">${c}</span>`).join('')||'<span class="tag">—</span>'}</div>
    <div class="readbtn" onclick='openReader(${JSON.stringify(n.id)})'>📖 读正文</div>`;
}
function ensureNet(){
  if(!netReady){resize();seed();netReady=true;if(!netLoopOn){netLoopOn=true;loop();}}
  else{resize();seed();}
}
window.addEventListener('resize',()=>{if(document.getElementById('net').classList.contains('active')){resize();seed();}});

// ================= TREE =================
const ORDER=['总纲','理论哲学·纯粹理性批判','生平与方法','实践哲学·实践理性批判','审美与目的论·判断力批判','交叉与延伸','README/索引'];
function treeHTML(){
  const maxcn=Math.max(...DATA.nodes.map(n=>n.cn));
  let h=`<div class="topnode">00 · 总纲：康德哲学体系地图<br><span style="font-weight:400;font-size:12px">心灵三面向 → 三大批判 → 人是什么？</span></div>`;
  h+=`<div class="framework">知(纯批·我能知道什么)　情(判批·桥梁)　意(实批·我该做什么)　—　自然领域 ↔ 自由领域</div>`;
  const cols=ORDER.filter(c=>c!=='总纲'&&c!=='README/索引');
  h+='<div class="cols">';
  cols.forEach(c=>{
    const ns=DATA.nodes.filter(n=>n.cat===c).sort((a,b)=>a.file.localeCompare(b.file));
    h+=`<div class="col"><h4 style="background:${COLORS[c]}">${c} <span style="font-weight:400">(${ns.length})</span></h4>`;
    ns.forEach(n=>{
      const bw=Math.max(6,(n.cn/maxcn)*100);
      h+=`<div class="card" onclick='openReader(${JSON.stringify(n.file)})'><div><div>${n.title}</div><div class="bar" style="width:${bw}%;background:${COLORS[c]}"></div></div><span class="n">${n.cn}字</span></div>`;
    });
    h+='</div>';
  });
  h+='</div>';
  return h;
}
document.getElementById('tree').innerHTML=treeHTML();

// ================= GRID =================
function gridHTML(){
  let h='';
  ORDER.forEach(c=>{
    const ns=DATA.nodes.filter(n=>n.cat===c).sort((a,b)=>b.cn-a.cn);
    if(!ns.length)return;
    const maxcn=Math.max(...ns.map(n=>n.cn));
    h+=`<div class="gcat"><h3 style="border-color:${COLORS[c]}">${c} <span style="color:var(--muted);font-weight:400">(${ns.length})</span></h3><div class="gtiles">`;
    ns.forEach(n=>{
      const bw=Math.max(6,(n.cn/maxcn)*100);
      h+=`<div class="tile" onclick='openReader(${JSON.stringify(n.file)})' title="${n.concepts.join('、')}"><div class="t">${n.title}</div><div class="c">${n.cn} 字 · ${n.id}</div><div class="ct" style="width:${bw}%;background:${COLORS[c]}"></div></div>`;
    });
    h+='</div></div>';
  });
  return h;
}
document.getElementById('grid').innerHTML=gridHTML();
